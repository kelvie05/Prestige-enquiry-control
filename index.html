  return <>
    <SecBar>Line items &amp; parts</SecBar>
    <p style={{color:"var(--t2)",marginBottom:12,fontSize:13}}>One enquiry can hold many parts. Costs and sell prices roll up into the quote.</p>
    <div className="table-wrap">
      <table style={{minWidth:820}}>
        <thead><tr><th>#</th><th>Part / drawing</th><th>Qty</th><th>Material</th><th>Cost</th><th>Unit sell</th><th>Line total</th><th>Margin</th><th></th></tr></thead>
        <tbody>
          {e.lines.map((l,i)=>{const t=lineTotals(l);return <tr key={l.id} style={{cursor:"default"}}>
            <td className="mono">{i+1}</td>
            <td><b>{l.part}</b><div className="sub-c">{l.draw} {l.rev&&"Rev "+l.rev}</div></td>
            <td className="mono">{l.qty}</td>
            <td>{l.material}<div className="sub-c">{l.finish}</div></td>
            <td className="mono">{fmtGBP(t.cost)}</td>
            <td className="mono">{fmtGBP(l.unitSell)}</td>
            <td className="mono" style={{fontWeight:600}}>{fmtGBP(t.lineTotal)}</td>
            <td><span className={"pill pill--"+(t.margin>=30?"green":t.margin>=15?"amber":"red")} style={{fontFamily:"var(--mono)"}}>{t.margin}%</span></td>
            <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
              {del===l.id
                ? <span style={{display:"inline-flex",gap:6,alignItems:"center"}}><small style={{color:"var(--t3)"}}>Delete?</small><button className="btn btn--danger sm" onClick={()=>remove(l.id)}>Yes</button><button className="btn btn--g sm" onClick={()=>setDel(null)}>No</button></span>
                : <span style={{display:"inline-flex",gap:6}}><button className="icobtn" title="Edit" onClick={()=>startEdit(l)}>{I.pencil}</button><button className="icobtn" title="Delete" onClick={()=>setDel(l.id)}>{I.trash}</button></span>}
            </td>
          </tr>;})}
          {e.lines.length===0 && <tr><td colSpan="9"><div className="empty">No line items yet.</div></td></tr>}
        </tbody>
        {e.lines.length>0 && <tfoot><tr style={{background:"#fafbfc",fontWeight:700}}><td colSpan="4" style={{padding:"12px 14px"}}>Totals</td><td className="mono">{fmtGBP(cost)}</td><td></td><td className="mono">{fmtGBP(total)}</td><td className="mono">{total>0?Math.round((total-cost)/total*100):0}%</td><td></td></tr></tfoot>}
      </table>
    </div>
    {editing===null && <button className="btn btn--g" style={{marginTop:14}} onClick={startAdd}>{I.plus} Add line item</button>}
    {editing!==null && <div className="panel" style={{marginTop:14,padding:16}}>
      <SecBar>{editing==="new"?"New line item":"Edit line item"}</SecBar>
      <div className="fieldgrid three">
        <Field label="Part number"><input value={f.part} onChange={ev=>set("part",ev.target.value)}/></Field>
        <Field label="Drawing no."><input value={f.draw} onChange={ev=>set("draw",ev.target.value)}/></Field>
        <Field label="Revision"><input value={f.rev} onChange={ev=>set("rev",ev.target.value)}/></Field>
        <Field label="Quantity"><input type="number" value={f.qty} onChange={ev=>set("qty",ev.target.value)} className="mono"/></Field>
        <Field label="Material"><input value={f.material} onChange={ev=>set("material",ev.target.value)}/></Field>
        <Field label="Finish"><input value={f.finish} onChange={ev=>set("finish",ev.target.value)}/></Field>
        <Field label="Material cost £"><input type="number" value={f.matCost} onChange={ev=>set("matCost",ev.target.value)} className="mono"/></Field>
        <Field label="Labour cost £"><input type="number" value={f.labCost} onChange={ev=>set("labCost",ev.target.value)} className="mono"/></Field>
        <Field label="Subcontract £"><input type="number" value={f.subCost} onChange={ev=>set("subCost",ev.target.value)} className="mono"/></Field>
        <Field label="Coating £"><input type="number" value={f.coatCost} onChange={ev=>set("coatCost",ev.target.value)} className="mono"/></Field>
        <Field label="Unit sell £"><input type="number" value={f.unitSell} onChange={ev=>set("unitSell",ev.target.value)} className="mono"/></Field>
        <Field label="Line total"><div className="val mono">{fmtGBP(lineTotals(f).lineTotal)} · {lineTotals(f).margin}%</div></Field>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={()=>{setEditing(null);setF(blank);}}>Cancel</button><button className="btn btn--p" onClick={save}>{editing==="new"?"Save line":"Save changes"}</button></div>
    </div>}
  </>;
}

function TabDocs({e,user,update}){

  const [busy,setBusy]=useState(false);
  const fileRef=useRef(null);
  const TYPES=["Customer email","PDF drawing","DXF file","STEP file","Image/photo","Specification","Supplier quote","Quote document","Purchase order"];
  const addRecord=(rec)=>update(e.id,x=>({...x,documents:[...x.documents,{id:++DID,by:user.id,when:new Date().toISOString(),...rec}]}),"uploaded document "+rec.name);
  const linkRef=()=>{ if(!name)return; addRecord({name,type}); setName(""); pushToast("Document linked"); };
  const onFile=async(ev)=>{
    const file=ev.target.files&&ev.target.files[0]; if(!file) return;
    setBusy(true);
    try{ const b64=await fileToB64(file); const r=await api.upload(file.name,type,b64);

    catch(err){ pushToast("Upload failed"); }

  };
  const [del,setDel]=useState(null);
  const remove=(id)=>{ update(e.id,x=>({...x,documents:x.documents.filter(d=>d.id!==id)}),"removed a document"); setDel(null); pushToast("Document removed"); };
  return <>
    <SecBar>Documents &amp; drawings</SecBar>
    <div className="table-wrap">
      <table style={{minWidth:640}}>
        <thead><tr><th>Document</th><th>Type</th><th>Added by</th><th>When</th><th></th></tr></thead>
        <tbody>{e.documents.map(d=><tr key={d.id} style={{cursor:"default"}}>
          <td><span style={{display:"inline-flex",gap:8,alignItems:"center"}}><span style={{color:"var(--orange)"}}>{I.doc}</span>
            {d.url?<a href={d.url} target="_blank" rel="noreferrer" style={{color:"var(--orange)",fontWeight:600}}>{d.name}</a>:<b>{d.name}</b>}</span></td>
          <td><span className="pill pill--grey">{d.type}</span></td><td>{uName(d.by)}</td><td className="mono" style={{fontSize:12}}>{fmtDT(d.when)}</td>
          <td style={{textAlign:"right",whiteSpace:"nowrap"}}>{del===d.id
            ? <span style={{display:"inline-flex",gap:6,alignItems:"center"}}><small style={{color:"var(--t3)"}}>Remove?</small><button className="btn btn--danger sm" onClick={()=>remove(d.id)}>Yes</button><button className="btn btn--g sm" onClick={()=>setDel(null)}>No</button></span>
            : <button className="icobtn" title="Remove" onClick={()=>setDel(d.id)}>{I.trash}</button>}</td></tr>)}
          {e.documents.length===0 && <tr><td colSpan="5"><div className="empty">No documents linked yet.</div></td></tr>}
        </tbody>
      </table>
    </div>
    <div className="panel" style={{marginTop:14,padding:14}}>
      <div className="fieldgrid">
        <Field label="Type"><select value={type} onChange={ev=>setType(ev.target.value)}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></Field>
        <Field label="Upload a file"><button className="btn btn--p" disabled={busy} onClick={()=>fileRef.current&&fileRef.current.click()}>{busy?"Uploading…":<>{I.plus} Choose file</>}</button>
          <input ref={fileRef} type="file" style={{display:"none"}} onChange={onFile}/></Field>
      </div>
      <p style={{color:"var(--t3)",fontSize:11.5,marginTop:8}}>Files are stored on the server (the <span className="mono">uploads</span> folder) and linked to this enquiry.</p>
      <div style={{borderTop:"1px solid var(--line)",margin:"12px 0"}}></div>
      <div className="fieldgrid"><Field label="…or link a reference by name"><input value={name} onChange={ev=>setName(ev.target.value)} placeholder="e.g. HW-2241 Rev C.pdf (no file to hand)"/></Field><div></div></div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={linkRef}>Link reference only</button></div>
    </div>

}

function TabQuote({e,user,update,notifyUser}){
  const total = e.lines.reduce((s,l)=>s+lineTotals(l).lineTotal,0);
  const cost = e.lines.reduce((s,l)=>s+lineTotals(l).cost,0);
  const margin = total>0?Math.round((total-cost)/total*100):0;
  const [lead,setLead]=useState("3 weeks");
  const ap = e.approval || {state:"None",required:false};
  const value = total||e.quotedValue||0;
  const needsApproval = ap.required || value>=APPROVAL_THRESHOLD;
  const approved = ap.state==="Approved";
  const blockedBySignoff = needsApproval && !approved;
  const isMgmt = user.role==="Management";

  const requestApproval=()=>{
    update(e.id,x=>{ x.approval={required:true,state:"Requested",by:user.id,when:new Date().toISOString(),decidedBy:null,decidedWhen:null,note:""}; return x; },
      "requested management approval of "+fmtGBP(value));
    mgmtUsers().forEach(m=>notifyUser(m.id,"approval","Approval requested: "+e.customer+" "+fmtGBP(value),e.id));
    pushToast("Sent for management approval");
  };
  const decide=(ok,note)=>{
    update(e.id,x=>{ x.approval={...x.approval,state:ok?"Approved":"Rejected",decidedBy:user.id,decidedWhen:new Date().toISOString(),note:note||""}; return x; },
      (ok?"approved":"rejected")+" the quote ("+fmtGBP(value)+")");
    if(ap.by) notifyUser(ap.by,"approval",(ok?"Approved":"Rejected")+": "+e.customer+" "+fmtGBP(value),e.id);
    if(e.responsible&&e.responsible!==ap.by) notifyUser(e.responsible,"approval",(ok?"Approved":"Rejected")+": "+e.customer,e.id);
    pushToast(ok?"Quote approved":"Quote rejected");
  };

  const sendQuote=()=>{
    const chaseUser = e.assignedChaseUser||e.responsible;
    update(e.id,x=>{ x.quotedValue=value; x.quoteSentDate=new Date().toISOString(); x.status="Quote Sent";
      x.versions=[...x.versions,{v:(x.versions.at(-1)?.v||0)+1,date:new Date().toISOString(),value,lead,by:user.id,reason:x.versions.length?"Re-issued":"Initial quote",prev:x.versions.at(-1)?.value||null}];
      if(!x.assignedChaseUser) x.assignedChaseUser=x.responsible;
      // auto-schedule the first chase as a real task
      x.chasePlan=CHASE_PLAN; x.nextChaseDate=dShift(CHASE_PLAN[0]);
      x.tasks=[...x.tasks,{id:++TID,title:"Chase quote (1st) — "+x.customer,assignee:chaseUser,by:user.id,due:dShift(CHASE_PLAN[0]),priority:"High",status:"Open",notes:"Auto-scheduled when quote was sent"}];
      return x; },"marked quote sent at "+fmtGBP(value)+" — first chase auto-scheduled");
    if(chaseUser) notifyUser(chaseUser,"chase","Chase scheduled (3 days): "+e.customer,e.id);
    pushToast("Quote V"+((e.versions.at(-1)?.v||0)+1)+" sent · first chase auto-scheduled");
  };

  return <>
    <SecBar>Estimate roll-up</SecBar>
    <div className="statgrid" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:18}}>
      <div className="stat"><div className="k">Estimated cost</div><div className="v" style={{fontSize:24}}>{fmtGBP(cost)}</div></div>
      <div className="stat"><div className="k">Quoted value</div><div className="v" style={{fontSize:24}}>{fmtGBP(value)}</div></div>
      <div className={"stat "+(margin>=30?"good":margin>=15?"warn":"alert")}><div className="k">Margin</div><div className="v">{margin}%</div></div>
    </div>

    {/* ---- management approval ---- */}
    {(needsApproval || ap.state!=="None") && <>
      <SecBar>Management approval</SecBar>
      {ap.state==="Approved" && <div className="hint" style={{background:"#e7f2ec",borderColor:"#c4e3d3",color:"#1f6b48"}}>{I.shield}<div>Approved by <b>{uName(ap.decidedBy)}</b> on {fmtDate(ap.decidedWhen)}.{ap.note&&<> “{ap.note}”</>}</div></div>}
      {ap.state==="Rejected" && <div className="warnbox">{I.shield} <span><b>Rejected</b> by {uName(ap.decidedBy)} on {fmtDate(ap.decidedWhen)}.{ap.note&&<> “{ap.note}”</>} Re-estimate or request again.</span></div>}
      {ap.state==="Requested" && <>
        <div className="hint" style={{background:"#fff4e3",borderColor:"#f0d9b0",color:"#8a5a12"}}>{I.shield}<div>Awaiting management sign-off — requested by <b>{uName(ap.by)}</b> on {fmtDate(ap.when)}.</div></div>
        {isMgmt && <ApprovalDecide onDecide={decide}/>}
      </>}
      {(ap.state==="None"||ap.state==="Rejected") && !approved && <div style={{marginTop:10}}>
        <p style={{color:"var(--t2)",fontSize:13,marginBottom:8}}>This quote is <b>{fmtGBP(value)}</b>{value>=APPROVAL_THRESHOLD?<> — at or above the {fmtGBP(APPROVAL_THRESHOLD)} threshold, so it needs management sign-off before it can be sent.</>:<> and is flagged as needing sign-off.</>}</p>
        <button className="btn btn--g" onClick={requestApproval}>{I.shield} Request management approval</button>
      </div>}
    </>}

    {/* ---- send / sent ---- */}
    {e.quoteSentDate ? <>
      <SecBar>Quote sent</SecBar>
      <div className="hint" style={{background:"#e7f2ec",borderColor:"#c4e3d3",color:"#1f6b48"}}>{I.check}<div>Quote <b>V{e.versions.at(-1)?.v}</b> sent on <b>{fmtDate(e.quoteSentDate)}</b> for <b>{fmtGBP(e.quotedValue)}</b>. First chase was auto-scheduled — see Chasing.</div></div>
    </> : <>
      <SecBar>Send quote</SecBar>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:12}}>Marking the quote as sent records the date, value and version, sets status to <b>Quote Sent</b> and automatically schedules the first chase.</p>
      <div className="fieldgrid"><Field label="Quoted lead time"><input value={lead} onChange={ev=>setLead(ev.target.value)}/></Field>
      <Field label="Quote value"><div className="val mono">{fmtGBP(total||0)}</div></Field></div>
      <button className="btn btn--p" style={{marginTop:14}} disabled={!total||blockedBySignoff} onClick={sendQuote}>Mark quote as sent</button>
      {!total && <p style={{color:"var(--t3)",fontSize:12,marginTop:8}}>Add line items first so there's a value to quote.</p>}
      {total>0 && blockedBySignoff && <p style={{color:"var(--red)",fontSize:12,marginTop:8}}>{I.shield} Needs management approval before it can be sent.</p>}
    </>}
  </>;
}

function ApprovalDecide({onDecide}){
  const [note,setNote]=useState("");
  return <div style={{marginTop:10}}>
    <Field label="Decision note (optional)"><input value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. margin fine, proceed"/></Field>
    <div style={{display:"flex",gap:10,marginTop:10}}>
      <button className="btn btn--p" onClick={()=>onDecide(true,note)}>{I.check} Approve</button>
      <button className="btn btn--danger" onClick={()=>onDecide(false,note)}>Reject</button>
    </div>
  </div>;
}

function TabSuppliers({e,user,update,notifyUser}){
  const reqs = e.supplierReqs||[];
  const [supplier,setSupplier]=useState("");
  const [item,setItem]=useState("");
  const [due,setDue]=useState("");
  const [makeTask,setMakeTask]=useState(true);
  const received = reqs.filter(r=>r.status==="Received");
  const totalReceived = received.reduce((s,r)=>s+(r.price||0),0);
  const can = supplier.trim() && item.trim() && due;

  const add=()=>{
    const sup=supplier.trim();
    if(!SUPPLIERS.some(s=>s.name===sup)){ api.addSupplier(sup); SUPPLIERS.push({id:"s"+(Math.random()*1e6|0),name:sup}); }
    const dueISO=new Date(due).toISOString();
    update(e.id,x=>{
      x.supplierReqs=[...(x.supplierReqs||[]),{id:++DID,supplier:sup,item:item.trim(),sentDate:new Date().toISOString(),dueDate:dueISO,status:"Open",price:null,note:""}];
      if(makeTask) x.tasks=[...x.tasks,{id:++TID,title:"Get price: "+item.trim()+" — "+sup,assignee:x.responsible,by:user.id,due:dueISO,priority:"Medium",status:"Waiting for supplier",notes:""}];
      if(x.status==="Ready to Estimate"||x.status==="New Enquiry"||x.status==="Needs Review") x.status="Waiting for Supplier Price";
      return x;
    },"requested supplier price from "+sup+" ("+item.trim()+")");
    if(makeTask && e.responsible!==user.id) notifyUser(e.responsible,"supplier","Supplier price requested: "+sup,e.id);
    setSupplier("");setItem("");setDue("");pushToast("Supplier price request added");
  };
  const receive=(id,price)=>update(e.id,x=>{ x.supplierReqs=x.supplierReqs.map(r=>r.id===id?{...r,status:"Received",price:Number(price)||0}:r); return x; },"logged supplier price "+fmtGBP(Number(price)||0));
  const cancel=(id)=>update(e.id,x=>{ x.supplierReqs=x.supplierReqs.map(r=>r.id===id?{...r,status:"Cancelled"}:r); return x; },"cancelled a supplier price request");

  return <>
    <SecBar>Supplier price requests</SecBar>
    {reqs.length>0 ? <div className="table-wrap"><table style={{minWidth:620}}><thead><tr><th>Supplier</th><th>Item</th><th>Sent</th><th>Due</th><th>Status</th><th>Price</th><th></th></tr></thead>
      <tbody>{reqs.map(r=>{ const overdue=r.status==="Open"&&isOverdue(r.dueDate);
        return <tr key={r.id} style={{cursor:"default"}}>
          <td><b>{r.supplier}</b></td><td>{r.item}</td><td className="mono">{fmtDate(r.sentDate)}</td>
          <td className="mono" style={{color:overdue?"var(--red)":undefined}}>{fmtDate(r.dueDate)}{overdue&&" ⚠"}</td>
          <td><span className={"sp sp--"+(r.status==="Received"?"ok":r.status==="Cancelled"?"off":overdue?"late":"open")}>{overdue?"Overdue":r.status}</span></td>
          <td className="mono">{r.price!=null?fmtGBP(r.price):"—"}</td>
          <td>{r.status==="Open"&&<SupplierReceive onReceive={p=>receive(r.id,p)} onCancel={()=>cancel(r.id)}/>}</td>
        </tr>; })}</tbody></table></div>
      : <div className="empty">No supplier prices requested yet.</div>}
    {received.length>0 && <div className="hint" style={{marginTop:12}}>{I.box}<div>Received supplier prices total <b>{fmtGBP(totalReceived)}</b> — feed these into line-item subcontract / material costs on the Line items tab.</div></div>}

    <SecBar>Request a supplier price</SecBar>
    <div className="fieldgrid">
      <Field label="Supplier"><input list="suppliers-dl" value={supplier} onChange={ev=>setSupplier(ev.target.value)} placeholder="Choose or type a supplier"/>
        <datalist id="suppliers-dl">{SUPPLIERS.map(s=><option key={s.id} value={s.name}/>)}</datalist></Field>
      <Field label="Price needed by"><input type="date" value={due} onChange={ev=>setDue(ev.target.value)}/></Field>
      <div className="full"><Field label="What price is needed"><input value={item} onChange={ev=>setItem(ev.target.value)} placeholder="e.g. Hot-dip galvanising, hopper assembly"/></Field></div>
    </div>
    <label className="ovr" style={{marginTop:6}}><input type="checkbox" checked={makeTask} onChange={ev=>setMakeTask(ev.target.checked)}/> Also create a chase task for the responsible person</label>
    <div><button className="btn btn--p" style={{marginTop:12}} disabled={!can} onClick={can?add:undefined}>Add supplier price request</button></div>
  </>;
}
function SupplierReceive({onReceive,onCancel}){
  const [p,setP]=useState("");
  return <div style={{display:"flex",gap:6,alignItems:"center"}}>
    <input className="mono" style={{width:90,padding:"5px 8px"}} placeholder="£ price" value={p} onChange={e=>setP(e.target.value)}/>
    <button className="btn btn--p sm" disabled={!p} onClick={()=>onReceive(p)}>Log</button>
    <button className="btn btn--g sm" onClick={onCancel}>✕</button>
  </div>;
}

function TabTasks({e,user,update,notifyUser}){
  const blank={title:"",assignee:user.id,due:"",priority:"Medium",notes:""};
  const [editing,setEditing]=useState(null);  // null | "new" | task id
  const [f,setF]=useState(blank);
  const [del,setDel]=useState(null);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const startAdd=()=>{ setF(blank); setEditing("new"); setDel(null); };
  const startEdit=(t)=>{ setF({title:t.title,assignee:t.assignee,due:t.due?new Date(t.due).toISOString().slice(0,10):"",priority:t.priority,notes:t.notes||""}); setEditing(t.id); setDel(null); };
  const save=()=>{ if(!f.title||!f.due)return;
    if(editing==="new"){
      update(e.id,x=>({...x,tasks:[...x.tasks,{id:++TID,title:f.title,assignee:f.assignee,by:user.id,due:new Date(f.due).toISOString(),priority:f.priority,status:"Open",notes:f.notes}]}),"created task “"+f.title+"” for "+uName(f.assignee));
      notifyUser(f.assignee,"task","Task assigned: "+f.title,e.id);
      pushToast("Task assigned to "+uName(f.assignee));
    } else {
      const prev=e.tasks.find(t=>t.id===editing);
      update(e.id,x=>({...x,tasks:x.tasks.map(t=>t.id===editing?{...t,title:f.title,assignee:f.assignee,due:new Date(f.due).toISOString(),priority:f.priority,notes:f.notes}:t)}),"edited task “"+f.title+"”");
      if(prev && prev.assignee!==f.assignee) notifyUser(f.assignee,"task","Task assigned: "+f.title,e.id);
      pushToast("Task updated");
    }
    setF(blank); setEditing(null);
  };
  const remove=(id)=>{ update(e.id,x=>({...x,tasks:x.tasks.filter(t=>t.id!==id)}),"deleted a task"); setDel(null); pushToast("Task deleted"); };
  const setStat=(tid,s)=>update(e.id,x=>({...x,tasks:x.tasks.map(t=>t.id===tid?{...t,status:s,...(s==="Completed"?{completedBy:user.id,completedAt:new Date().toISOString()}:{})}:t)}), (s==="Completed"?"completed":"updated")+" a task");
  return <>
    <SecBar>Tasks</SecBar>
    {e.tasks.map(t=><div className="check" key={t.id} style={{flexDirection:"column",alignItems:"stretch",gap:6}}>
      <div style={{display:"flex",alignItems:"center",gap:11}}>
        <b style={{fontFamily:"var(--ui)",flex:1}}>{t.title} <Prio p={t.priority}/></b>
        <select className="pill-sel" style={{padding:"5px 9px",fontSize:12}} value={t.status} onChange={ev=>setStat(t.id,ev.target.value)}>{TASK_STATUS.map(s=><option key={s}>{s}</option>)}</select>
        {del===t.id
          ? <span style={{display:"inline-flex",gap:6,alignItems:"center"}}><small style={{color:"var(--t3)"}}>Delete?</small><button className="btn btn--danger sm" onClick={()=>remove(t.id)}>Yes</button><button className="btn btn--g sm" onClick={()=>setDel(null)}>No</button></span>
          : <span style={{display:"inline-flex",gap:4}}><button className="icobtn" title="Edit" onClick={()=>startEdit(t)}>{I.pencil}</button><button className="icobtn" title="Delete" onClick={()=>setDel(t.id)}>{I.trash}</button></span>}
      </div>
      <div style={{display:"flex",gap:16,color:"var(--t3)",fontSize:12,alignItems:"center"}}>
        <span>For <b style={{color:"var(--t1)"}}>{uName(t.assignee)}</b></span>
        <span>Due <b style={{color:isOverdue(t.due)?"var(--red)":"var(--t1)",fontFamily:"var(--mono)"}}>{fmtDate(t.due)}</b></span>
        {t.notes&&<span>· {t.notes}</span>}
        {t.completedAt&&<span style={{color:"var(--green)"}}>✓ by {uName(t.completedBy)}</span>}
      </div>
    </div>)}
    {e.tasks.length===0 && <div className="empty">No tasks on this enquiry yet.</div>}
    {editing===null && <button className="btn btn--g" style={{marginTop:8}} onClick={startAdd}>{I.plus} New task</button>}
    {editing!==null && <div className="panel" style={{marginTop:12,padding:14}}>
      <SecBar>{editing==="new"?"New task":"Edit task"}</SecBar>
      <div className="fieldgrid">
        <div className="full"><Field label="Task" req><input value={f.title} onChange={ev=>set("title",ev.target.value)} placeholder="e.g. Get powder coating price"/></Field></div>
        <Field label="Assign to" req><select value={f.assignee} onChange={ev=>set("assignee",ev.target.value)}>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
        <Field label="Due date" req><input type="date" value={f.due} onChange={ev=>set("due",ev.target.value)}/></Field>
        <Field label="Priority"><select value={f.priority} onChange={ev=>set("priority",ev.target.value)}><option>High</option><option>Medium</option><option>Low</option></select></Field>
        <Field label="Notes"><input value={f.notes} onChange={ev=>set("notes",ev.target.value)}/></Field>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={()=>{setEditing(null);setF(blank);}}>Cancel</button><button className="btn btn--p" onClick={save}>{editing==="new"?"Assign task":"Save changes"}</button></div>
    </div>}
  </>;
}

function TabNotes({e,user,update}){
  const TYPES=["Internal","Customer phone call","Customer email","Supplier call","Supplier email","Clarification","Pricing decision","Design/drawing issue","Delay reason","Handover note"];
  const [type,setType]=useState("Internal"); const [txt,setTxt]=useState("");
  const add=()=>{ if(!txt)return; update(e.id,x=>({...x,notes:[...x.notes,{id:++NID,when:new Date().toISOString(),by:user.id,type,txt}]}),"added a "+type.toLowerCase()+" note"); setTxt(""); pushToast("Note logged"); };
  const [del,setDel]=useState(null);
  const remove=(id)=>{ update(e.id,x=>({...x,notes:x.notes.filter(n=>n.id!==id)}),"deleted a note"); setDel(null); pushToast("Note deleted"); };
  const log=[...e.notes].sort((a,b)=>new Date(b.when)-new Date(a.when));
  return <>
    <SecBar>Communication log</SecBar>
    <div className="panel" style={{padding:14,marginBottom:16}}>
      <div className="fieldgrid"><Field label="Note type"><select value={type} onChange={ev=>setType(ev.target.value)}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></Field><div></div></div>
      <Field label="Note"><textarea rows="2" value={txt} onChange={ev=>setTxt(ev.target.value)} placeholder="Log a call, email, clarification or decision…"/></Field>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}><button className="btn btn--p" onClick={add}>Add note</button></div>
    </div>
    <div>{log.map(n=><div className="note" key={n.id}>
      <span className="av-sm" style={{background:uObj(n.by).c}}>{initials(uName(n.by))}</span>
      <div className="body"><div className="head"><b>{uName(n.by)}</b><span className="pill pill--grey" style={{fontSize:10}}>{n.type}</span><span style={{marginLeft:"auto",display:"inline-flex",gap:8,alignItems:"center"}}><span style={{fontFamily:"var(--mono)"}}>{fmtDT(n.when)}</span>
        {(n.by===user.id||user.role==="Admin") && (del===n.id
          ? <span style={{display:"inline-flex",gap:6,alignItems:"center"}}><button className="btn btn--danger sm" onClick={()=>remove(n.id)}>Delete</button><button className="btn btn--g sm" onClick={()=>setDel(null)}>Keep</button></span>
          : <button className="icobtn" title="Delete note" onClick={()=>setDel(n.id)}>{I.trash}</button>)}</span></div><div className="txt">{n.txt}</div></div>
    </div>)}
    {log.length===0 && <div className="empty">No notes logged yet.</div>}</div>
  </>;
}

function TabVersions({e,user,update}){
  const [add,setAdd]=useState(false); const [val,setVal]=useState(""); const [reason,setReason]=useState(""); const [lead,setLead]=useState("3 weeks");
  const save=()=>{ if(!val)return; update(e.id,x=>{ const prev=x.versions.at(-1)?.value||null;
      x.versions=[...x.versions,{v:(x.versions.at(-1)?.v||0)+1,date:new Date().toISOString(),value:Number(val),lead,by:user.id,reason,prev}]; x.quotedValue=Number(val); return x; },"created quote version V"+((e.versions.at(-1)?.v||0)+1));
    setVal("");setReason("");setAdd(false); pushToast("New quote version saved"); };
  return <>
    <SecBar>Quote versions</SecBar>
    <div className="table-wrap"><table style={{minWidth:620}}>
      <thead><tr><th>Ver.</th><th>Date</th><th>Value</th><th>Change</th><th>Lead</th><th>Reason</th><th>By</th></tr></thead>
      <tbody>{e.versions.map(v=><tr key={v.v} style={{cursor:"default"}}>
        <td className="mono" style={{fontWeight:600,color:"var(--orange)"}}>V{v.v}</td><td className="mono" style={{fontSize:12}}>{fmtDate(v.date)}</td>
        <td className="mono" style={{fontWeight:600}}>{fmtGBP(v.value)}</td>
        <td className="mono">{v.prev!=null?<span style={{color:v.value>=v.prev?"var(--green)":"var(--red)"}}>{v.value>=v.prev?"+":""}{fmtGBP(v.value-v.prev)}</span>:"—"}</td>
        <td>{v.lead}</td><td style={{color:"var(--t2)"}}>{v.reason}</td><td>{uName(v.by)}</td></tr>)}
        {e.versions.length===0 && <tr><td colSpan="7"><div className="empty">No quote versions yet — send a quote from the Estimate tab.</div></td></tr>}
      </tbody></table></div>
    {!add && e.versions.length>0 && <button className="btn btn--g" style={{marginTop:14}} onClick={()=>setAdd(true)}>{I.plus} New version</button>}
    {add && <div className="panel" style={{marginTop:14,padding:14}}>
      <div className="fieldgrid three">
        <Field label="New value £"><input type="number" value={val} onChange={ev=>setVal(ev.target.value)} className="mono"/></Field>
        <Field label="Lead time"><input value={lead} onChange={ev=>setLead(ev.target.value)}/></Field>
        <Field label="Reason for revision"><input value={reason} onChange={ev=>setReason(ev.target.value)} placeholder="e.g. quantity changed"/></Field>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={()=>setAdd(false)}>Cancel</button><button className="btn btn--p" onClick={save}>Save version</button></div>
    </div>}
  </>;
}

function TabChase({e,user,update,notifyUser}){
  const [result,setResult]=useState("Email sent"); const [note,setNote]=useState(""); const [next,setNext]=useState("");
  const log=()=>{
    const closing = result==="Customer placing order"||result==="Customer not proceeding";
    update(e.id,x=>{
      const idx=x.chases.length;                       // this chase's 0-based index
      x.chases=[...x.chases,{id:(x.chases.at(-1)?.id||0)+1,when:new Date().toISOString(),by:user.id,result,note,next:next?new Date(next).toISOString():null}];
      // complete the matching auto-scheduled chase task, if open
      let done=false;
      x.tasks=x.tasks.map(t=>(!done&&t.status==="Open"&&/^Chase quote/.test(t.title))?(done=true,{...t,status:"Completed"}):t);
      // auto-schedule the next planned chase
      const plan=x.chasePlan||CHASE_PLAN; const nextIdx=idx+1;
      if(!closing && nextIdx<plan.length){
        const base=x.quoteSentDate?new Date(x.quoteSentDate).getTime():Date.now();
        const dueISO=next?new Date(next).toISOString():new Date(base+plan[nextIdx]*86400000).toISOString();
        x.nextChaseDate=dueISO;
        const chaser=x.assignedChaseUser||x.responsible;
        x.tasks=[...x.tasks,{id:++TID,title:"Chase quote ("+CHASE_LABELS[nextIdx]+") — "+x.customer,assignee:chaser,by:user.id,due:dueISO,priority:"Medium",status:"Open",notes:"Auto-scheduled chase"}];
      } else { x.nextChaseDate=closing?null:(next?new Date(next).toISOString():null); }
      return x;
    },"logged chase: "+result);
    setNote("");setNext(""); pushToast(closing?"Chase logged":"Chase logged · next chase auto-scheduled");
  };
  const setChaser=v=>{ update(e.id,x=>({...x,assignedChaseUser:v}),"assigned chasing to "+uName(v)); notifyUser(v,"chase","Chase assigned to you: "+e.customer,e.id); };
  const schedule=[["3 days","First chase"],["7 days","Second chase"],["14 days","Final chase"],["30 days","Review / dormant"]];
  if(e.status!=="Quote Sent" && e.chases.length===0) return <><SecBar>Quote chasing</SecBar><div className="empty">Chasing starts once a quote is sent.</div></>;
  return <>
    <SecBar>Chasing</SecBar>
    <div className="fieldgrid" style={{marginBottom:16}}>
      <Field label="Assigned chaser"><select value={e.assignedChaseUser||""} onChange={ev=>setChaser(ev.target.value)}><option value="">— unassigned —</option>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
      <Field label="Quote sent"><div className="val mono">{fmtDate(e.quoteSentDate)} · {daysBetween(e.quoteSentDate,new Date().toISOString())} days ago</div></Field>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>{schedule.map(([d,l])=><span key={l} className="tag-line"><span className="kbd">{d}</span>{l}</span>)}</div>
    {e.nextChaseDate && <div className="hint" style={{marginBottom:16}}>{I.phone}<div>Next chase auto-scheduled for <b style={{color:isOverdue(e.nextChaseDate)?"var(--red)":undefined}}>{fmtDate(e.nextChaseDate)}</b> — it's on the assigned chaser's task list.</div></div>}

    <div className="panel" style={{padding:14,marginBottom:16}}>
      <div className="fieldgrid three">
        <Field label="Chase result"><select value={result} onChange={ev=>setResult(ev.target.value)}>{CHASE_RESULTS.map(r=><option key={r}>{r}</option>)}</select></Field>
        <Field label="Next chase date"><input type="date" value={next} onChange={ev=>setNext(ev.target.value)}/></Field>
        <Field label="Note"><input value={note} onChange={ev=>setNote(ev.target.value)} placeholder="optional"/></Field>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}><button className="btn btn--p" onClick={log}>{I.phone} Log chase</button></div>
    </div>
    <div className="audit" style={{marginLeft:14}}>
      {[...e.chases].reverse().map(c=><div className="row" key={c.id}><b className="who">{c.result}</b> <span style={{color:"var(--t2)"}}>{c.note}</span> — {uName(c.by)}{c.next&&<span style={{color:"var(--t3)"}}> · next {fmtDate(c.next)}</span>}<div className="when">{fmtDT(c.when)}</div></div>)}
      {e.chases.length===0 && <div className="empty" style={{padding:16}}>No chases logged yet.</div>}
    </div>
  </>;
}

function TabOutcome({e,user,update}){
  const OUT=["Won","Lost","No Quote","Cancelled","Dormant"];
  const [out,setOut]=useState(e.outcome||""); const [reason,setReason]=useState(e.lostReason||""); const [po,setPo]=useState(e.poNumber||"");
  const reasons = out==="Lost"?LOST_REASONS:out==="No Quote"?NOQUOTE_REASONS:null;
  const save=()=>{ update(e.id,x=>{ x.outcome=out; x.lostReason=reasons?reason:null; x.poNumber=out==="Won"?po:x.poNumber;
      x.status = out==="Won"?(po?"Won - PO Received":"Won - Awaiting PO"):out==="Lost"?"Lost":out==="No Quote"?"No Quote":out==="Dormant"?"Dormant":x.status; return x; },"set outcome to "+out+(reasons&&reason?" ("+reason+")":""));
    pushToast("Outcome set to "+out); };
  const can = out && (!reasons || reason);
  return <>
    <SecBar>Outcome</SecBar>
    <div className="fieldgrid">
      <Field label="Outcome" req><select value={out} onChange={ev=>{setOut(ev.target.value);setReason("");}}><option value="">— choose —</option>{OUT.map(o=><option key={o}>{o}</option>)}</select></Field>
      {reasons && <Field label={out+" reason"} req><select value={reason} onChange={ev=>setReason(ev.target.value)}><option value="">— choose —</option>{reasons.map(r=><option key={r}>{r}</option>)}</select></Field>}
      {out==="Won" && <Field label="Customer PO number"><input value={po} onChange={ev=>setPo(ev.target.value)} className="mono" placeholder="PO-…"/></Field>}
    </div>
    <button className="btn btn--p" style={{marginTop:14,opacity:can?1:.45}} disabled={!can} onClick={can?save:undefined}>Save outcome</button>
    {e.outcome && <div className="hint" style={{marginTop:16}}>{I.flag}<div>Current outcome: <b>{e.outcome}</b>{e.lostReason&&<> · {e.lostReason}</>}{e.poNumber&&<> · PO {e.poNumber}</>}. {e.outcome==="Won"&&"Complete the production handover checklist before release."}</div></div>}
    {e.outcome==="Won" && <ActualsPanel e={e} user={user} update={update}/>}
  </>;
}

function ActualsPanel({e,user,update}){
  const estCost = e.lines.reduce((s,l)=>s+lineTotals(l).cost,0);
  const a = e.actuals||{};
  const [mat,setMat]=useState(a.mat??""); const [lab,setLab]=useState(a.lab??"");
  const [sub,setSub]=useState(a.sub??""); const [coat,setCoat]=useState(a.coat??"");
  const num=v=>Number(v)||0;
  const actTotal = num(mat)+num(lab)+num(sub)+num(coat);
  const saved = e.actuals!=null;
  const variance = estCost>0? Math.round((actTotal-estCost)/estCost*100):0;
  const actMargin = e.quotedValue>0? Math.round((e.quotedValue-actTotal)/e.quotedValue*100):0;
  const save=()=>{ update(e.id,x=>({...x,actuals:{mat:num(mat),lab:num(lab),sub:num(sub),coat:num(coat),by:user.id,when:new Date().toISOString()}}),"recorded actual costs ("+fmtGBP(actTotal)+")"); pushToast("Actual costs saved"); };
  return <div style={{marginTop:22}}>
    <SecBar>Estimated vs actual cost</SecBar>
    <div className="fieldgrid">
      <Field label="Actual material £"><input type="number" className="mono" value={mat} onChange={ev=>setMat(ev.target.value)}/></Field>
      <Field label="Actual labour £"><input type="number" className="mono" value={lab} onChange={ev=>setLab(ev.target.value)}/></Field>
      <Field label="Actual subcontract £"><input type="number" className="mono" value={sub} onChange={ev=>setSub(ev.target.value)}/></Field>
      <Field label="Actual coating £"><input type="number" className="mono" value={coat} onChange={ev=>setCoat(ev.target.value)}/></Field>
    </div>
    <div className="statgrid" style={{gridTemplateColumns:"repeat(4,1fr)",marginTop:14}}>
      <div className="stat"><div className="k">Estimated cost</div><div className="v" style={{fontSize:20}}>{fmtGBP(estCost)}</div></div>
      <div className="stat"><div className="k">Actual cost</div><div className="v" style={{fontSize:20}}>{fmtGBP(actTotal)}</div></div>
      <div className={"stat "+(variance<=0?"good":variance<=10?"warn":"alert")}><div className="k">Cost variance</div><div className="v">{variance>0?"+":""}{variance}%</div></div>
      <div className={"stat "+(actMargin>=30?"good":actMargin>=15?"warn":"alert")}><div className="k">Actual margin</div><div className="v">{actMargin}%</div></div>
    </div>
    <button className="btn btn--p" style={{marginTop:14}} onClick={save}>{saved?"Update actuals":"Save actuals"}</button>
    {saved && <span style={{marginLeft:12,color:"var(--t3)",fontSize:12}}>Last recorded by {uName(e.actuals.by)} on {fmtDate(e.actuals.when)}</span>}
  </div>;
}

function TabHandover({e,user,update}){
  const ITEMS=["SigmaMRP job/quote number confirmed","Customer PO received and number entered","PO price matches quote","PO quantity matches quote","Delivery date agreed","Correct drawing revision attached","Final CAD files attached","Material confirmed","Finish/coating confirmed","Route confirmed","Inspection requirements confirmed","Certificates confirmed"];
  const toggle=(i)=>update(e.id,x=>({...x,handover:{...x.handover,[i]:!x.handover[i]}}), null);
  const done=ITEMS.filter((_,i)=>e.handover[i]).length;
  const release=()=>update(e.id,x=>({...x,status:"Released to Production"}),"released the job to production");
  if(e.outcome!=="Won") return <><SecBar>Production handover</SecBar><div className="empty">Handover opens once the enquiry is marked <b style={{margin:"0 4px"}}>Won</b> in the Outcome tab.</div></>;
  return <>
    <SecBar>Production handover checklist</SecBar>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
      <div className="bartrack" style={{flex:1,height:10}}><div className="barfill" style={{width:(done/ITEMS.length*100)+"%",background:"var(--green)"}}></div></div>
      <span className="mono" style={{fontWeight:600}}>{done}/{ITEMS.length}</span>
    </div>
    {ITEMS.map((it,i)=><div className={"check"+(e.handover[i]?" done":"")} key={i}><input type="checkbox" id={"h"+i} checked={!!e.handover[i]} onChange={()=>toggle(i)}/><label htmlFor={"h"+i}>{it}</label></div>)}
    <button className="btn btn--green" style={{marginTop:14,opacity:done===ITEMS.length?1:.5}} disabled={done!==ITEMS.length||e.status==="Released to Production"} onClick={release}>{I.truck} {e.status==="Released to Production"?"Released to production":"Release to production"}</button>
  </>;
}

function TabAudit({e}){
  const rows=[...e.audit].sort((a,b)=>new Date(b.when)-new Date(a.when));
  return <><SecBar>Audit trail</SecBar>
    <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>Because everyone can work on every enquiry, the audit trail records exactly who did what, and when.</p>
    <div className="audit" style={{marginLeft:14}}>{rows.map(a=><div className="row" key={a.id}><span className="who">{uName(a.who)}</span> {a.action}<div className="when">{fmtDT(a.when)}</div></div>)}</div>
  </>;
}

/* ============================ NOTIFICATIONS ============================ */
function NotifPop({list,onClose,onOpen,onRead}){
  useEffect(()=>{ const id=setTimeout(onRead,1200); return ()=>clearTimeout(id); },[]);
  const col={chase:"var(--orange)",overdue:"var(--red)",task:"var(--blue)",supplier:"var(--amber)",won:"var(--green)",assign:"var(--violet)"};
  return <div className="notifpop" onClick={e=>e.stopPropagation()}>
    <div className="h"><b>Notifications</b><span style={{marginLeft:"auto",color:"var(--t3)",fontSize:12}}>{list.filter(n=>!n.read).length} unread</span></div>
    <div className="list">
      {list.length===0 && <div className="empty" style={{padding:30}}>You're all caught up.</div>}
      {list.map(n=><div key={n.id} className={"ni"+(n.read?"":" unread")} onClick={()=>onOpen(n.enq)}>
        <span className="ic" style={{background:col[n.type]||"var(--steel)"}}>{n.type==="chase"||n.type==="overdue"?I.phone:n.type==="task"?I.check:n.type==="won"?I.truck:I.bell}</span>
        <div><div className="t">{n.txt}</div><div className="w">{fmtDT(n.when)}</div></div>
      </div>)}
    </div>
    <div style={{padding:"10px 16px",borderTop:"1px solid var(--hair)",fontSize:11.5,color:"var(--t3)"}}>Notifications flag what needs attention — the task stays the official record.</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
