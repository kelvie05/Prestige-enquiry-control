<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prestige Fabrications — Enquiry Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --ink:#16202E; --slate:#22313F; --steel:#33475B;
    --orange:#015AFF; --orange-dk:#0042CC; --rte:#E2622C;
    --amber:#D69A2D; --green:#2E8F66; --red:#CF4B45; --blue:#3B72C9; --violet:#7A5BD0;
    --canvas:#EEF1F5; --surface:#FFFFFF; --hair:#D9DFE7; --hair-2:#E7ECF1;
    --t1:#16202E; --t2:#4A5A6B; --t3:#7E8D9B;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --ui:'Archivo',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --shadow:0 1px 2px rgba(22,32,46,.06),0 4px 14px rgba(22,32,46,.05);
    --shadow-lg:0 18px 50px rgba(22,32,46,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);color:var(--t1);background:var(--canvas);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  #root{height:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:var(--body);font-size:13px}
  .mono{font-family:var(--mono)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#c3ccd6;border-radius:6px;border:2px solid var(--canvas)}

  /* ---------- LOGIN ---------- */
  .login{height:100%;display:grid;grid-template-columns:1.05fr .95fr}
  .login__hero{background:
      linear-gradient(180deg,rgba(22,32,46,.86),rgba(22,32,46,.96)),
      repeating-linear-gradient(0deg,transparent 0 39px,rgba(255,255,255,.05) 39px 40px),
      repeating-linear-gradient(90deg,transparent 0 39px,rgba(255,255,255,.05) 39px 40px),
      var(--ink);
    color:#fff;padding:56px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .login__hero:before{content:"";position:absolute;right:-120px;top:-120px;width:380px;height:380px;border:1px solid rgba(1,90,255,.45);border-radius:50%}
  .login__hero:after{content:"";position:absolute;right:-60px;top:-60px;width:260px;height:260px;border:1px dashed rgba(255,255,255,.18);border-radius:50%}
  .brand{display:flex;align-items:center;gap:13px}
  .hero__logo{width:280px;max-width:72%;height:auto;display:block}
  .panel__logo{width:172px;height:auto;display:block;margin:0 0 22px}
  .side__logo{width:152px;height:auto;display:block;margin:2px 0 2px}
  .splash__logo{width:196px;height:auto;display:block}
  .brand__mark{width:42px;height:42px;border-radius:9px;background:linear-gradient(135deg,#2b3a4d,var(--orange));display:grid;place-items:center;font-family:var(--ui);font-weight:800;color:#fff;font-size:20px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}
  .brand__name{font-family:var(--ui);font-weight:800;letter-spacing:.5px;line-height:1.05}
  .brand__name small{display:block;font-weight:600;font-size:11px;letter-spacing:3px;color:var(--orange);text-transform:uppercase}
  .login__hero h1{font-family:var(--ui);font-weight:800;font-size:40px;line-height:1.06;letter-spacing:-.5px;max-width:9ch;margin-top:8px}
  .login__hero p{color:#aebccb;max-width:42ch;margin-top:16px;font-size:15px}
  .principle{margin-top:24px;border-left:3px solid var(--orange);padding:10px 16px;background:rgba(255,255,255,.04);max-width:46ch}
  .principle b{color:#fff}
  .login__hero .specrow{display:flex;gap:26px;color:#8294a6;font-family:var(--mono);font-size:11px;letter-spacing:1px}
  .login__hero .specrow span b{color:#fff;display:block;font-size:18px;letter-spacing:0}
  .login__panel{background:var(--surface);padding:56px;display:flex;flex-direction:column;justify-content:center}
  .login__panel h2{font-family:var(--ui);font-weight:700;font-size:22px}
  .login__panel .sub{color:var(--t2);margin:6px 0 26px}
  .userpick{display:flex;flex-direction:column;gap:10px;max-width:420px}
  .usercard{display:flex;align-items:center;gap:14px;border:1px solid var(--hair);border-radius:12px;padding:13px 15px;text-align:left;transition:.14s;background:#fff}
  .usercard:hover{border-color:var(--orange);box-shadow:var(--shadow);transform:translateY(-1px)}
  .usercard__name{font-family:var(--ui);font-weight:700}
  .usercard__role{color:var(--t3);font-size:12px}
  .usercard .chev{margin-left:auto;color:var(--t3)}

  .avatar{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;color:#fff;font-family:var(--ui);font-weight:700;font-size:13px;flex:none;letter-spacing:.3px}

  /* ---------- APP SHELL ---------- */
  .app{height:100%;display:grid;grid-template-columns:236px 1fr;grid-template-rows:60px 1fr;grid-template-areas:"side top" "side main"}
  .side{grid-area:side;background:var(--ink);color:#cfd8e2;display:flex;flex-direction:column;padding:16px 12px;gap:4px}
  .side__brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
  .side__brand .brand__mark{width:34px;height:34px;font-size:16px;border-radius:8px}
  .side__brand b{font-family:var(--ui);color:#fff;font-weight:800;font-size:14px;line-height:1}
  .side__brand small{display:block;color:var(--orange);font-size:9px;letter-spacing:2.5px;font-weight:600;margin-top:3px}
  .navlabel{font-size:10px;letter-spacing:1.6px;color:#5f7184;text-transform:uppercase;padding:14px 10px 6px;font-weight:600}
  .navitem{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;color:#bcc8d6;font-size:13.5px;font-weight:500;width:100%;text-align:left;transition:.12s;position:relative}
  .navitem:hover{background:rgba(255,255,255,.05);color:#fff}
  .navitem.active{background:rgba(1,90,255,.16);color:#fff}
  .navitem.active:before{content:"";position:absolute;left:-12px;top:7px;bottom:7px;width:3px;background:var(--orange);border-radius:0 3px 3px 0}
  .navitem .ico{width:18px;display:grid;place-items:center;opacity:.95}
  .navitem .badge{margin-left:auto;background:var(--orange);color:#fff;font-size:11px;font-weight:700;border-radius:20px;min-width:19px;height:19px;display:grid;place-items:center;padding:0 5px;font-family:var(--mono)}
  .side__foot{margin-top:auto;font-size:11px;color:#5f7184;padding:12px 10px;border-top:1px solid rgba(255,255,255,.07);line-height:1.5}

  .top{grid-area:top;background:var(--surface);border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:14px;padding:0 22px}
  .search{flex:1;max-width:520px;position:relative}
  .search input{width:100%;border:1px solid var(--hair);background:var(--canvas);border-radius:9px;padding:9px 12px 9px 34px;outline:none}
  .search input:focus{border-color:var(--orange);background:#fff}
  .search .sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3)}
  .top__btn{display:flex;align-items:center;gap:7px;border:1px solid var(--hair);border-radius:9px;padding:8px 12px;font-weight:600;color:var(--t1);background:#fff;font-size:13px}
  .top__btn:hover{border-color:var(--orange);color:var(--orange)}
  .top__btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}
  .top__btn.primary:hover{background:var(--orange-dk);color:#fff}
  .bell{position:relative;width:38px;height:38px;border-radius:9px;border:1px solid var(--hair);display:grid;place-items:center;color:var(--t2);background:#fff}
  .bell:hover{border-color:var(--orange);color:var(--orange)}
  .bell .dot{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;min-width:18px;height:18px;display:grid;place-items:center;padding:0 4px;font-family:var(--mono);border:2px solid #fff}
  .who{display:flex;align-items:center;gap:9px;border:1px solid var(--hair);border-radius:9px;padding:5px 10px 5px 6px;background:#fff}
  .who:hover{border-color:var(--orange)}
  .who small{display:block;color:var(--t3);font-size:11px;line-height:1.1}
  .who b{font-family:var(--ui);font-size:13px;line-height:1.2}

  .main{grid-area:main;overflow:auto;padding:24px 26px 60px}
  .pagehead{display:flex;align-items:flex-end;gap:16px;margin-bottom:20px}
  .pagehead h1{font-family:var(--ui);font-weight:800;font-size:24px;letter-spacing:-.3px}
  .pagehead .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--orange);text-transform:uppercase;font-weight:600;margin-bottom:3px}
  .pagehead .spacer{flex:1}

  /* ---------- CARDS / GRID ---------- */
  .statgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:14px;margin-bottom:22px}
  .stat{background:#fff;border:1px solid var(--hair);border-radius:13px;padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:.13s}
  .stat:hover{transform:translateY(-2px);border-color:#c5cfdb}
  .stat .k{font-size:12px;color:var(--t2);font-weight:600;display:flex;align-items:center;gap:7px}
  .stat .v{font-family:var(--mono);font-weight:600;font-size:30px;margin-top:8px;letter-spacing:-1px}
  .stat .sub{font-size:11.5px;color:var(--t3);margin-top:2px}
  .stat .tag{position:absolute;top:13px;right:13px;width:9px;height:9px;border-radius:50%}
  .stat.alert .v{color:var(--red)}
  .stat.warn .v{color:var(--amber)}
  .stat.good .v{color:var(--green)}

  .panel{background:#fff;border:1px solid var(--hair);border-radius:13px;box-shadow:var(--shadow);overflow:hidden}
  .panel__h{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--hair-2)}
  .panel__h h3{font-family:var(--ui);font-weight:700;font-size:15px}
  .panel__h .spacer{flex:1}
  .panel__h .count{font-family:var(--mono);font-size:12px;color:var(--t3);background:var(--canvas);padding:2px 8px;border-radius:6px}

  .cols{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
  @media(max-width:1080px){.cols{grid-template-columns:1fr}}

  /* ---------- TABLE ---------- */
  .ftbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .seg{display:inline-flex;background:#fff;border:1px solid var(--hair);border-radius:9px;padding:3px;gap:2px}
  .seg button{padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--t2)}
  .seg button.active{background:var(--ink);color:#fff}
  .pill-sel{border:1px solid var(--hair);background:#fff;border-radius:9px;padding:8px 11px;font-weight:500;color:var(--t1);font-size:13px}
  .table-wrap{overflow:auto;border:1px solid var(--hair);border-radius:13px;background:#fff;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;min-width:880px}
  thead th{text-align:left;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--hair);background:#fafbfc;position:sticky;top:0}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--hair-2);vertical-align:middle}
  tbody tr{cursor:pointer;transition:.1s}
  tbody tr:hover{background:#f7f9fb}
  tbody tr:last-child td{border-bottom:none}
  .cust{font-weight:600}
  .sub-c{color:var(--t3);font-size:12px}
  .idcell{font-family:var(--mono);font-weight:600;font-size:12.5px}
  .idcell small{display:block;color:var(--t3);font-weight:500;font-size:11px}

  /* ---------- PILLS ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;line-height:1.5}
  .pill:before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .pill--grey{background:#eef1f5;color:#5a6b7b}
  .pill--blue{background:#e7f0fc;color:var(--blue)}
  .pill--amber{background:#fbf2dd;color:#a9781a}
  .pill--green{background:#e0f2ea;color:var(--green)}
  .pill--red{background:#fbe6e5;color:var(--red)}
  .pill--violet{background:#efeafb;color:var(--violet)}
  .pill--orange{background:#fdeadf;color:var(--rte)}
  .prio{font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:5px}
  .prio--High{background:#fbe6e5;color:var(--red)}
  .prio--Medium{background:#fbf2dd;color:#a9781a}
  .prio--Low{background:#eef1f5;color:#6b7a89}

  .owner{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500}
  .av-sm{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;color:#fff;font-family:var(--ui);font-weight:700;font-size:10px;flex:none}

  /* ---------- DRAWER / MODAL ---------- */
  .scrim{position:fixed;inset:0;background:rgba(16,24,34,.46);backdrop-filter:blur(2px);z-index:40;display:flex;justify-content:flex-end;animation:fade .15s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .drawer{width:min(960px,94vw);background:var(--canvas);height:100%;overflow:auto;box-shadow:var(--shadow-lg);animation:slide .22s cubic-bezier(.2,.7,.2,1)}
  @keyframes slide{from{transform:translateX(40px);opacity:.6}to{transform:translateX(0);opacity:1}}
  .modal{margin:auto;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);width:min(720px,94vw);max-height:92vh;overflow:auto;animation:pop .16s ease}
  .center-scrim{align-items:center;justify-content:center}
  @keyframes pop{from{transform:scale(.97);opacity:.5}to{transform:scale(1);opacity:1}}

  .dh{background:#fff;border-bottom:1px solid var(--hair);padding:18px 24px;position:sticky;top:0;z-index:2}
  .dh__top{display:flex;align-items:center;gap:12px}
  .dh__id{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--orange)}
  .dh h2{font-family:var(--ui);font-weight:800;font-size:20px;margin-top:5px}
  .dh .meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;color:var(--t2);font-size:12.5px}
  .dh .meta b{color:var(--t1)}
  .x{margin-left:auto;width:34px;height:34px;border-radius:8px;border:1px solid var(--hair);display:grid;place-items:center;color:var(--t2);background:#fff;font-size:18px}
  .x:hover{border-color:var(--red);color:var(--red)}

  .tabs{display:flex;gap:2px;padding:0 18px;background:#fff;border-bottom:1px solid var(--hair);overflow:auto;position:sticky;top:0;z-index:1}
  .tabs button{padding:12px 13px;font-size:13px;font-weight:600;color:var(--t2);border-bottom:2px solid transparent;white-space:nowrap}
  .tabs button:hover{color:var(--t1)}
  .tabs button.active{color:var(--ink);border-bottom-color:var(--orange)}
  .tabs button .n{font-family:var(--mono);font-size:10px;background:var(--canvas);color:var(--t3);padding:1px 5px;border-radius:5px;margin-left:5px}
  .dbody{padding:22px 24px}

  .fieldgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .fieldgrid.three{grid-template-columns:repeat(3,1fr)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--t3)}
  .field label .req{color:var(--orange)}
  .field input,.field select,.field textarea{border:1px solid var(--hair);border-radius:8px;padding:9px 11px;background:#fff;outline:none;width:100%}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange)}
  .field .val{font-weight:600;padding:7px 0}
  .field .val.mono{font-family:var(--mono)}
  .full{grid-column:1/-1}

  .secbar{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
  .secbar h4{font-family:var(--ui);font-weight:700;font-size:14px}
  .secbar .line{flex:1;height:1px;background:var(--hair)}

  .btn{display:inline-flex;align-items:center;gap:7px;border-radius:8px;padding:8px 13px;font-weight:600;font-size:13px;transition:.12s;border:1px solid transparent}
  .btn--p{background:var(--orange);color:#fff}.btn--p:hover{background:var(--orange-dk)}
  .btn--d{background:var(--ink);color:#fff}.btn--d:hover{background:var(--slate)}
  .btn--g{background:#fff;border-color:var(--hair);color:var(--t1)}.btn--g:hover{border-color:var(--orange);color:var(--orange)}
  .btn--green{background:var(--green);color:#fff}.btn--green:hover{filter:brightness(.94)}
  .btn--sm{padding:6px 10px;font-size:12px}

  .note{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--hair-2)}
  .note:last-child{border-bottom:none}
  .note .body{flex:1}
  .note .head{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3)}
  .note .head b{color:var(--t1);font-family:var(--ui)}
  .note .txt{margin-top:4px}

  .audit{position:relative;padding-left:20px}
  .audit .row{position:relative;padding:9px 0 9px 4px;border-bottom:1px dashed var(--hair-2);font-size:13px}
  .audit .row:before{content:"";position:absolute;left:-16px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 3px #e2ecff}
  .audit:before{content:"";position:absolute;left:-12px;top:6px;bottom:6px;width:2px;background:var(--hair)}
  .audit .when{font-family:var(--mono);font-size:11px;color:var(--t3)}
  .audit .who{font-weight:600}

  .check{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--hair);border-radius:9px;margin-bottom:8px;background:#fff}
  .check input{width:17px;height:17px;accent-color:var(--green)}
  .check.done{background:#f3faf6;border-color:#cde9da}
  .check label{font-weight:500;cursor:pointer;flex:1}

  .barrow{display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px;margin-bottom:9px}
  .barrow .lbl{font-size:12.5px;font-weight:500}
  .bartrack{height:24px;background:var(--canvas);border-radius:6px;overflow:hidden}
  .barfill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;color:#fff;font-family:var(--mono);font-size:11px;font-weight:600;padding-right:7px;min-width:24px;transition:width .5s ease}
  .barval{font-family:var(--mono);font-weight:600;text-align:right}

  .funnel{display:flex;flex-direction:column;gap:7px}
  .funnel .fr{display:flex;align-items:center;gap:12px}
  .funnel .ftrack{flex:1;height:34px;background:var(--canvas);border-radius:8px;overflow:hidden;display:flex}
  .funnel .ffill{height:100%;background:linear-gradient(90deg,var(--ink),var(--steel));display:flex;align-items:center;padding-left:12px;color:#fff;font-family:var(--ui);font-weight:700;font-size:13px;transition:width .5s}
  .funnel .flab{width:170px;font-size:13px;font-weight:600}

  .empty{padding:34px;text-align:center;color:var(--t3)}
  .empty .big{font-size:30px;margin-bottom:8px;opacity:.5}

  .toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;box-shadow:var(--shadow-lg);font-weight:500;font-size:13px;display:flex;align-items:center;gap:9px;animation:pop .15s ease}
  .toast .ic{color:var(--green)}

  .notifpop{position:absolute;top:52px;right:120px;width:380px;background:#fff;border:1px solid var(--hair);border-radius:14px;box-shadow:var(--shadow-lg);z-index:50;overflow:hidden}
  .notifpop .h{padding:13px 16px;border-bottom:1px solid var(--hair);display:flex;align-items:center}
  .notifpop .h b{font-family:var(--ui);font-weight:700}
  .notifpop .list{max-height:380px;overflow:auto}
  .ni{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--hair-2);cursor:pointer}
  .ni:hover{background:#f7f9fb}
  .ni.unread{background:#fdf6f1}
  .ni .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;color:#fff}
  .ni .t{font-size:13px}
  .ni .w{font-size:11px;color:var(--t3);font-family:var(--mono);margin-top:2px}

  .whopop{position:absolute;top:52px;right:22px;width:250px;background:#fff;border:1px solid var(--hair);border-radius:13px;box-shadow:var(--shadow-lg);z-index:50;overflow:hidden;padding:6px}
  .whopop .opt{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;width:100%;text-align:left}
  .whopop .opt:hover{background:#f4f7fa}
  .whopop .opt.active{background:#e8efff}

  .tag-line{display:inline-flex;gap:6px;align-items:center;font-size:12px;color:var(--t2)}
  .kbd{font-family:var(--mono);font-size:11px;background:var(--canvas);border:1px solid var(--hair);border-radius:5px;padding:1px 6px;color:var(--t2)}
  .hint{background:#eef4fb;border:1px solid #d3e3f6;color:#2c5a93;border-radius:9px;padding:10px 13px;font-size:12.5px;display:flex;gap:9px;align-items:flex-start;margin-bottom:16px}
  .warnbox{background:#fdf1ef;border:1px solid #f3cfca;color:#a23a32;border-radius:9px;padding:9px 12px;font-size:12.5px;margin-top:6px;display:flex;gap:8px;align-items:flex-start}
  .pickup{background:linear-gradient(100deg,#22313F,#16202E);color:#fff;border-radius:11px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .pickup .t{flex:1}.pickup .t b{font-family:var(--ui)}
  .pickup .t small{display:block;color:#aebccb;font-size:12px}
  /* ============ Phase 2 additions ============ */
  :root{--line:var(--hair)}
  .btn--primary{background:var(--orange);color:#fff}
  .btn--primary:hover{background:var(--orange-dk)}
  .btn--danger{background:var(--red);color:#fff}
  .btn--danger:hover{filter:brightness(.94)}
  .btn.wide{width:100%;justify-content:center;padding:11px}
  .btn.sm{padding:5px 9px;font-size:12px}
  .icobtn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;border:1px solid var(--hair);background:#fff;color:var(--t3);cursor:pointer;transition:.12s;flex:none}
  .icobtn:hover{border-color:var(--orange);color:var(--orange)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn--p:disabled:hover{background:var(--orange)}

  .splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--canvas)}
  .brand__mark.big{width:64px;height:64px;border-radius:16px;font-size:30px}
  .splash__txt{color:var(--t3);font-size:14px}

  .loginform{display:flex;flex-direction:column;gap:12px;margin-bottom:6px}
  .loginerr{background:#fdecea;border:1px solid #f5c6c2;color:#a3322c;padding:9px 12px;border-radius:8px;font-size:13px}
  .quicklbl{margin:20px 0 10px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}

  .whopop__lbl{padding:9px 11px 10px;font-size:11px;color:var(--t3);border-bottom:1px solid var(--hair-2);margin-bottom:4px;line-height:1.45}
  .opt.logout{border-top:1px solid var(--hair-2);margin-top:5px;color:var(--red)}

  .ovr{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);cursor:pointer}
  .ovr input{width:15px;height:15px}

  .sp{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .sp--open{background:#eaf1fb;color:var(--blue)}
  .sp--ok{background:#e7f2ec;color:var(--green)}
  .sp--late{background:#fdecea;color:var(--red)}
  .sp--off{background:#eef1f5;color:var(--t3)}

  @media print{
    .side,.top,.tabs,.noprint,.bell,.who,.toast-wrap,.pickup{display:none !important}
    .app{display:block;background:#fff}
    .main{padding:0 !important;overflow:visible !important;height:auto !important}
    .panel{box-shadow:none;border:1px solid var(--hair);break-inside:avoid}
    .cols{display:block}
    .panel,.statgrid{margin-bottom:14px}
    body,html{background:#fff}
    @page{margin:14mm}
  }
  /* ---- demo-only styling ---- */
  .demopick{margin-top:22px;border-top:1px solid var(--hair-2);padding-top:18px}
  .demopick__lbl{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
  .demopick__u{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;margin-bottom:7px;border:1px solid var(--hair);border-radius:9px;background:#fff;cursor:pointer;transition:.12s;text-align:left}
  .demopick__u:hover{border-color:var(--orange);background:#eef3ff}
  .demopick__u small{color:var(--t3);font-size:11px}
  .demopick__u b{font-family:var(--ui);font-size:13px}
  .demopick__note{margin-top:8px;font-size:11px;color:var(--t3);line-height:1.5}
  .demobadge{display:inline-block;background:var(--orange);color:#fff;font-family:var(--ui);font-weight:700;font-size:10px;letter-spacing:.04em;padding:3px 8px;border-radius:6px;margin-bottom:10px}
</style>

const J = (m,b)=>({method:m,credentials:"include",headers:{"Content-Type":"application/json"},body:b!=null?JSON.stringify(b):undefined});
let api = {
  async login(username,password){
    const r=await fetch("/api/login",J("POST",{username,password}));
    const d=await r.json(); if(!r.ok) throw new Error(d.error||"Login failed"); return d.user;
  },
  async logout(){ try{await fetch("/api/logout",J("POST"));}catch(e){} },
  async state(){ const r=await fetch("/api/state",{credentials:"include"}); if(r.status===401) return null; return r.json(); },
  async seed(enquiries,notifications){ await fetch("/api/seed",J("POST",{enquiries,notifications})); },
  async create(data,override){ const r=await fetch("/api/enquiries",J("POST",{data,override:!!override})); const d=await r.json(); if(r.status===409) return {duplicate:true,on:d.on}; return d; },
  async put(id,data){ try{await fetch("/api/enquiries/"+id,J("PUT",{data}));}catch(e){} },
  async sigmaCheck(n,exclude){ const r=await fetch("/api/sigma-check?n="+encodeURIComponent(n)+(exclude?"&exclude="+encodeURIComponent(exclude):""),{credentials:"include"}); return r.json(); },
  async notify(user,type,txt,enq){ try{await fetch("/api/notifications",J("POST",{user,type,txt,enq}));}catch(e){} },
  async markRead(){ try{await fetch("/api/notifications/read",J("POST"));}catch(e){} },
  async upload(name,type,b64){ const r=await fetch("/api/uploads",J("POST",{name,type,b64})); return r.json(); },
  async addSupplier(name){ const r=await fetch("/api/suppliers",J("POST",{name})); return r.json(); },
  async listUsers(){ const r=await fetch("/api/users",{credentials:"include"}); if(!r.ok) return {users:[],roles:[]}; return r.json(); },
  async createUser(d){ const r=await fetch("/api/users",J("POST",d)); const j=await r.json(); return {ok:r.ok, ...j}; },
  async updateUser(id,d){ const r=await fetch("/api/users/"+id,J("PUT",d)); const j=await r.json(); return {ok:r.ok, ...j}; },
};

function lineTotals(li){
  const cost = (li.matCost||0)+(li.labCost||0)+(li.subCost||0)+(li.coatCost||0);
  const lineTotal = (li.unitSell||0)*(li.qty||0);
  const margin = lineTotal>0 ? Math.round((lineTotal-cost)/lineTotal*1000)/10 : 0;
  return {cost,lineTotal,margin};
}

/* ============================ DEMO BACKEND (in-memory, no server) ============================ */
if(DEMO){
  const ROLES=["Admin","Estimator","Sales/Admin","Management","Production Manager"];
  let DEMO_ENQ = SEED.slice();
  let DEMO_NOTIF = SEED_NOTIF.slice();
  let DEMO_SUPPLIERS = [
    {id:"s1",name:"Wedge Galvanising"},{id:"s2",name:"Tata Steel Service Centre"},
    {id:"s3",name:"AceCoat Powder Coating"},{id:"s4",name:"Bri-Stor Laser Profiling"},
    {id:"s5",name:"ProSurface Finishers"},
  ];
  let demoUser = null;
  let seq = 132, sup = 6, usr = 6;
  const sleep = ()=>new Promise(r=>setTimeout(r,120)); // tiny delay so it feels real
  api = {
    async login(username){ await sleep();
      const un=(username||"").trim().toLowerCase();
      demoUser = USERS.find(u=>firstname(u.name)===un) || USERS[0];
      return demoUser;
    },
    async logout(){ demoUser=null; },
    async state(){ await sleep();
      if(!demoUser) return null;
      return {user:demoUser, users:USERS.slice(), enquiries:DEMO_ENQ.slice(),
              notifications:DEMO_NOTIF.slice(), suppliers:DEMO_SUPPLIERS.slice(), needsSeed:false};
    },
    async seed(){},
    async create(data,override){
      const dup = DEMO_ENQ.find(e=>String(e.sigma)===String(data.sigma)&&!["Lost","No Quote","Dormant"].includes(e.status));
      if(dup && !override) return {duplicate:true, on:[dup.id]};
      seq+=1; const id="ENQ-2026-"+String(seq).padStart(6,"0");
      const enq={...data,id}; DEMO_ENQ=[enq,...DEMO_ENQ]; return {enquiry:enq};
    },
    async put(id,data){ DEMO_ENQ=DEMO_ENQ.map(e=>e.id===id?data:e); },
    async sigmaCheck(n,exclude){
      const on=DEMO_ENQ.filter(e=>String(e.sigma)===String(n)&&e.id!==exclude&&!["Lost","No Quote","Dormant"].includes(e.status)).map(e=>e.id);
      return {duplicate:on.length>0, on};
    },
    async notify(){}, async markRead(){},
    async upload(name){ return {name, url:"#", size:0}; },
    async addSupplier(name){ const s={id:"s"+(sup++),name}; DEMO_SUPPLIERS=[...DEMO_SUPPLIERS,s]; return s; },
    async listUsers(){ return {users:USERS.map(u=>({...u,username:firstname(u.name),active:u.active!==false})), roles:ROLES}; },
    async createUser(d){
      if(USERS.some(u=>firstname(u.name)===(d.username||"").toLowerCase())) return {ok:false,error:"That username is already taken."};
      const u={id:"u"+(usr++),name:d.name,role:d.role,c:AV[USERS.length%AV.length],active:true};
      USERS.push(u); return {ok:true,user:u};
    },
    async updateUser(id,d){
      const u=USERS.find(x=>x.id===id); if(!u) return {ok:false,error:"Not found"};
      if(d.name) u.name=d.name; if(d.role) u.role=d.role;
      if(typeof d.active==="boolean") u.active=d.active;
      return {ok:true,user:u};
    },
  };
}

/* ============================ APP ============================ */
function App(){
  const [booting,setBooting]=useState(true);
  const [user,setUser]=useState(null);
  const [enq,setEnq]=useState([]);
  const [notif,setNotif]=useState([]);
  const [view,setView]=useState("dashboard");
  const [openId,setOpenId]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [search,setSearch]=useState("");
  const [showNotif,setShowNotif]=useState(false);
  const [showWho,setShowWho]=useState(false);

  const loadState = useCallback(async ()=>{
    const st = await api.state();
    if(!st){ setUser(null); setBooting(false); return; }
    if(Array.isArray(st.users)&&st.users.length){ USERS.length=0; USERS.push(...st.users); }
    SUPPLIERS.length=0; SUPPLIERS.push(...(st.suppliers||[]));
    if(st.needsSeed){ await api.seed(SEED, SEED_NOTIF); return loadState(); }
    setUser(st.user); setEnq(st.enquiries||[]); setNotif(st.notifications||[]); setBooting(false);
  },[]);
  useEffect(()=>{ loadState(); },[loadState]);

  const open = enq.find(e=>e.id===openId);
  const myNotif = notif.filter(n=>n.user===(user&&user.id));
  const unread = myNotif.filter(n=>!n.read).length;

  // mutate an enquiry + record audit, then persist to the backend
  const update = (id, fn, auditAction) => {
    setEnq(prev => prev.map(e => {
      if(e.id!==id) return e;
      const next = fn({...e});
      if(auditAction) next.audit = [...(e.audit||[]), aud(user.id, auditAction)];
      api.put(id, next);
      return next;
    }));
  };
  const notifyUser = (uid,type,txt,eid) => {
    if(uid===user.id) return; // don't notify yourself
    setNotif(p=>[{id:++NID,user:uid,type,txt,enq:eid,when:new Date().toISOString(),read:false},...p]);
    api.notify(uid,type,txt,eid);
  };
  const addEnquiry = e => { setEnq(p=>[e,...p]); };
  const logout = async () => { await api.logout(); setUser(null); setEnq([]); setNotif([]); };
  const switchUser = async (un) => { await api.login(un); setShowWho(false); await loadState(); pushToast("Switched to "+un.charAt(0).toUpperCase()+un.slice(1)); };

  if(booting) return <Splash/>;
  if(!user) return <Login onDone={loadState}/>;

  const counts = {
    enquiries: enq.length,
    tasks: enq.flatMap(e=>e.tasks||[]).filter(t=>t.status!=="Completed"&&t.status!=="Cancelled").length,
    chase: enq.filter(e=>e.status==="Quote Sent").length,
  };

  return (
    <div className="app">

        <button className={"navitem"+(view==="tasks"?" active":"")} onClick={()=>{setView("tasks");setOpenId(null);}}><span className="ico">{I.check}</span>Tasks<span className="badge">{counts.tasks}</span></button>
        <button className={"navitem"+(view==="chasing"?" active":"")} onClick={()=>{setView("chasing");setOpenId(null);}}><span className="ico">{I.phone}</span>Chasing<span className="badge">{counts.chase}</span></button>

        <button className={"navitem"+(view==="reports"?" active":"")} onClick={()=>{setView("reports");setOpenId(null);}}><span className="ico">{I.chart}</span>Reports</button>
        {user.role==="Admin" && <>
          <div className="navlabel">Admin</div>
          <button className={"navitem"+(view==="users"?" active":"")} onClick={()=>{setView("users");setOpenId(null);}}><span className="ico">{I.users}</span>Users</button>
        </>}

      </aside>

            <button key={u.id} className="opt" onClick={()=>switchUser(firstname(u.name))}>
              <span className="av-sm" style={{background:u.c}}>{initials(u.name)}</span>
              <span style={{textAlign:"left"}}><b style={{fontFamily:"var(--ui)",fontSize:13}}>{u.name}</b><br/><small style={{color:"var(--t3)",fontSize:11}}>{u.role}</small></span>
            </button>)}
        </>}
        <button className="opt logout" onClick={logout}><span className="av-sm" style={{background:"#7E8D9B"}}>{I.out}</span><span style={{textAlign:"left"}}><b style={{fontFamily:"var(--ui)",fontSize:13}}>Sign out</b></span></button>
      </div>}

      <main className="main" onClick={()=>{showNotif&&setShowNotif(false);showWho&&setShowWho(false);}}>
        {view==="dashboard" && <Dashboard enq={enq} user={user} onOpen={setOpenId} setView={setView} myNotif={myNotif}/>}
        {view==="enquiries" && <Enquiries enq={enq} user={user} onOpen={setOpenId} search={search} setSearch={setSearch}/>}
        {view==="tasks" && <Tasks enq={enq} user={user} onOpen={setOpenId} update={update}/>}
        {view==="chasing" && <Chasing enq={enq} user={user} onOpen={setOpenId}/>}
        {view==="reports" && <Reports enq={enq}/>}
        {view==="users" && user.role==="Admin" && <Users user={user} reload={loadState}/>}
      </main>

      {open && <Drawer e={open} user={user} onClose={()=>setOpenId(null)} update={update} notifyUser={notifyUser}/>}
      {showNew && <NewEnquiry enq={enq} user={user} onClose={()=>setShowNew(false)} onCreate={(e)=>{addEnquiry(e);setShowNew(false);setOpenId(e.id);pushToast("Enquiry "+e.id+" created");}}/>}

      <Toasts/>
    </div>
  );
}

/* ============================ LOGIN ============================ */
function Login({onDone}){
  const [username,setU]=useState("");
  const [password,setP]=useState("");

  const [busy,setBusy]=useState(false);
  const submit = async (un,pw) => {
    setErr(""); setBusy(true);
    try{ await api.login(un,pw); await onDone(); }
    catch(e){ setErr(e.message||"Login failed"); setBusy(false); }
  };
  return (
    <div className="login">
      <div className="login__hero">
        <img src={LOGO_WHITE} className="hero__logo" alt="Prestige Fabrications"/>
        <div>
          <h1>Enquiry Control Board</h1>
          <p>One shared board for every enquiry — from the moment it lands to production handover. Log it, estimate it, quote it, chase it, win it.</p>
          <div className="principle"><b>Core principle.</b> Assignment controls responsibility and notifications — not visibility or access. Anyone on the team can open, progress, or pick up any enquiry.</div>
        </div>
        <div className="specrow">
          <span><b>SigmaMRP</b>manual logging</span>
          <span><b>Saved</b>real database</span>
          <span><b>Audited</b>who · what · when</span>
        </div>
      </div>
      <div className="login__panel">
        <img src={LOGO_BLUE} className="panel__logo" alt="Prestige Fabrications"/>
        <h2>Sign in</h2>
        <p className="sub">Each person has their own login so the audit trail stays accurate.</p>
        <div className="loginform">
          <Field label="Username"><input value={username} autoFocus onChange={e=>setU(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")submit(username,password);}} placeholder="Username"/></Field>
          <Field label="Password"><input type="password" value={password} onChange={e=>setP(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")submit(username,password);}} placeholder="••••••"/></Field>
          {err && <div className="loginerr">{err}</div>}
          <button className="btn btn--primary wide" disabled={busy} onClick={()=>submit(username,password)}>{busy?"Signing in…":"Sign in"}</button>
        </div>
        {DEMO && <div className="demopick">
          <div className="demopick__lbl">Demo — tap a person to sign in</div>
          {USERS.map(u=><button key={u.id} className="demopick__u" disabled={busy} onClick={()=>submit(firstname(u.name),"demo")}>
            <span className="av-sm" style={{background:u.c}}>{initials(u.name)}</span>
            <span style={{textAlign:"left"}}><b>{u.name}</b><br/><small>{u.role}</small></span>
          </button>)}
          <p className="demopick__note">This is a self-contained demo with example data. Nothing is saved — refresh the page to reset everything.</p>
        </div>}
      </div>
    </div>
  );
}

/* ============================ DASHBOARD ============================ */
function Dashboard({enq,user,onOpen,setView,myNotif}){
  const open = enq.filter(e=>!["Lost","No Quote","Released to Production"].includes(e.status));
  const stats = {
    newToday: enq.filter(e=>isToday(e.receivedAt)).length,
    open: open.length,
    dueToday: enq.filter(e=>e.status!=="Quote Sent" && isToday(e.quoteDueDate)).length,
    overdue: enq.filter(e=>e.status!=="Quote Sent" && !e.outcome && isOverdue(e.quoteDueDate)).length,
    waitCust: enq.filter(e=>e.status==="Waiting for Customer Clarification"||e.status==="Waiting for Drawings").length,
    waitSup: enq.filter(e=>e.status==="Waiting for Supplier Price").length,
    sent: enq.filter(e=>e.status==="Quote Sent").length,
    chase: enq.filter(e=>e.status==="Quote Sent" && e.chases.some(c=>isOverdue(c.next)||isToday(c.next))).length,
    wonPO: enq.filter(e=>e.status==="Won - Awaiting PO").length,
    approvals: enq.filter(e=>(e.approval||{}).state==="Requested").length,
  };
  const openValue = enq.filter(e=>e.status==="Quote Sent").reduce((s,e)=>s+(e.quotedValue||0),0);
  const recent = [...enq].flatMap(e=>e.audit.map(a=>({...a,eid:e.id,cust:e.customer}))).sort((a,b)=>new Date(b.when)-new Date(a.when)).slice(0,7);
  const mine = enq.filter(e=>e.responsible===user.id && !e.outcome);

  const C = ({k,v,sub,cls,onClick}) => <div className={"stat "+(cls||"")} onClick={onClick}><div className="k">{k}</div><div className="v">{v}</div>{sub&&<div className="sub">{sub}</div>}</div>;

  return <>
    <div className="pagehead">
      <div>
        <div className="eyebrow">Company-wide · {fmtDate(new Date().toISOString())}</div>
        <h1>Estimating control room</h1>
      </div>
      <div className="spacer"></div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:"var(--mono)",fontSize:26,fontWeight:600,color:"var(--ink)"}}>{fmtGBP(openValue)}</div>
        <div style={{color:"var(--t3)",fontSize:12}}>open quoted value out to customers</div>
      </div>
    </div>

    <div className="statgrid">
      <C k="New today" v={stats.newToday} cls="" onClick={()=>setView("enquiries")}/>
      <C k="Open enquiries" v={stats.open} onClick={()=>setView("enquiries")}/>
      <C k="Quotes due today" v={stats.dueToday} cls={stats.dueToday?"warn":""}/>
      <C k="Overdue" v={stats.overdue} cls={stats.overdue?"alert":""} sub="past quote-due date"/>
      <C k="Waiting on customer" v={stats.waitCust} cls="warn"/>
      <C k="Waiting on supplier" v={stats.waitSup} cls="warn"/>
      <C k="Quotes sent" v={stats.sent} cls="" sub="awaiting response"/>
      <C k="Need chase" v={stats.chase} cls={stats.chase?"alert":""} onClick={()=>setView("chasing")}/>
      <C k="Won — awaiting PO" v={stats.wonPO} cls="good"/>
      {stats.approvals>0 && <C k="Approvals pending" v={stats.approvals} cls="alert" sub={user.role==="Management"?"need your sign-off":"awaiting management"} onClick={()=>setView("enquiries")}/>}
    </div>

    <div className="cols">
      <div className="panel">
        <div className="panel__h"><h3>Live enquiry board</h3><span className="count">{open.length} active</span><div className="spacer"></div><button className="btn btn--g btn--sm" onClick={()=>setView("enquiries")}>Open all</button></div>
        <div className="table-wrap" style={{border:"none",boxShadow:"none",borderRadius:0}}>
          <table>
            <thead><tr><th>Enquiry</th><th>Customer</th><th>Status</th><th>Owner</th><th>Due</th><th>Value</th></tr></thead>
            <tbody>{open.slice(0,7).map(e=>
              <tr key={e.id} onClick={()=>onOpen(e.id)}>
                <td><div className="idcell">{e.id.replace("ENQ-2026-","#")}<small>SIG {e.sigma}</small></div></td>
                <td><div className="cust">{e.customer}</div><div className="sub-c">{e.summary.slice(0,38)}…</div></td>
                <td><Pill s={e.status}/></td>
                <td><Owner id={e.responsible}/></td>
                <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(e.quoteDueDate)&&!e.outcome?"var(--red)":"var(--t2)"}}>{fmtDate(e.quoteDueDate)}</td>
                <td className="mono" style={{fontWeight:600}}>{fmtGBP(e.quotedValue||e.estValue)}</td>
              </tr>)}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        <div className="panel">
          <div className="panel__h"><h3>My responsibilities</h3><span className="count">{mine.length}</span></div>
          <div style={{padding:"6px 8px"}}>
            {mine.length===0 && <div className="empty" style={{padding:24}}>Nothing assigned to you right now.</div>}
            {mine.map(e=><button key={e.id} className="navitem" style={{color:"var(--t1)"}} onClick={()=>onOpen(e.id)}>
              <span style={{flex:1,textAlign:"left"}}><b style={{fontFamily:"var(--ui)",fontSize:13}}>{e.customer}</b><br/><span style={{color:"var(--t3)",fontSize:12}}>{e.status}</span></span>
              {isOverdue(e.quoteDueDate)&&!e.outcome && <span className="prio prio--High">Overdue</span>}

              <span className="who">{uName(a.who)}</span> {a.action} <span style={{color:"var(--t3)"}}>· {a.cust}</span>

/* ============================ ENQUIRIES LIST ============================ */
function Enquiries({enq,user,onOpen,search,setSearch}){
  const VIEWS = [["all","All enquiries"],["mine","My assigned"],["resp","I'm responsible"],["chase","My chases"]];
  const [v,setV]=useState("all");
  const [status,setStatus]=useState("All");
  const [sf,setSf]=useState(search||"");
  useEffect(()=>{ setSf(search); },[search]);

  let rows = enq;
  if(v==="mine") rows = rows.filter(e=>e.assignedEstimator===user.id);
  if(v==="resp") rows = rows.filter(e=>e.responsible===user.id);
  if(v==="chase") rows = rows.filter(e=>e.assignedChaseUser===user.id && e.status==="Quote Sent");
  if(status!=="All") rows = rows.filter(e=>e.status===status);
  const q=(sf||"").toLowerCase();
  if(q) rows = rows.filter(e=> [e.id,e.sigma,e.customer,e.contact,e.summary,e.rfqRef,...(e.lines||[]).flatMap(l=>[l.part,l.draw])].join(" ").toLowerCase().includes(q));

  return <>
    <div className="pagehead"><div><div className="eyebrow">Shared · everyone sees everything</div><h1>All enquiries</h1></div></div>
    <div className="hint">{I.users}<div><b>This is a shared board.</b> The views below are filters, not access limits. You can open and progress any enquiry, including ones assigned to a colleague.</div></div>
    <div className="ftbar">
      <div className="seg">{VIEWS.map(([k,l])=><button key={k} className={v===k?"active":""} onClick={()=>setV(k)}>{l}</button>)}</div>
      <select className="pill-sel" value={status} onChange={e=>setStatus(e.target.value)}>
        <option>All</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
      <div className="search" style={{maxWidth:280}}>
        <span className="sico">{I.search}</span>
        <input placeholder="Filter these results…" value={sf} onChange={e=>{setSf(e.target.value);setSearch&&setSearch(e.target.value);}}/>
      </div>
      <div style={{marginLeft:"auto",color:"var(--t3)",fontSize:12,fontFamily:"var(--mono)"}}>{rows.length} of {enq.length}</div>
    </div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Enquiry</th><th>Customer</th><th>Summary</th><th>Status</th><th>Estimator</th><th>Responsible</th><th>Quote due</th><th>Priority</th><th>Value</th></tr></thead>
        <tbody>
          {rows.map(e=><tr key={e.id} onClick={()=>onOpen(e.id)}>
            <td><div className="idcell">{e.id.replace("ENQ-2026-","#")}<small>SIG {e.sigma}</small></div></td>
            <td><div className="cust">{e.customer}</div><div className="sub-c">{e.contact}</div></td>
            <td style={{maxWidth:240,color:"var(--t2)"}}>{e.summary}</td>
            <td><Pill s={e.status}/></td>
            <td><Owner id={e.assignedEstimator}/></td>
            <td><Owner id={e.responsible}/></td>
            <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(e.quoteDueDate)&&!e.outcome?"var(--red)":"var(--t2)"}}>{fmtDate(e.quoteDueDate)}</td>
            <td><Prio p={e.priority}/></td>
            <td className="mono" style={{fontWeight:600}}>{fmtGBP(e.quotedValue||e.estValue)}</td>
          </tr>)}
          {rows.length===0 && <tr><td colSpan="9"><div className="empty"><div className="big">⌕</div>No enquiries match this filter.</div></td></tr>}
        </tbody>
      </table>
    </div>
  </>;
}

/* ============================ TASKS ============================ */
function Tasks({enq,user,onOpen,update}){
  const [scope,setScope]=useState("mine");
  const all = enq.flatMap(e=>(e.tasks||[]).map(t=>({...t,eid:e.id,cust:e.customer})));
  let rows = all.filter(t=>t.status!=="Completed"&&t.status!=="Cancelled");
  if(scope==="mine") rows = rows.filter(t=>t.assignee===user.id);
  rows.sort((a,b)=>new Date(a.due)-new Date(b.due));
  const complete = (eid,tid)=> update(eid, e=>({...e,tasks:e.tasks.map(t=>t.id===tid?{...t,status:"Completed",completedBy:user.id,completedAt:new Date().toISOString()}:t)}), "completed a task");

  return <>
    <div className="pagehead"><div><div className="eyebrow">Personal task view · filtered, not restricted</div><h1>Tasks</h1></div></div>
    <div className="ftbar"><div className="seg">
      <button className={scope==="mine"?"active":""} onClick={()=>setScope("mine")}>My tasks</button>
      <button className={scope==="all"?"active":""} onClick={()=>setScope("all")}>All open tasks</button>
    </div><div style={{marginLeft:"auto",color:"var(--t3)",fontSize:12,fontFamily:"var(--mono)"}}>{rows.length} open</div></div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Task</th><th>Enquiry</th><th>Assigned to</th><th>Due</th><th>Priority</th><th>Status</th><th></th></tr></thead>
        <tbody>
          {rows.map(t=><tr key={t.id} onClick={()=>onOpen(t.eid)}>
            <td><b style={{fontFamily:"var(--ui)"}}>{t.title}</b>{t.notes&&<div className="sub-c">{t.notes}</div>}</td>
            <td><div className="idcell">{t.eid.replace("ENQ-2026-","#")}<small>{t.cust}</small></div></td>
            <td><Owner id={t.assignee}/></td>
            <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(t.due)?"var(--red)":isToday(t.due)?"var(--amber)":"var(--t2)"}}>{isToday(t.due)?"Today":fmtDate(t.due)}</td>
            <td><Prio p={t.priority}/></td>
            <td><span className={"pill pill--"+(t.status==="Open"?"grey":t.status.startsWith("Waiting")?"amber":"blue")}>{t.status}</span></td>
            <td onClick={e=>e.stopPropagation()}><button className="btn btn--green btn--sm" onClick={()=>complete(t.eid,t.id)}>Complete</button></td>
          </tr>)}
          {rows.length===0 && <tr><td colSpan="7"><div className="empty"><div className="big">✓</div>No open tasks here. Empty queue, good work.</div></td></tr>}
        </tbody>
      </table>
    </div>
  </>;
}

/* ============================ CHASING ============================ */
function Chasing({enq,user,onOpen}){
  const sent = enq.filter(e=>e.status==="Quote Sent");
  const ageOf = e => daysBetween(e.quoteSentDate, new Date().toISOString());
  const band = e => { const a=ageOf(e); if(a<3) return "Awaiting first chase"; if(a<7) return "First chase"; if(a<14) return "Second chase"; if(a<30) return "Final chase"; return "Review / dormant"; };
  const sorted = [...sent].sort((a,b)=>ageOf(b)-ageOf(a));
  const cards = [
    ["First chase due", sent.filter(e=>ageOf(e)>=3&&ageOf(e)<7).length],
    ["Second chase due", sent.filter(e=>ageOf(e)>=7&&ageOf(e)<14).length],
    ["Final chase due", sent.filter(e=>ageOf(e)>=14&&ageOf(e)<30).length],
    ["No chase logged", sent.filter(e=>!e.chases||e.chases.length===0).length],
  ];
  return <>
    <div className="pagehead"><div><div className="eyebrow">Office chasing dashboard · shared</div><h1>Quote chasing</h1></div>
      <div className="spacer"></div>
      <div style={{textAlign:"right"}}><div style={{fontFamily:"var(--mono)",fontSize:24,fontWeight:600}}>{fmtGBP(sent.reduce((s,e)=>s+(e.quotedValue||0),0))}</div><div style={{color:"var(--t3)",fontSize:12}}>open value being chased</div></div>
    </div>
    <div className="statgrid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
      {cards.map(([k,v])=><div className="stat" key={k}><div className="k">{k}</div><div className="v" style={{color:k==="No chase logged"&&v?"var(--red)":undefined}}>{v}</div></div>)}
    </div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Quote</th><th>Customer</th><th>Chase stage</th><th>Chaser</th><th>Last result</th><th>Next chase</th><th>Age</th><th>Value</th></tr></thead>
        <tbody>{sorted.map(e=>{ const last=e.chases&&e.chases[e.chases.length-1];
          return <tr key={e.id} onClick={()=>onOpen(e.id)}>
            <td><div className="idcell">{e.id.replace("ENQ-2026-","#")}<small>SIG {e.sigma}</small></div></td>
            <td><div className="cust">{e.customer}</div><div className="sub-c">{e.contact}</div></td>
            <td><span className={"pill pill--"+(band(e).includes("Final")||band(e).includes("Review")?"red":band(e).includes("Second")?"amber":"blue")}>{band(e)}</span></td>
            <td><Owner id={e.assignedChaseUser}/></td>
            <td style={{color:"var(--t2)"}}>{last?last.result:"—"}</td>
            <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(last&&last.next)?"var(--red)":"var(--t2)"}}>{last&&last.next?fmtDate(last.next):"—"}</td>
            <td className="mono">{ageOf(e)}d</td>
            <td className="mono" style={{fontWeight:600}}>{fmtGBP(e.quotedValue)}</td>
          </tr>;})}
          {sorted.length===0 && <tr><td colSpan="8"><div className="empty">No quotes are currently out for chasing.</div></td></tr>}
        </tbody>
      </table>
    </div>
  </>;
}

/* ============================ REPORTS ============================ */
function Reports({enq}){
  const byStatus = {};
  enq.forEach(e=>byStatus[e.status]=(byStatus[e.status]||0)+1);
  const funnel = [
    ["Enquiries received", enq.length, "var(--ink)"],
    ["Reviewed / estimated", enq.filter(e=>!["New Enquiry","Needs Review"].includes(e.status)).length],
    ["Quotes sent", enq.filter(e=>e.quoteSentDate).length],
    ["Won", enq.filter(e=>e.outcome==="Won").length],
  ];
  const won=enq.filter(e=>e.outcome==="Won"), lost=enq.filter(e=>e.outcome==="Lost"), noq=enq.filter(e=>e.outcome==="No Quote");
  const decided = won.length+lost.length;
  const winRate = decided? Math.round(won.length/decided*100):0;
  const workload = USERS.filter(u=>u.role==="Estimator").map(u=>({u,open:enq.filter(e=>e.assignedEstimator===u.id&&!e.outcome).length}));
  const lostReasons={}; [...lost,...noq].forEach(e=>{ if(e.lostReason) lostReasons[e.lostReason]=(lostReasons[e.lostReason]||0)+1; });
  const ageBands=[["0–7 days",0],["8–14 days",0],["15–30 days",0],["31+ days",0]];
  enq.filter(e=>e.status==="Quote Sent").forEach(e=>{ const a=daysBetween(e.quoteSentDate,new Date().toISOString()); if(a<=7)ageBands[0][1]++; else if(a<=14)ageBands[1][1]++; else if(a<=30)ageBands[2][1]++; else ageBands[3][1]++; });
  const maxStatus = Math.max(...Object.values(byStatus),1);
  const maxFunnel = funnel[0][1]||1;

  const exportCSV = () => {
    const head=["Enquiry ID","SigmaMRP","Customer","Status","Estimator","Responsible","Quote due","Quoted value","Outcome"];
    const rows=enq.map(e=>[e.id,e.sigma,e.customer,e.status,uName(e.assignedEstimator),uName(e.responsible),fmtDate(e.quoteDueDate),e.quotedValue||"",e.outcome||""]);
    const csv=[head,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a"); a.href=url; a.download="prestige-enquiries.csv"; a.click(); pushToast("Exported "+enq.length+" enquiries to CSV");
  };

  const Bar = ({label,val,max,color}) => <div className="barrow"><div className="lbl">{label}</div><div className="bartrack"><div className="barfill" style={{width:Math.max(val/max*100,4)+"%",background:color||"var(--steel)"}}>{val}</div></div><div className="barval">{val}</div></div>;

  const estCostOf = e => e.lines.reduce((s,l)=>s+lineTotals(l).cost,0);
  const actCostOf = e => (e.actuals.mat||0)+(e.actuals.lab||0)+(e.actuals.sub||0)+(e.actuals.coat||0);
  const wonAct = enq.filter(e=>e.outcome==="Won" && e.actuals);
  const totEst = wonAct.reduce((s,e)=>s+estCostOf(e),0);
  const totAct = wonAct.reduce((s,e)=>s+actCostOf(e),0);
  const totVar = totEst>0? Math.round((totAct-totEst)/totEst*100):0;

  return <>
    <div className="pagehead"><div><div className="eyebrow">Management reporting</div><h1>Reports &amp; graphs</h1></div><div className="spacer"></div><button className="btn btn--g noprint" onClick={()=>window.print()}>{I.doc} Save as PDF</button><button className="btn btn--g noprint" onClick={exportCSV}>{I.doc} Export to CSV</button></div>

    <div className="statgrid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
      <div className="stat good"><div className="k">Win rate</div><div className="v">{winRate}%</div><div className="sub">{won.length} won / {decided} decided</div></div>
      <div className="stat"><div className="k">Won value</div><div className="v" style={{fontSize:24}}>{fmtGBP(won.reduce((s,e)=>s+(e.quotedValue||0),0))}</div></div>
      <div className="stat"><div className="k">Open quote value</div><div className="v" style={{fontSize:24}}>{fmtGBP(enq.filter(e=>e.status==="Quote Sent").reduce((s,e)=>s+(e.quotedValue||0),0))}</div></div>
      <div className="stat alert"><div className="k">No-quotes</div><div className="v">{noq.length}</div></div>

    <div className="cols" style={{gridTemplateColumns:"1fr 1fr"}}>

      </div></div>

      <div className="panel"><div className="panel__h"><h3>Enquiries by status</h3></div><div style={{padding:18}}>
        {Object.entries(byStatus).sort((a,b)=>b[1]-a[1]).map(([s,v])=><Bar key={s} label={s} val={v} max={maxStatus} color={"var(--"+({violet:"violet",amber:"amber",orange:"rte",blue:"blue",green:"green",red:"red",grey:"steel"})[statusPill(s)]+")"}/>)}
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Estimator workload (open)</h3></div><div style={{padding:18}}>
        {workload.map(w=><Bar key={w.u.id} label={w.u.name} val={w.open} max={Math.max(...workload.map(x=>x.open),1)} color={w.u.c}/>)}

      <div className="panel"><div className="panel__h"><h3>Quote ageing (open quotes)</h3></div><div style={{padding:18}}>
        {ageBands.map(([l,v])=><Bar key={l} label={l} val={v} max={Math.max(...ageBands.map(x=>x[1]),1)} color={l.startsWith("31")?"var(--red)":l.startsWith("15")?"var(--amber)":"var(--steel)"}/>)}
      </div></div>

      <div className="panel" style={{gridColumn:"1/-1"}}><div className="panel__h"><h3>Estimated vs actual cost (won jobs)</h3>{wonAct.length>0&&<span className="count">{totVar>0?"+":""}{totVar}% overall</span>}</div><div style={{padding:18}}>
        {wonAct.length===0? <div className="empty">No actual costs recorded yet — enter them on a won enquiry's Outcome tab.</div> :
          <div className="table-wrap" style={{border:"none",boxShadow:"none"}}><table style={{minWidth:640}}>
            <thead><tr><th>Enquiry</th><th>Customer</th><th>Quoted</th><th>Est. cost</th><th>Actual cost</th><th>Variance</th><th>Actual margin</th></tr></thead>
            <tbody>{wonAct.map(e=>{ const ec=estCostOf(e),ac=actCostOf(e),v=ec>0?Math.round((ac-ec)/ec*100):0,m=e.quotedValue>0?Math.round((e.quotedValue-ac)/e.quotedValue*100):0;
              return <tr key={e.id} style={{cursor:"default"}}>
                <td className="mono">{e.id.replace("ENQ-2026-","#")}</td><td>{e.customer}</td>
                <td className="mono">{fmtGBP(e.quotedValue)}</td><td className="mono">{fmtGBP(ec)}</td><td className="mono">{fmtGBP(ac)}</td>
                <td className="mono" style={{color:v>10?"var(--red)":v<=0?"var(--green)":"var(--amber)",fontWeight:600}}>{v>0?"+":""}{v}%</td>
                <td className="mono" style={{fontWeight:600,color:m>=30?"var(--green)":m>=15?"var(--amber)":"var(--red)"}}>{m}%</td></tr>; })}
              <tr style={{cursor:"default",borderTop:"2px solid var(--line)"}}><td colSpan="3" style={{fontWeight:600}}>Totals ({wonAct.length})</td>
                <td className="mono" style={{fontWeight:600}}>{fmtGBP(totEst)}</td><td className="mono" style={{fontWeight:600}}>{fmtGBP(totAct)}</td>
                <td className="mono" style={{fontWeight:600,color:totVar>10?"var(--red)":totVar<=0?"var(--green)":"var(--amber)"}}>{totVar>0?"+":""}{totVar}%</td><td></td></tr>
            </tbody></table></div>}
      </div></div>
    </div>
  </>;
}

/* ============================ USERS (ADMIN) ============================ */
function Users({user, reload}){
  const [list,setList]=useState([]);
  const [roles,setRoles]=useState(["Admin","Estimator","Sales/Admin","Management"]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [add,setAdd]=useState({name:"",username:"",role:"Estimator",password:""});
  const [edit,setEdit]=useState(null);
  const refresh = async ()=>{ const d=await api.listUsers(); setList(d.users||[]); if(d.roles&&d.roles.length) setRoles(d.roles); setLoading(false); if(reload) reload(); };
  useEffect(()=>{ refresh(); },[]);

  const create = async ()=>{
    if(!add.name||!add.username||!add.password) return;
    const r=await api.createUser(add);
    if(!r.ok){ pushToast(r.error||"Could not add user"); return; }
    pushToast(add.name+" added"); setAdd({name:"",username:"",role:"Estimator",password:""}); setShowAdd(false); refresh();
  };
  const saveEdit = async ()=>{
    const body={name:edit.name,role:edit.role,username:edit.username,active:edit.active};
    if(edit.password) body.password=edit.password;
    const r=await api.updateUser(edit.id,body);
    if(!r.ok){ pushToast(r.error||"Could not save"); return; }
    pushToast("Saved"); setEdit(null); refresh();
  };
  const toggleActive = async (u)=>{
    const r=await api.updateUser(u.id,{active:!u.active});
    if(!r.ok){ pushToast(r.error||"Could not change"); return; }
    refresh();
  };

  return <>
    <div className="pagehead"><div><div className="eyebrow">Admin</div><h1>Users &amp; accounts</h1></div><div className="spacer"></div><button className="btn btn--p" onClick={()=>setShowAdd(s=>!s)}>{I.plus} Add person</button></div>

    {showAdd && <div className="panel" style={{padding:16,marginBottom:18}}>
      <SecBar>New account</SecBar>
      <div className="fieldgrid">
        <Field label="Full name" req><input value={add.name} onChange={e=>setAdd(a=>({...a,name:e.target.value}))} placeholder="e.g. Tom Webb"/></Field>
        <Field label="Username" req><input value={add.username} onChange={e=>setAdd(a=>({...a,username:e.target.value.toLowerCase()}))} placeholder="e.g. tom"/></Field>
        <Field label="Role" req><select value={add.role} onChange={e=>setAdd(a=>({...a,role:e.target.value}))}>{roles.map(r=><option key={r}>{r}</option>)}</select></Field>
        <Field label="Temporary password" req><input value={add.password} onChange={e=>setAdd(a=>({...a,password:e.target.value}))} placeholder="give it to them to sign in"/></Field>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn btn--p" disabled={!add.name||!add.username||!add.password} onClick={create}>Add person</button></div>
    </div>}

    <div className="table-wrap"><table style={{minWidth:680}}>
      <thead><tr><th>Name</th><th>Role</th><th>Username</th><th>Status</th><th></th></tr></thead>
      <tbody>{list.map(u=><tr key={u.id} style={{cursor:"default"}}>
        <td><span className="owner"><span className="av-sm" style={{background:u.c}}>{initials(u.name)}</span>{u.name}{u.id===user.id&&<small style={{color:"var(--t3)"}}> (you)</small>}</span></td>
        <td><span className="pill pill--grey">{u.role}</span></td>
        <td className="mono">{u.username}</td>
        <td>{u.active? <span className="sp sp--ok">Active</span> : <span className="sp sp--off">Inactive</span>}</td>
        <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
          <button className="btn btn--g sm" onClick={()=>setEdit({id:u.id,name:u.name,username:u.username,role:u.role,active:u.active,password:""})}>Edit</button>
          {u.id!==user.id && <button className="btn btn--g sm" style={{marginLeft:6}} onClick={()=>toggleActive(u)}>{u.active?"Deactivate":"Activate"}</button>}
        </td>
      </tr>)}
      {loading && <tr><td colSpan="5"><div className="empty">Loading…</div></td></tr>}
      {!loading && list.length===0 && <tr><td colSpan="5"><div className="empty">No users yet.</div></td></tr>}
      </tbody></table></div>

    {edit && <div className="scrim center-scrim" onClick={()=>setEdit(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="dh"><div className="dh__top"><div><div className="dh__id">Edit account</div><h2>{edit.name||"User"}</h2></div><button className="x" onClick={()=>setEdit(null)}>✕</button></div></div>
        <div className="dbody">
          <div className="fieldgrid">
            <Field label="Full name"><input value={edit.name} onChange={e=>setEdit(x=>({...x,name:e.target.value}))}/></Field>
            <Field label="Username"><input value={edit.username} onChange={e=>setEdit(x=>({...x,username:e.target.value.toLowerCase()}))}/></Field>
            <Field label="Role"><select value={edit.role} onChange={e=>setEdit(x=>({...x,role:e.target.value}))}>{roles.map(r=><option key={r}>{r}</option>)}</select></Field>
            <Field label="Reset password"><input value={edit.password} onChange={e=>setEdit(x=>({...x,password:e.target.value}))} placeholder="leave blank to keep current"/></Field>
          </div>
          <label className="ovr" style={{marginTop:12}}><input type="checkbox" checked={edit.active} onChange={e=>setEdit(x=>({...x,active:e.target.checked}))}/> Account active (can sign in)</label>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}><button className="btn btn--g" onClick={()=>setEdit(null)}>Cancel</button><button className="btn btn--p" onClick={saveEdit}>Save changes</button></div>
        </div>
      </div>
    </div>}

    <div className="hint" style={{marginTop:16}}>{I.shield}<div>Everyone can see and progress every enquiry — roles add powers: <b>Admin</b> manages users and can override duplicate SigmaMRP numbers; <b>Management</b> approves high-value quotes. Deactivating someone keeps their history and audit trail but blocks sign-in.</div></div>
  </>;
}

/* ============================ NEW ENQUIRY ============================ */
function NewEnquiry({enq,user,onClose,onCreate}){
  const [f,setF]=useState({sigma:"",customer:"",contact:"",email:"",phone:"",source:"Customer email",rfqRef:"",summary:"",quoteDueDate:"",assignedEstimator:user.id,priority:"Medium",status:"New Enquiry"});
  const [busy,setBusy]=useState(false);
  const [override,setOverride]=useState(false);
  const [overrideReason,setOverrideReason]=useState("");
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const isAdmin = user.role==="Admin";
  const dup = f.sigma && enq.find(e=>String(e.sigma)===f.sigma.trim() && !["Lost","No Quote","Dormant"].includes(e.status));
  const sigmaBad = f.sigma && !/^\d{3,8}$/.test(f.sigma.trim());
  const dupOk = !dup || (isAdmin && override && overrideReason.trim());
  const can = f.sigma && f.customer && f.contact && f.summary && f.quoteDueDate && !sigmaBad && dupOk && !busy;
  const submit=async()=>{
    setBusy(true);
    const data=mkEnquiry({sigma:f.sigma.trim(),customer:f.customer.trim(),contact:f.contact.trim(),email:f.email.trim(),phone:f.phone.trim(),
      source:f.source,rfqRef:f.rfqRef.trim(),summary:f.summary.trim(),receivedAt:new Date().toISOString(),receivedBy:user.id,createdBy:user.id,
      assignedEstimator:f.assignedEstimator,responsible:f.assignedEstimator,status:f.status,priority:f.priority,
      quoteDueDate:f.quoteDueDate?new Date(f.quoteDueDate).toISOString():null,estValue:0});
    delete data.id;
    data.audit=[aud(user.id,"created the enquiry"), aud(user.id,"entered SigmaMRP number "+f.sigma.trim())];
    if(dup && override) data.audit.push(aud(user.id,"admin override of duplicate SigmaMRP — "+overrideReason.trim()));
    const r=await api.create(data, !!(dup&&override));
    if(r && r.duplicate){ pushToast("SigmaMRP "+f.sigma.trim()+" already active on "+(r.on||[]).join(", ")); setBusy(false); return; }
    onCreate(r.enquiry);
  };
  return <div className="scrim center-scrim" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="dh"><div className="dh__top"><div><div className="dh__id">{newIdPreview(enq)}</div><h2>Log new enquiry</h2></div><button className="x" onClick={onClose}>✕</button></div>
        <div className="meta"><span>Prestige Enquiry ID is generated automatically on save. The SigmaMRP number is entered here, by hand, at the very start.</span></div>
      </div>
      <div className="dbody">
        <div className="fieldgrid">
          <Field label="SigmaMRP job/quote number" req>
            <input placeholder="e.g. 54231" value={f.sigma} onChange={e=>set("sigma",e.target.value)} className="mono"/>
            {sigmaBad && <div className="warnbox">{I.flag} Use the numeric SigmaMRP number (3–8 digits).</div>}
            {dup && <div className="warnbox">{I.flag} <span><b>Possible duplicate.</b> SigmaMRP {f.sigma.trim()} is already active on {dup.id} ({dup.customer}). {isAdmin? "As an admin you can override with a reason below." : "Pick a different number, or ask an admin to override."}</span></div>}
            {dup && isAdmin && <div style={{marginTop:8}}>
              <label className="ovr"><input type="checkbox" checked={override} onChange={e=>setOverride(e.target.checked)}/> Override duplicate (admin)</label>
              {override && <input style={{marginTop:6}} placeholder="Reason for override (recorded in audit trail)" value={overrideReason} onChange={e=>setOverrideReason(e.target.value)}/>}
            </div>}
          </Field>
          <Field label="Priority"><select value={f.priority} onChange={e=>set("priority",e.target.value)}><option>High</option><option>Medium</option><option>Low</option></select></Field>
          <Field label="Customer name" req><input value={f.customer} onChange={e=>set("customer",e.target.value)} placeholder="Company"/></Field>
          <Field label="Contact" req><input value={f.contact} onChange={e=>set("contact",e.target.value)} placeholder="Name"/></Field>
          <Field label="Email"><input value={f.email} onChange={e=>set("email",e.target.value)} placeholder="name@customer.com"/></Field>
          <Field label="Phone"><input value={f.phone} onChange={e=>set("phone",e.target.value)}/></Field>
          <Field label="Source" req><select value={f.source} onChange={e=>set("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></Field>
          <Field label="Customer RFQ reference"><input value={f.rfqRef} onChange={e=>set("rfqRef",e.target.value)} placeholder="optional"/></Field>
          <div className="full"><Field label="Enquiry summary" req><textarea rows="2" value={f.summary} onChange={e=>set("summary",e.target.value)} placeholder="What is being enquired — parts, process, quantity"/></Field></div>
          <Field label="Quote due date" req><input type="date" value={f.quoteDueDate} onChange={e=>set("quoteDueDate",e.target.value)}/></Field>
          <Field label="Assigned estimator" req><select value={f.assignedEstimator} onChange={e=>set("assignedEstimator",e.target.value)}>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
        </div>
        <div className="hint" style={{marginTop:18}}>{I.users}<div>Assigning an estimator sets <b>responsibility and notifications</b> — it does not lock the enquiry. Any colleague can still open and progress it.</div></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:6}}>
          <button className="btn btn--g" onClick={onClose}>Cancel</button>
          <button className="btn btn--p" disabled={!can} style={{opacity:can?1:.45}} onClick={can?submit:undefined}>{busy?"Saving…":"Create enquiry"}</button>
        </div>
      </div>
    </div>
  </div>;
}
function newIdPreview(enq){
  const seqOf=id=>parseInt(String(id||"").split("-").pop(),10)||0;
  const n=((enq||[]).reduce((m,e)=>Math.max(m,seqOf(e.id)),131))+1;
  return "ENQ-2026-"+String(n).padStart(6,"0");
}

/* ============================ DRAWER (ENQUIRY DETAIL) ============================ */
function Drawer({e,user,onClose,update,notifyUser}){
  const TABS=[["summary","Summary"],["lines","Line items",e.lines.length],["docs","Documents",e.documents.length],["quote","Estimate & quote"],["suppliers","Supplier prices",(e.supplierReqs||[]).length],["tasks","Tasks",e.tasks.length],["notes","Notes",e.notes.length],["versions","Quote versions",e.versions.length],["chase","Chasing"],["outcome","Outcome"],["handover","Handover"],["audit","Audit",e.audit.length]];
  const [tab,setTab]=useState("summary");
  const isOwner = e.responsible===user.id;

  const pickUp = ()=> update(e.id, x=>{ x.responsible=user.id; x.notes=[...x.notes,{id:++NID,when:new Date().toISOString(),by:user.id,type:"Internal",txt:user.name+" picked up this enquiry."}]; return x; }, "picked up the enquiry (now responsible)");

  return <div className="scrim" onClick={onClose}>
    <div className="drawer" onClick={ev=>ev.stopPropagation()}>
      <div className="dh">
        <div className="dh__top">
          <div>
            <div className="dh__id">{e.id} &nbsp;·&nbsp; SigmaMRP {e.sigma}</div>
            <h2>{e.customer}</h2>
          </div>
          <Pill s={e.status}/>
          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="meta">
          <span>Estimator <b>{uName(e.assignedEstimator)}</b></span>
          <span>Responsible <b>{uName(e.responsible)}</b></span>
          <span>Received <b>{fmtDate(e.receivedAt)}</b> by {uName(e.receivedBy)}</span>
          <span>Quote due <b style={{color:isOverdue(e.quoteDueDate)&&!e.outcome?"var(--red)":undefined}}>{fmtDate(e.quoteDueDate)}</b></span>
          {e.rfqRef && <span>RFQ <b>{e.rfqRef}</b></span>}
        </div>
      </div>
      <div className="tabs">{TABS.map(([k,l,n])=><button key={k} className={tab===k?"active":""} onClick={()=>setTab(k)}>{l}{n!=null&&<span className="n">{n}</span>}</button>)}</div>
      <div className="dbody">
        {!isOwner && !e.outcome && <div className="pickup">
          <span style={{color:"var(--orange)"}}>{I.hand}</span>
          <div className="t"><b>{uName(e.responsible)} is responsible for this enquiry.</b><small>You can still open, edit and progress it. Take over the next action if you're picking it up.</small></div>
          <button className="btn btn--p" onClick={()=>{pickUp();pushToast("You picked up this enquiry");}}>I'm picking this up</button>
        </div>}
        {tab==="summary" && <TabSummary e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="lines" && <TabLines e={e} user={user} update={update}/>}
        {tab==="docs" && <TabDocs e={e} user={user} update={update}/>}
        {tab==="quote" && <TabQuote e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="suppliers" && <TabSuppliers e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="tasks" && <TabTasks e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="notes" && <TabNotes e={e} user={user} update={update}/>}
        {tab==="versions" && <TabVersions e={e} user={user} update={update}/>}
        {tab==="chase" && <TabChase e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="outcome" && <TabOutcome e={e} user={user} update={update}/>}
        {tab==="handover" && <TabHandover e={e} user={user} update={update}/>}
        {tab==="audit" && <TabAudit e={e}/>}
      </div>
    </div>
  </div>;
}

const SecBar = ({children}) => <div className="secbar"><h4>{children}</h4><div className="line"></div></div>;

function TabSummary({e,user,update,notifyUser}){
  const setStatus=v=>update(e.id,x=>({...x,status:v}),"changed status to "+v);
  const reassign=(field,v,label)=>{ update(e.id,x=>({...x,[field]:v}), "reassigned "+label+" to "+uName(v)); notifyUser(v,"assign",label+" assigned to you: "+e.customer,e.id); };
  return <>
    <SecBar>Enquiry detail</SecBar>
    <div className="fieldgrid three">
      <Field label="Prestige Enquiry ID"><div className="val mono">{e.id}</div></Field>
      <Field label="SigmaMRP number"><div className="val mono">{e.sigma}</div></Field>
      <Field label="Customer RFQ"><div className="val mono">{e.rfqRef||"—"}</div></Field>
      <Field label="Customer"><div className="val">{e.customer}</div></Field>
      <Field label="Contact"><div className="val">{e.contact}</div></Field>
      <Field label="Source"><div className="val">{e.source}</div></Field>
      <Field label="Email"><div className="val">{e.email||"—"}</div></Field>
      <Field label="Phone"><div className="val">{e.phone||"—"}</div></Field>
      <Field label="Priority"><div className="val"><Prio p={e.priority}/></div></Field>
    </div>
    <Field label="Summary"><div className="val" style={{fontWeight:400}}>{e.summary}</div></Field>

    <SecBar>Control</SecBar>
    <div className="fieldgrid three">
      <Field label="Status"><select value={e.status} onChange={ev=>setStatus(ev.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></Field>
      <Field label="Assigned estimator"><select value={e.assignedEstimator} onChange={ev=>reassign("assignedEstimator",ev.target.value,"estimator")}>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
      <Field label="Current responsible"><select value={e.responsible} onChange={ev=>reassign("responsible",ev.target.value,"responsibility")}>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
    </div>
  </>;
}

function TabLines({e,user,update}){
  const blank={part:"",draw:"",rev:"",qty:1,material:"",finish:"",matCost:0,labCost:0,subCost:0,coatCost:0,unitSell:0,status:"Estimating"};
  const [editing,setEditing]=useState(null);   // null | "new" | <line id>
  const [f,setF]=useState(blank);
  const [del,setDel]=useState(null);            // id pending delete confirm
  const set=(k,v)=>setF(p=>({...p,[k]:["qty","matCost","labCost","subCost","coatCost","unitSell"].includes(k)?Number(v):v}));
  const startAdd=()=>{ setF(blank); setEditing("new"); setDel(null); };
  const startEdit=(l)=>{ setF({...l}); setEditing(l.id); setDel(null); };
  const save=()=>{
    if(editing==="new"){
      update(e.id,x=>({...x,lines:[...x.lines,{...f,id:(x.lines.at(-1)?.id||0)+1}]}),"added line item "+(f.part||"part"));
      pushToast("Line item added");
    } else {
      update(e.id,x=>({...x,lines:x.lines.map(l=>l.id===editing?{...f,id:editing}:l)}),"edited line item "+(f.part||"part"));
      pushToast("Line item updated");
    }
    setF(blank); setEditing(null);
  };
  const remove=(id)=>{ update(e.id,x=>({...x,lines:x.lines.filter(l=>l.id!==id)}),"deleted a line item"); setDel(null); pushToast("Line item deleted"); };
  const total = e.lines.reduce((s,l)=>s+lineTotals(l).lineTotal,0);
