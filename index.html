      <div className="stat"><div className="k">Enquiries</div><div className="v">{F.length}</div></div>
      <div className="stat"><div className="k">Quotes sent</div><div className="v">{sent.length}</div></div>
      <div className="stat good"><div className="k">Win rate</div><div className="v">{winRate}%</div><div className="sub">{won.length} / {decided} decided</div></div>
      <div className="stat"><div className="k">Avg days to quote</div><div className="v">{avgResp==null?"—":avgResp}</div></div>
      <div className={"stat "+(overdueNow?"alert":"")}><div className="k">Overdue now</div><div className="v">{overdueNow}</div><div className="sub">past quote-due</div></div>
    </div>

    <div className="cols" style={{gridTemplateColumns:"1fr 1fr"}}>
      <div className="panel"><div className="panel__h"><h3>Enquiries received by month</h3></div><div style={{padding:18}}>
        {months.length? <TrendChart labels={months.map(monthLabel)} values={months.map(m=>byMonth[m])} color="var(--orange)"/> : <div className="empty">No enquiries in range.</div>}
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Conversion funnel</h3></div><div style={{padding:18}}>
        <div className="funnel">{funnel.map(([l,v,c])=><div className="fr" key={l}><div className="flab">{l}</div><div className="ftrack"><div className="ffill" style={{width:Math.max(v/maxFunnel*100,8)+"%",background:c||undefined}}>{v}</div></div></div>)}</div>
        <div style={{marginTop:10,color:"var(--t3)",fontSize:12}}>Conversion received → won: <b style={{color:"var(--t1)"}}>{F.length?Math.round(won.length/F.length*100):0}%</b></div>
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Win / loss</h3></div><div style={{padding:18}}>
        {decided+noq.length>0
          ? <Donut centreTop={winRate+"%"} centreSub="win rate" slices={[
              {label:"Won",value:won.length,color:"var(--green)"},
              {label:"Lost",value:lost.length,color:"var(--red)"},
              {label:"No quote",value:noq.length,color:"var(--amber)"},
            ]}/>
          : <div className="empty">No decided enquiries in range.</div>}
        <div style={{marginTop:12,color:"var(--t3)",fontSize:12}}>Win rate is won ÷ (won + lost); no-quotes are excluded.</div>
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Quote response time</h3></div><div style={{padding:18}}>
        {sent.length? bands.map(([l,v])=><Bar key={l} label={l} val={v} max={maxBand} color={l==="6+ days"?"var(--red)":l==="3–5 days"?"var(--amber)":"var(--green)"}/>) : <div className="empty">No quotes sent in range.</div>}
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Enquiries by status</h3></div><div style={{padding:18}}>
        {Object.entries(byStatus).sort((a,b)=>b[1]-a[1]).map(([s,v])=><Bar key={s} label={s} val={v} max={maxStatus} color={"var(--"+({violet:"violet",amber:"amber",orange:"orange",blue:"blue",green:"green",red:"red",grey:"steel"})[statusPill(s)]+")"}/>)}
        {F.length===0&&<div className="empty">No data.</div>}
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Enquiries by source</h3></div><div style={{padding:18}}>
        {Object.entries(bySource).sort((a,b)=>b[1]-a[1]).map(([s,v])=><Bar key={s} label={s} val={v} max={maxSource} color="var(--violet)"/>)}
        {F.length===0&&<div className="empty">No data.</div>}
      </div></div>

      <div className="panel" style={{gridColumn:"1/-1"}}><div className="panel__h"><h3>Lost &amp; no-quote reasons</h3></div><div style={{padding:18}}>
        {reasonRows.length? reasonRows.map(([r,v])=><Bar key={r} label={r} val={v} max={maxReason} color="var(--red)"/>) : <div className="empty">No lost or no-quote enquiries in range.</div>}
      </div></div>

      <div className="panel" style={{gridColumn:"1/-1"}}><div className="panel__h"><h3>Estimator workload &amp; win rate</h3></div>
        <div className="table-wrap" style={{border:"none",boxShadow:"none"}}><table>
          <thead><tr><th>Estimator</th><th>Enquiries</th><th>Open</th><th>Quotes sent</th><th>Won</th><th>Win rate</th></tr></thead>
          <tbody>{estRows.map(r=><tr key={r.u.id} style={{cursor:"default"}}>
            <td><Owner id={r.u.id}/></td><td className="mono">{r.total}</td><td className="mono">{r.open}</td><td className="mono">{r.sent}</td><td className="mono">{r.won}</td>
            <td><span className={"pill pill--"+(r.winRate>=50?"green":r.winRate>=30?"amber":"grey")}>{r.winRate}%</span></td></tr>)}
            {estRows.length===0&&<tr><td colSpan="6"><div className="empty">No data.</div></td></tr>}
          </tbody></table></div>
      </div>

      <div className="panel" style={{gridColumn:"1/-1"}}><div className="panel__h"><h3>Customer activity</h3><span className="count">{custRows.length} customers</span></div>
        <div className="table-wrap" style={{border:"none",boxShadow:"none"}}><table>
          <thead><tr><th>Customer</th><th>Enquiries</th><th>Quotes sent</th><th>Won</th><th>Win rate</th></tr></thead>
          <tbody>{custRows.map(r=><tr key={r.c} style={{cursor:"default"}}>
            <td><b>{r.c}</b></td><td className="mono">{r.total}</td><td className="mono">{r.sent}</td><td className="mono">{r.won}</td>
            <td><span className={"pill pill--"+(r.winRate>=50?"green":r.winRate>=30?"amber":"grey")}>{r.winRate}%</span></td></tr>)}
            {custRows.length===0&&<tr><td colSpan="5"><div className="empty">No data.</div></td></tr>}
          </tbody></table></div>
      </div>

      <div className="panel" style={{gridColumn:"1/-1"}}><div className="panel__h"><h3>Chase performance</h3></div>
        <div className="statgrid" style={{gridTemplateColumns:"repeat(4,1fr)",padding:18}}>
          {chaseStats.map(([k,v])=><div className="stat" key={k}><div className="k">{k}</div><div className="v" style={{color:(k==="No chase logged"||k==="Chase tasks overdue")&&v?"var(--red)":undefined}}>{v}</div></div>)}
        </div>
      </div>
    </div>
  </>;
}
/* ============================ USERS (ADMIN) ============================ */
function Users({user, reload}){
  const [list,setList]=useState([]);
  const [roles,setRoles]=useState(["Admin","Estimator","Sales/Admin","Management"]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [add,setAdd]=useState({name:"",username:"",role:"Estimator",password:""});
  const [edit,setEdit]=useState(null);
  const refresh = async ()=>{ const d=await api.listUsers(); setList(d.users||[]); if(d.roles&&d.roles.length) setRoles(d.roles); setLoading(false); if(reload) reload(); };
  useEffect(()=>{ refresh(); },[]);

  const create = async ()=>{
    if(!add.name||!add.username||!add.password) return;
    const r=await api.createUser(add);
    if(!r.ok){ pushToast(r.error||"Could not add user"); return; }
    pushToast(add.name+" added"); setAdd({name:"",username:"",role:"Estimator",password:""}); setShowAdd(false); refresh();
  };
  const saveEdit = async ()=>{
    const body={name:edit.name,role:edit.role,username:edit.username,active:edit.active};
    if(edit.password) body.password=edit.password;
    const r=await api.updateUser(edit.id,body);
    if(!r.ok){ pushToast(r.error||"Could not save"); return; }
    pushToast("Saved"); setEdit(null); refresh();
  };
  const toggleActive = async (u)=>{
    const r=await api.updateUser(u.id,{active:!u.active});
    if(!r.ok){ pushToast(r.error||"Could not change"); return; }
    refresh();
  };

  return <>
    <div className="pagehead"><div><div className="eyebrow">Admin</div><h1>Users &amp; accounts</h1></div><div className="spacer"></div><button className="btn btn--p" onClick={()=>setShowAdd(s=>!s)}>{I.plus} Add person</button></div>

    {showAdd && <div className="panel" style={{padding:16,marginBottom:18}}>
      <SecBar>New account</SecBar>
      <div className="fieldgrid">
        <Field label="Full name" req><input value={add.name} onChange={e=>setAdd(a=>({...a,name:e.target.value}))} placeholder="e.g. Tom Webb"/></Field>
        <Field label="Username" req><input value={add.username} onChange={e=>setAdd(a=>({...a,username:e.target.value.toLowerCase()}))} placeholder="e.g. tom"/></Field>
        <Field label="Role" req><select value={add.role} onChange={e=>setAdd(a=>({...a,role:e.target.value}))}>{roles.map(r=><option key={r}>{r}</option>)}</select></Field>
        <Field label="Temporary password" req><input value={add.password} onChange={e=>setAdd(a=>({...a,password:e.target.value}))} placeholder="give it to them to sign in"/></Field>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn btn--p" disabled={!add.name||!add.username||!add.password} onClick={create}>Add person</button></div>
    </div>}

    <div className="table-wrap"><table style={{minWidth:680}}>
      <thead><tr><th>Name</th><th>Role</th><th>Username</th><th>Status</th><th></th></tr></thead>
      <tbody>{list.map(u=><tr key={u.id} style={{cursor:"default"}}>
        <td><span className="owner"><span className="av-sm" style={{background:u.c}}>{initials(u.name)}</span>{u.name}{u.id===user.id&&<small style={{color:"var(--t3)"}}> (you)</small>}</span></td>
        <td><span className="pill pill--grey">{u.role}</span></td>
        <td className="mono">{u.username}</td>
        <td>{u.active? <span className="sp sp--ok">Active</span> : <span className="sp sp--off">Inactive</span>}</td>
        <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
          <button className="btn btn--g sm" onClick={()=>setEdit({id:u.id,name:u.name,username:u.username,role:u.role,active:u.active,password:""})}>Edit</button>
          {u.id!==user.id && <button className="btn btn--g sm" style={{marginLeft:6}} onClick={()=>toggleActive(u)}>{u.active?"Deactivate":"Activate"}</button>}
        </td>
      </tr>)}
      {loading && <tr><td colSpan="5"><div className="empty">Loading…</div></td></tr>}
      {!loading && list.length===0 && <tr><td colSpan="5"><div className="empty">No users yet.</div></td></tr>}
      </tbody></table></div>

    {edit && <div className="scrim center-scrim" onClick={()=>setEdit(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="dh"><div className="dh__top"><div><div className="dh__id">Edit account</div><h2>{edit.name||"User"}</h2></div><button className="x" onClick={()=>setEdit(null)}>✕</button></div></div>
        <div className="dbody">
          <div className="fieldgrid">
            <Field label="Full name"><input value={edit.name} onChange={e=>setEdit(x=>({...x,name:e.target.value}))}/></Field>
            <Field label="Username"><input value={edit.username} onChange={e=>setEdit(x=>({...x,username:e.target.value.toLowerCase()}))}/></Field>
            <Field label="Role"><select value={edit.role} onChange={e=>setEdit(x=>({...x,role:e.target.value}))}>{roles.map(r=><option key={r}>{r}</option>)}</select></Field>
            <Field label="Reset password"><input value={edit.password} onChange={e=>setEdit(x=>({...x,password:e.target.value}))} placeholder="leave blank to keep current"/></Field>
          </div>
          <label className="ovr" style={{marginTop:12}}><input type="checkbox" checked={edit.active} onChange={e=>setEdit(x=>({...x,active:e.target.checked}))}/> Account active (can sign in)</label>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}><button className="btn btn--g" onClick={()=>setEdit(null)}>Cancel</button><button className="btn btn--p" onClick={saveEdit}>Save changes</button></div>
        </div>
      </div>
    </div>}

    <div className="hint" style={{marginTop:16}}>{I.shield}<div>Everyone can see and progress every enquiry — roles add powers: <b>Admin</b> manages users and can override duplicate SigmaMRP numbers. Deactivating someone keeps their history and audit trail but blocks sign-in.</div></div>
  </>;
}

/* ============================ NEW ENQUIRY ============================ */
function NewEnquiry({enq,user,onClose,onCreate}){
  const [f,setF]=useState({sigma:"",customer:"",contact:"",email:"",phone:"",source:"Customer email",rfqRef:"",summary:"",quoteDueDate:"",assignedEstimator:user.id,priority:"Medium",status:"New Enquiry"});
  const [busy,setBusy]=useState(false);
  const [override,setOverride]=useState(false);
  const [overrideReason,setOverrideReason]=useState("");
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  /* Saved customers: directory built from every enquiry already logged, keyed by
     customer name, keeping the most recent contact/email/phone for each. Typing in
     the Customer box offers these as a dropdown; picking one fills the details. */
  const known = useMemo(()=>{
    const m={};
    [...enq].sort((a,b)=>new Date(a.receivedAt||0)-new Date(b.receivedAt||0)).forEach(e=>{
      if(!e.customer) return;
      m[e.customer.trim()]={contact:e.contact||"",email:e.email||"",phone:e.phone||"",count:(m[e.customer.trim()]?.count||0)+1};
    });
    return m;
  },[enq]);
  const knownNames = Object.keys(known).sort((a,b)=>a.localeCompare(b));
  const pickCustomer=(v)=>{
    const hit = known[v.trim()] || known[knownNames.find(n=>n.toLowerCase()===v.trim().toLowerCase())||""];
    setF(p=>{
      const filledFromSaved = kf => p["_auto_"+kf]!==undefined && p[kf]===p["_auto_"+kf];
      const next={...p,customer:v};
      if(hit){
        ["contact","email","phone"].forEach(kf=>{
          if(!p[kf] || filledFromSaved(kf)){ next[kf]=hit[kf]; next["_auto_"+kf]=hit[kf]; }
        });
      }
      return next;
    });
  };
  const isAdmin = user.role==="Admin";
  const dup = f.sigma && enq.find(e=>String(e.sigma)===f.sigma.trim() && !["Lost","No Quote","Dormant"].includes(e.status));
  const sigmaBad = f.sigma && !/^\d{3,8}$/.test(f.sigma.trim());
  const dupOk = !dup || (isAdmin && override && overrideReason.trim());
  const can = f.sigma && f.customer && f.contact && f.summary && f.quoteDueDate && !sigmaBad && dupOk && !busy;
  const submit=async()=>{
    setBusy(true);
    const data=mkEnquiry({sigma:f.sigma.trim(),customer:f.customer.trim(),contact:f.contact.trim(),email:f.email.trim(),phone:f.phone.trim(),
      source:f.source,rfqRef:f.rfqRef.trim(),summary:f.summary.trim(),receivedAt:new Date().toISOString(),receivedBy:user.id,createdBy:user.id,
      assignedEstimator:f.assignedEstimator,responsible:f.assignedEstimator,status:f.status,priority:f.priority,
      quoteDueDate:f.quoteDueDate?new Date(f.quoteDueDate).toISOString():null});
    delete data.id;
    data.audit=[aud(user.id,"created the enquiry"), aud(user.id,"entered SigmaMRP number "+f.sigma.trim())];
    if(dup && override) data.audit.push(aud(user.id,"admin override of duplicate SigmaMRP — "+overrideReason.trim()));
    const r=await api.create(data, !!(dup&&override));
    if(r && r.duplicate){ pushToast("SigmaMRP "+f.sigma.trim()+" already active on "+(r.on||[]).join(", ")); setBusy(false); return; }
    onCreate(r.enquiry);
  };
  return <div className="scrim center-scrim" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="dh"><div className="dh__top"><div><div className="dh__id">{newIdPreview(enq)}</div><h2>Log new enquiry</h2></div><button className="x" onClick={onClose}>✕</button></div>
        <div className="meta"><span>Prestige Enquiry ID is generated automatically on save. The SigmaMRP number is entered here, by hand, at the very start.</span></div>
      </div>
      <div className="dbody">
        <div className="fieldgrid">
          <Field label="SigmaMRP job/quote number" req>
            <input placeholder="e.g. 54231" value={f.sigma} onChange={e=>set("sigma",e.target.value)} className="mono"/>
            {sigmaBad && <div className="warnbox">{I.flag} Use the numeric SigmaMRP number (3–8 digits).</div>}
            {dup && <div className="warnbox">{I.flag} <span><b>Possible duplicate.</b> SigmaMRP {f.sigma.trim()} is already active on {dup.id} ({dup.customer}). {isAdmin? "As an admin you can override with a reason below." : "Pick a different number, or ask an admin to override."}</span></div>}
            {dup && isAdmin && <div style={{marginTop:8}}>
              <label className="ovr"><input type="checkbox" checked={override} onChange={e=>setOverride(e.target.checked)}/> Override duplicate (admin)</label>
              {override && <input style={{marginTop:6}} placeholder="Reason for override (recorded in audit trail)" value={overrideReason} onChange={e=>setOverrideReason(e.target.value)}/>}
            </div>}
          </Field>
          <Field label="Priority"><select value={f.priority} onChange={e=>set("priority",e.target.value)}><option>High</option><option>Medium</option><option>Low</option></select></Field>
          <Field label="Customer name" req>
            <input list="pf-customers" value={f.customer} onChange={e=>pickCustomer(e.target.value)} placeholder={knownNames.length?"Start typing — saved customers appear":"Company"} autoComplete="off"/>
            <datalist id="pf-customers">{knownNames.map(n=><option key={n} value={n}>{known[n].contact?known[n].contact+(known[n].email?" · "+known[n].email:""):undefined}</option>)}</datalist>
            {known[f.customer.trim()] && <div className="autofill-note">✓ Saved customer — contact details filled in for you (you can still edit them)</div>}
          </Field>
          <Field label="Contact" req><input value={f.contact} onChange={e=>set("contact",e.target.value)} placeholder="Name"/></Field>
          <Field label="Email"><input value={f.email} onChange={e=>set("email",e.target.value)} placeholder="name@customer.com"/></Field>
          <Field label="Phone"><input value={f.phone} onChange={e=>set("phone",e.target.value)}/></Field>
          <Field label="Source" req><select value={f.source} onChange={e=>set("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></Field>
          <Field label="Customer RFQ reference"><input value={f.rfqRef} onChange={e=>set("rfqRef",e.target.value)} placeholder="optional"/></Field>
          <div className="full"><Field label="Enquiry summary" req><textarea rows="2" value={f.summary} onChange={e=>set("summary",e.target.value)} placeholder="What is being enquired — parts, process, quantity"/></Field></div>
          <Field label="Quote due date" req><input type="date" value={f.quoteDueDate} onChange={e=>set("quoteDueDate",e.target.value)}/></Field>
          <Field label="Assigned estimator" req><select value={f.assignedEstimator} onChange={e=>set("assignedEstimator",e.target.value)}>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
        </div>
        <div className="hint" style={{marginTop:18}}>{I.users}<div>Assigning an estimator sets <b>responsibility and notifications</b> — it does not lock the enquiry. Any colleague can still open and progress it.</div></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:6}}>
          <button className="btn btn--g" onClick={onClose}>Cancel</button>
          <button className="btn btn--p" disabled={!can} style={{opacity:can?1:.45}} onClick={can?submit:undefined}>{busy?"Saving…":"Create enquiry"}</button>
        </div>
      </div>
    </div>
  </div>;
}
function newIdPreview(enq){
  const seqOf=id=>parseInt(String(id||"").split("-").pop(),10)||0;
  const n=((enq||[]).reduce((m,e)=>Math.max(m,seqOf(e.id)),131))+1;
  return "ENQ-2026-"+String(n).padStart(6,"0");
}

/* ============================ DRAWER (ENQUIRY DETAIL) ============================ */
function Drawer({e,user,onClose,update,notifyUser,nudge,clearFlag}){

  const [tab,setTab]=useState("summary");
  const isOwner = e.responsible===user.id;

  const pickUp = ()=> update(e.id, x=>{ x.responsible=user.id; x.notes=[...x.notes,{id:++NID,when:new Date().toISOString(),by:user.id,type:"Internal",txt:user.name+" picked up this enquiry."}]; return x; }, "picked up the enquiry (now responsible)");

  return <div className="scrim" onClick={onClose}>
    <div className="drawer" onClick={ev=>ev.stopPropagation()}>
      <div className="dh">
        <div className="dh__top">
          <div>
            <div className="dh__id">{e.id} &nbsp;·&nbsp; SigmaMRP {e.sigma}</div>
            <h2>{e.customer}</h2>

          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="meta">
          <span>Estimator <b>{uName(e.assignedEstimator)}</b></span>
          <span>Responsible <b>{uName(e.responsible)}</b></span>
          <span>Received <b>{fmtDate(e.receivedAt)}</b> by {uName(e.receivedBy)}</span>
          <span>Quote due <b style={{color:isOverdue(e.quoteDueDate)&&!e.outcome?"var(--red)":undefined}}>{fmtDate(e.quoteDueDate)}</b></span>
          {e.rfqRef && <span>RFQ <b>{e.rfqRef}</b></span>}
        </div>

        </div>}
        {!isOwner && !e.outcome && <div className="pickup">

          <div className="t"><b>{uName(e.responsible)} is responsible for this enquiry.</b><small>You can still open, edit and progress it. Take over the next action if you're picking it up.</small></div>
          <button className="btn btn--p" onClick={()=>{pickUp();pushToast("You picked up this enquiry");}}>I'm picking this up</button>
        </div>}
        {tab==="summary" && <TabSummary e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="lines" && <TabLines e={e} user={user} update={update}/>}
        {tab==="docs" && <TabDocs e={e} user={user} update={update}/>}
        {tab==="tasks" && <TabTasks e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="notes" && <TabNotes e={e} user={user} update={update}/>}
        {tab==="chase" && <TabChase e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="outcome" && <TabOutcome e={e} user={user} update={update}/>}
        {tab==="handover" && <TabHandover e={e} user={user} update={update}/>}
        {tab==="audit" && <TabAudit e={e}/>}
      </div>
    </div>
  </div>;
}

  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const save=()=>{ if(!f.title||!f.due)return;
    if(editing==="new"){
      update(e.id,x=>({...x,tasks:[...x.tasks,{id:++TID,title:f.title,assignee:f.assignee,by:user.id,due:new Date(f.due).toISOString(),priority:f.priority,status:"Open",notes:f.notes}]}),"created task “"+f.title+"” for "+uName(f.assignee));
      notifyUser(f.assignee,"task","Task assigned: "+f.title,e.id);
      pushToast("Task assigned to "+uName(f.assignee));
    } else {
      const prev=e.tasks.find(t=>t.id===editing);
      update(e.id,x=>({...x,tasks:x.tasks.map(t=>t.id===editing?{...t,title:f.title,assignee:f.assignee,due:new Date(f.due).toISOString(),priority:f.priority,notes:f.notes}:t)}),"edited task “"+f.title+"”");
      if(prev && prev.assignee!==f.assignee) notifyUser(f.assignee,"task","Task assigned: "+f.title,e.id);
      pushToast("Task updated");

  const setStat=(tid,s)=>update(e.id,x=>({...x,tasks:x.tasks.map(t=>t.id===tid?{...t,status:s,...(s==="Completed"?{completedBy:user.id,completedAt:new Date().toISOString()}:{})}:t)}), (s==="Completed"?"completed":"updated")+" a task");

        <select className="pill-sel" style={{padding:"5px 9px",fontSize:12}} value={t.status} onChange={ev=>setStat(t.id,ev.target.value)}>{TASK_STATUS.map(s=><option key={s}>{s}</option>)}</select>

      </div>
      <div style={{display:"flex",gap:16,color:"var(--t3)",fontSize:12,alignItems:"center"}}>
        <span>For <b style={{color:"var(--t1)"}}>{uName(t.assignee)}</b></span>
        <span>Due <b style={{color:isOverdue(t.due)?"var(--red)":"var(--t1)",fontFamily:"var(--mono)"}}>{fmtDate(t.due)}</b></span>
        {t.notes&&<span>· {t.notes}</span>}

      <div className="fieldgrid">
        <div className="full"><Field label="Task" req><input value={f.title} onChange={ev=>set("title",ev.target.value)} placeholder="e.g. Get powder coating price"/></Field></div>
        <Field label="Assign to" req><select value={f.assignee} onChange={ev=>set("assignee",ev.target.value)}>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
        <Field label="Due date" req><input type="date" value={f.due} onChange={ev=>set("due",ev.target.value)}/></Field>
        <Field label="Priority"><select value={f.priority} onChange={ev=>set("priority",ev.target.value)}><option>High</option><option>Medium</option><option>Low</option></select></Field>
        <Field label="Notes"><input value={f.notes} onChange={ev=>set("notes",ev.target.value)}/></Field>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={()=>{setEditing(null);setF(blank);}}>Cancel</button><button className="btn btn--p" onClick={save}>{editing==="new"?"Assign task":"Save changes"}</button></div>
    </div>}

function TabChase({e,user,update,notifyUser}){
  const [result,setResult]=useState("Email sent"); const [note,setNote]=useState(""); const [next,setNext]=useState("");
  const log=()=>{
    const closing = result==="Customer placing order"||result==="Customer not proceeding";
    update(e.id,x=>{
      const idx=x.chases.length;                       // this chase's 0-based index
      delete x.flag;                                   // logging a chase clears any attention flag
      x.chases=[...x.chases,{id:(x.chases.at(-1)?.id||0)+1,when:new Date().toISOString(),by:user.id,result,note,next:next?new Date(next).toISOString():null}];
      // complete the matching auto-scheduled chase task, if open
      let done=false;
      x.tasks=x.tasks.map(t=>(!done&&t.status==="Open"&&/^Chase quote/.test(t.title))?(done=true,{...t,status:"Completed"}):t);
      // auto-schedule the next planned chase
      const plan=x.chasePlan||CHASE_PLAN; const nextIdx=idx+1;
      if(!closing && nextIdx<plan.length){
        const base=x.quoteSentDate?new Date(x.quoteSentDate).getTime():Date.now();
        const dueISO=next?new Date(next).toISOString():new Date(base+plan[nextIdx]*86400000).toISOString();
        x.nextChaseDate=dueISO;
        const chaser=x.assignedChaseUser||x.responsible;
        x.tasks=[...x.tasks,{id:++TID,title:"Chase quote ("+CHASE_LABELS[nextIdx]+") — "+x.customer,assignee:chaser,by:user.id,due:dueISO,priority:"Medium",status:"Open",notes:"Auto-scheduled chase"}];
      } else { x.nextChaseDate=closing?null:(next?new Date(next).toISOString():null); }
      return x;
    },"logged chase: "+result);
    setNote("");setNext(""); pushToast(closing?"Chase logged":"Chase logged · next chase auto-scheduled");
  };
  const setChaser=v=>{ update(e.id,x=>({...x,assignedChaseUser:v}),"assigned chasing to "+uName(v)); notifyUser(v,"chase","Chase assigned to you: "+e.customer,e.id); };
  const markSent=()=>{
    const chaseUser=e.assignedChaseUser||e.responsible;
    update(e.id,x=>{
      x.quoteSentDate=new Date().toISOString(); x.status="Quote Sent";
      if(!x.assignedChaseUser) x.assignedChaseUser=x.responsible;
      x.chasePlan=CHASE_PLAN; x.nextChaseDate=dShift(CHASE_PLAN[0]);
      x.tasks=[...x.tasks,{id:++TID,title:"Chase quote (1st) — "+x.customer,assignee:chaseUser,by:user.id,due:dShift(CHASE_PLAN[0]),priority:"High",status:"Open",notes:"Auto-scheduled when quote was sent"}];
      return x;
    },"recorded quote sent — first chase auto-scheduled");
    if(chaseUser) notifyUser(chaseUser,"chase","Chase scheduled (3 days): "+e.customer,e.id);
    pushToast("Quote marked sent · first chase scheduled");
  };
  const schedule=[["3 days","First chase"],["7 days","Second chase"],["14 days","Final chase"],["30 days","Review / dormant"]];
  if(e.status!=="Quote Sent" && e.chases.length===0) return <>
    <SecBar>Quote chasing</SecBar>
    <p style={{color:"var(--t2)",fontSize:13,marginBottom:14}}>Once you've sent the customer a quote, record it here. That moves the enquiry to <b>Quote Sent</b> and automatically schedules the first chase so it can't be forgotten.</p>
    <div className="fieldgrid" style={{marginBottom:14}}>
      <Field label="Who will chase this?"><select value={e.assignedChaseUser||""} onChange={ev=>setChaser(ev.target.value)}><option value="">— responsible person —</option>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
    </div>
    <button className="btn btn--p" onClick={markSent}>{I.phone} Record quote sent</button>
  </>;
  return <>
    <SecBar>Chasing</SecBar>
    <div className="fieldgrid" style={{marginBottom:16}}>
      <Field label="Assigned chaser"><select value={e.assignedChaseUser||""} onChange={ev=>setChaser(ev.target.value)}><option value="">— unassigned —</option>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
      <Field label="Quote sent"><div className="val mono">{fmtDate(e.quoteSentDate)} · {daysBetween(e.quoteSentDate,new Date().toISOString())} days ago</div></Field>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>{schedule.map(([d,l])=><span key={l} className="tag-line"><span className="kbd">{d}</span>{l}</span>)}</div>
    {e.nextChaseDate && <div className="hint" style={{marginBottom:16}}>{I.phone}<div>Next chase auto-scheduled for <b style={{color:isOverdue(e.nextChaseDate)?"var(--red)":undefined}}>{fmtDate(e.nextChaseDate)}</b> — it's on the assigned chaser's task list.</div></div>}

    <div className="panel" style={{padding:14,marginBottom:16}}>
      <div className="fieldgrid three">
        <Field label="Chase result"><select value={result} onChange={ev=>setResult(ev.target.value)}>{CHASE_RESULTS.map(r=><option key={r}>{r}</option>)}</select></Field>
        <Field label="Next chase date"><input type="date" value={next} onChange={ev=>setNext(ev.target.value)}/></Field>
        <Field label="Note"><input value={note} onChange={ev=>setNote(ev.target.value)} placeholder="optional"/></Field>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}><button className="btn btn--p" onClick={log}>{I.phone} Log chase</button></div>
    </div>
    <div className="audit" style={{marginLeft:14}}>
      {[...e.chases].reverse().map(c=><div className="row" key={c.id}><b className="who">{c.result}</b> <span style={{color:"var(--t2)"}}>{c.note}</span> — {uName(c.by)}{c.next&&<span style={{color:"var(--t3)"}}> · next {fmtDate(c.next)}</span>}<div className="when">{fmtDT(c.when)}</div></div>)}
      {e.chases.length===0 && <div className="empty" style={{padding:16}}>No chases logged yet.</div>}
    </div>
  </>;
}

function TabOutcome({e,user,update}){
  const OUT=["Won","Lost","No Quote","Cancelled","Dormant"];
  const [out,setOut]=useState(e.outcome||""); const [reason,setReason]=useState(e.lostReason||""); const [po,setPo]=useState(e.poNumber||"");
  const reasons = out==="Lost"?LOST_REASONS:out==="No Quote"?NOQUOTE_REASONS:null;
  const save=()=>{ update(e.id,x=>{ x.outcome=out; x.lostReason=reasons?reason:null; x.poNumber=out==="Won"?po:x.poNumber; delete x.flag;
      x.status = out==="Won"?(po?"Won - PO Received":"Won - Awaiting PO"):out==="Lost"?"Lost":out==="No Quote"?"No Quote":out==="Dormant"?"Dormant":x.status; return x; },"set outcome to "+out+(reasons&&reason?" ("+reason+")":""));
    pushToast("Outcome set to "+out); };
  const can = out && (!reasons || reason);
  return <>
    <SecBar>Outcome</SecBar>
    <div className="fieldgrid">
      <Field label="Outcome" req><select value={out} onChange={ev=>{setOut(ev.target.value);setReason("");}}><option value="">— choose —</option>{OUT.map(o=><option key={o}>{o}</option>)}</select></Field>
      {reasons && <Field label={out+" reason"} req><select value={reason} onChange={ev=>setReason(ev.target.value)}><option value="">— choose —</option>{reasons.map(r=><option key={r}>{r}</option>)}</select></Field>}
      {out==="Won" && <Field label="Customer PO number"><input value={po} onChange={ev=>setPo(ev.target.value)} className="mono" placeholder="PO-…"/></Field>}
    </div>
    <button className="btn btn--p" style={{marginTop:14,opacity:can?1:.45}} disabled={!can} onClick={can?save:undefined}>Save outcome</button>
    {e.outcome && <div className="hint" style={{marginTop:16}}>{I.flag}<div>Current outcome: <b>{e.outcome}</b>{e.lostReason&&<> · {e.lostReason}</>}{e.poNumber&&<> · PO {e.poNumber}</>}. {e.outcome==="Won"&&"Complete the production handover checklist before release."}</div></div>}
  </>;
}

function TabHandover({e,user,update}){
  const ITEMS=["SigmaMRP job/quote number confirmed","Customer PO received and number entered","PO price matches quote","PO quantity matches quote","Delivery date agreed","Correct drawing revision attached","Final CAD files attached","Material confirmed","Finish/coating confirmed","Route confirmed","Inspection requirements confirmed","Certificates confirmed"];
  const toggle=(i)=>update(e.id,x=>({...x,handover:{...x.handover,[i]:!x.handover[i]}}), null);
  const done=ITEMS.filter((_,i)=>e.handover[i]).length;
  const release=()=>update(e.id,x=>({...x,status:"Released to Production"}),"released the job to production");
  if(e.outcome!=="Won") return <><SecBar>Production handover</SecBar><div className="empty">Handover opens once the enquiry is marked <b style={{margin:"0 4px"}}>Won</b> in the Outcome tab.</div></>;
  return <>
    <SecBar>Production handover checklist</SecBar>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
      <div className="bartrack" style={{flex:1,height:10}}><div className="barfill" style={{width:(done/ITEMS.length*100)+"%",background:"var(--green)"}}></div></div>
      <span className="mono" style={{fontWeight:600}}>{done}/{ITEMS.length}</span>
    </div>
    {ITEMS.map((it,i)=><div className={"check"+(e.handover[i]?" done":"")} key={i}><input type="checkbox" id={"h"+i} checked={!!e.handover[i]} onChange={()=>toggle(i)}/><label htmlFor={"h"+i}>{it}</label></div>)}
    <button className="btn btn--green" style={{marginTop:14,opacity:done===ITEMS.length?1:.5}} disabled={done!==ITEMS.length||e.status==="Released to Production"} onClick={release}>{I.truck} {e.status==="Released to Production"?"Released to production":"Release to production"}</button>
  </>;
}

function TabAudit({e}){
  const rows=[...e.audit].sort((a,b)=>new Date(b.when)-new Date(a.when));
  return <><SecBar>Audit trail</SecBar>
    <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>Because everyone can work on every enquiry, the audit trail records exactly who did what, and when.</p>
    <div className="audit" style={{marginLeft:14}}>{rows.map(a=><div className="row" key={a.id}><span className="who">{uName(a.who)}</span> {a.action}<div className="when">{fmtDT(a.when)}</div></div>)}</div>
  </>;
}

/* ============================ NOTIFICATIONS ============================ */
function NotifPop({list,onClose,onOpen,onRead}){
  useEffect(()=>{ const id=setTimeout(onRead,1200); return ()=>clearTimeout(id); },[]);
  const col={chase:"var(--orange)",overdue:"var(--red)",task:"var(--blue)",supplier:"var(--amber)",won:"var(--green)",assign:"var(--violet)"};
  return <div className="notifpop" onClick={e=>e.stopPropagation()}>
    <div className="h"><b>Notifications</b><span style={{marginLeft:"auto",color:"var(--t3)",fontSize:12}}>{list.filter(n=>!n.read).length} unread</span></div>
    <div className="list">
      {list.length===0 && <div className="empty" style={{padding:30}}>You're all caught up.</div>}
      {list.map(n=><div key={n.id} className={"ni"+(n.read?"":" unread")} onClick={()=>onOpen(n.enq)}>
        <span className="ic" style={{background:col[n.type]||"var(--steel)"}}>{n.type==="chase"||n.type==="overdue"?I.phone:n.type==="task"?I.check:n.type==="won"?I.truck:I.bell}</span>
        <div><div className="t">{n.txt}</div><div className="w">{fmtDT(n.when)}</div></div>
      </div>)}
    </div>
    <div style={{padding:"10px 16px",borderTop:"1px solid var(--hair)",fontSize:11.5,color:"var(--t3)"}}>Notifications flag what needs attention — the task stays the official record.</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
