/* ============================ APP ============================ */
function App(){
  const [booting,setBooting]=useState(true);
  const [user,setUser]=useState(null);
  const [enq,setEnq]=useState([]);
  const [notif,setNotif]=useState([]);
  const [view,setView]=useState("dashboard");
  const [openId,setOpenId]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [search,setSearch]=useState("");
  const [showNotif,setShowNotif]=useState(false);
  const [showWho,setShowWho]=useState(false);

  const loadState = useCallback(async ()=>{
    const st = await api.state();
    if(!st){ setUser(null); setBooting(false); return; }
    if(Array.isArray(st.users)&&st.users.length){ USERS.length=0; USERS.push(...st.users); }
    SUPPLIERS.length=0; SUPPLIERS.push(...(st.suppliers||[]));
    if(st.needsSeed){ await api.seed(SEED, SEED_NOTIF); return loadState(); }
    setUser(st.user); setEnq(st.enquiries||[]); setNotif(st.notifications||[]); setBooting(false);
  },[]);
  useEffect(()=>{ loadState(); },[loadState]);

  const open = enq.find(e=>e.id===openId);
  const myNotif = notif.filter(n=>n.user===(user&&user.id));
  const unread = myNotif.filter(n=>!n.read).length;

  // mutate an enquiry + record audit, then persist to the backend
  const update = (id, fn, auditAction) => {
    setEnq(prev => prev.map(e => {
      if(e.id!==id) return e;
      const next = fn({...e});
      if(auditAction) next.audit = [...(e.audit||[]), aud(user.id, auditAction)];
      api.put(id, next);
      return next;
    }));
  };
  const notifyUser = (uid,type,txt,eid) => {
    if(uid===user.id) return; // don't notify yourself
    setNotif(p=>[{id:++NID,user:uid,type,txt,enq:eid,when:new Date().toISOString(),read:false},...p]);
    api.notify(uid,type,txt,eid);
  };
  const addEnquiry = e => { setEnq(p=>[e,...p]); };
  const cap = s => (s||"").charAt(0).toUpperCase()+(s||"").slice(1);
  const nudge = (e, msg) => {
    const quoteOut = e.status==="Quote Sent";
    const target = quoteOut ? (e.assignedChaseUser||e.responsible) : e.responsible;
    const verb = quoteOut ? "Chase" : "Progress";
    update(e.id, x=>{
      x.flag = {by:user.id, when:new Date().toISOString(), note:msg||""};
      const openNudge = (x.tasks||[]).some(t=>t.status!=="Completed"&&t.status!=="Cancelled"&&/needs attention/i.test(t.notes||""));
      if(!openNudge) x.tasks=[...x.tasks,{id:++TID,title:verb+" — "+x.customer,assignee:target,by:user.id,due:new Date().toISOString(),priority:"High",status:"Open",notes:"Flagged as needing attention"+(msg?": "+msg:"")}];
      if(quoteOut) x.nextChaseDate=new Date().toISOString();
      x.notes=[...(x.notes||[]),{id:++NID,when:new Date().toISOString(),by:user.id,type:"Internal",txt:user.name+" flagged this for attention — asked "+uName(target)+" to "+verb.toLowerCase()+" it"+(msg?": “"+msg+"”":".")}];
      return x;
    }, "flagged for attention — asked "+uName(target)+" to "+verb.toLowerCase()+" it");
    notifyUser(target,"chase","⏰ "+cap(firstname(user.name))+" wants this "+(quoteOut?"chased up":"progressed")+": "+e.customer, e.id);
    pushToast("Nudge sent to "+uName(target));
  };
  const clearFlag = (e) => update(e.id, x=>{ const y={...x}; delete y.flag; return y; }, "cleared the attention flag");
  const logout = async () => { await api.logout(); setUser(null); setEnq([]); setNotif([]); };
  const switchUser = async (un) => { await api.login(un); setShowWho(false); await loadState(); pushToast("Switched to "+un.charAt(0).toUpperCase()+un.slice(1)); };

  if(booting) return <Splash/>;
  if(!user) return <Login onDone={loadState}/>;

  const counts = {
    enquiries: enq.length,
    tasks: enq.flatMap(e=>e.tasks||[]).filter(t=>t.status!=="Completed"&&t.status!=="Cancelled").length,
    chase: enq.filter(e=>e.status==="Quote Sent").length,
    outstanding: (()=>{ const open=e=>!e.outcome&&!["Lost","No Quote","Cancelled","Released to Production"].includes(e.status);
      const oq=enq.filter(e=>open(e)&&e.status!=="Quote Sent"&&isOverdue(e.quoteDueDate)).length;
      const dt=enq.filter(e=>open(e)&&e.status!=="Quote Sent"&&isToday(e.quoteDueDate)).length;
      const ch=enq.filter(e=>e.status==="Quote Sent"&&(isOverdue(e.nextChaseDate)||isToday(e.nextChaseDate))).length;
      const fl=enq.filter(e=>e.flag&&open(e)).length;
      const ot=enq.flatMap(e=>(e.tasks||[])).filter(t=>t.status!=="Completed"&&t.status!=="Cancelled"&&isOverdue(t.due)).length;
      return oq+dt+ch+fl+ot; })(),
  };

  return (
    <div className="app">
      <aside className="side">
        <div className="side__brand">
          <img src={LOGO_REV} className="side__logo" alt="Prestige Fabrications"/>
        </div>
        <button className={"navitem"+(view==="dashboard"?" active":"")} onClick={()=>{setView("dashboard");setOpenId(null);}}><span className="ico">{I.grid}</span>Dashboard</button>
        <button className={"navitem"+(view==="outstanding"?" active":"")} onClick={()=>{setView("outstanding");setOpenId(null);}}><span className="ico">{I.flag}</span>Outstanding{counts.outstanding>0&&<span className="badge badge--hot">{counts.outstanding}</span>}</button>
        <div className="navlabel">Enquiries</div>
        <button className={"navitem"+(view==="enquiries"?" active":"")} onClick={()=>{setView("enquiries");setOpenId(null);}}><span className="ico">{I.list}</span>All enquiries<span className="badge">{counts.enquiries}</span></button>
        <button className={"navitem"+(view==="tasks"?" active":"")} onClick={()=>{setView("tasks");setOpenId(null);}}><span className="ico">{I.check}</span>Tasks<span className="badge">{counts.tasks}</span></button>
        <button className={"navitem"+(view==="chasing"?" active":"")} onClick={()=>{setView("chasing");setOpenId(null);}}><span className="ico">{I.phone}</span>Chasing<span className="badge">{counts.chase}</span></button>
        <div className="navlabel">Insight</div>
        <button className={"navitem"+(view==="reports"?" active":"")} onClick={()=>{setView("reports");setOpenId(null);}}><span className="ico">{I.chart}</span>Reports</button>
        {user.role==="Admin" && <>
          <div className="navlabel">Admin</div>
          <button className={"navitem"+(view==="users"?" active":"")} onClick={()=>{setView("users");setOpenId(null);}}><span className="ico">{I.users}</span>Users</button>
        </>}
        <div className="side__foot">{DEMO && <span className="demobadge">DEMO · example data</span>}Shared control board<br/>Assignment = responsibility,<br/>not visibility or access.</div>
      </aside>

      <header className="top">
        <div className="search">
          <span className="sico">{I.search}</span>
          <input placeholder="Search enquiry ID, SigmaMRP, customer, drawing, part…" value={search}
            onChange={e=>{setSearch(e.target.value); if(e.target.value){setView("enquiries");setOpenId(null);}}}/>
        </div>
        <button className="top__btn primary" onClick={()=>setShowNew(true)}>{I.plus} New enquiry</button>
        <div style={{position:"relative"}}>
          <button className="bell" onClick={()=>setShowNotif(s=>!s)}>{I.bell}{unread>0&&<span className="dot">{unread}</span>}</button>
        </div>
        <button className="who" onClick={()=>setShowWho(s=>!s)}>
          <span className="avatar" style={{background:user.c,width:30,height:30,fontSize:11}}>{initials(user.name)}</span>
          <span style={{textAlign:"left"}}><small>{user.role}</small><b>{user.name}</b></span>
          {I.down}
        </button>
      </header>

      {showNotif && <NotifPop list={myNotif} onClose={()=>setShowNotif(false)}
        onOpen={(eid)=>{setOpenId(eid);setShowNotif(false);}}
        onRead={()=>{setNotif(p=>p.map(n=>n.user===user.id?{...n,read:true}:n)); api.markRead();}}/>}
      {showWho && <div className="whopop">
        <div className="whopop__lbl">Signed in as</div>
        <div className="opt active" style={{cursor:"default"}}>
          <span className="av-sm" style={{background:user.c}}>{initials(user.name)}</span>
          <span style={{textAlign:"left"}}><b style={{fontFamily:"var(--ui)",fontSize:13}}>{user.name}</b><br/><small style={{color:"var(--t3)",fontSize:11}}>{user.role}</small></span>
        </div>
        {DEMO && <>
          <div className="whopop__lbl" style={{marginTop:6}}>Demo — switch person</div>
          {USERS.filter(u=>u.id!==user.id&&u.active!==false).map(u=>
            <button key={u.id} className="opt" onClick={()=>switchUser(firstname(u.name))}>
              <span className="av-sm" style={{background:u.c}}>{initials(u.name)}</span>
              <span style={{textAlign:"left"}}><b style={{fontFamily:"var(--ui)",fontSize:13}}>{u.name}</b><br/><small style={{color:"var(--t3)",fontSize:11}}>{u.role}</small></span>
            </button>)}
        </>}
        <button className="opt logout" onClick={logout}><span className="av-sm" style={{background:"#7E8D9B"}}>{I.out}</span><span style={{textAlign:"left"}}><b style={{fontFamily:"var(--ui)",fontSize:13}}>Sign out</b></span></button>
      </div>}

      <main className="main" onClick={()=>{showNotif&&setShowNotif(false);showWho&&setShowWho(false);}}>
        {view==="dashboard" && <Dashboard enq={enq} user={user} onOpen={setOpenId} setView={setView} myNotif={myNotif} nudge={nudge}/>}
        {view==="outstanding" && <Outstanding enq={enq} user={user} onOpen={setOpenId} nudge={nudge}/>}
        {view==="enquiries" && <Enquiries enq={enq} user={user} onOpen={setOpenId} search={search} setSearch={setSearch} nudge={nudge}/>}
        {view==="tasks" && <Tasks enq={enq} user={user} onOpen={setOpenId} update={update}/>}
        {view==="chasing" && <Chasing enq={enq} user={user} onOpen={setOpenId} nudge={nudge}/>}
        {view==="reports" && <Reports enq={enq}/>}
        {view==="users" && user.role==="Admin" && <Users user={user} reload={loadState}/>}
      </main>

      {open && <Drawer e={open} user={user} onClose={()=>setOpenId(null)} update={update} notifyUser={notifyUser} nudge={nudge} clearFlag={clearFlag}/>}
      {showNew && <NewEnquiry enq={enq} user={user} onClose={()=>setShowNew(false)} onCreate={(e)=>{addEnquiry(e);setShowNew(false);setOpenId(e.id);pushToast("Enquiry "+e.id+" created");}}/>}

      <Toasts/>
    </div>
  );
}

/* ============================ SPLASH ============================ */
function Splash(){
  return <div className="splash"><img src={LOGO_FULL} className="splash__logo" alt="Prestige Fabrications"/><div className="splash__txt">Loading control board…</div></div>;
}

/* ============================ LOGIN ============================ */
function Login({onDone}){
  const [username,setU]=useState("");
  const [password,setP]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const submit = async (un,pw) => {
    setErr(""); setBusy(true);
    try{ await api.login(un,pw); await onDone(); }
    catch(e){ setErr(e.message||"Login failed"); setBusy(false); }
  };
  return (
    <div className="login">
      <div className="login__hero">
        <img src={LOGO_REV} className="hero__logo" alt="Prestige Fabrications"/>
        <div>
          <h1>Enquiry Control Board</h1>
          <p>One shared board for every enquiry — from the moment it lands to production handover. Log it, estimate it, quote it, chase it, win it.</p>
          <div className="principle"><b>Core principle.</b> Assignment controls responsibility and notifications — not visibility or access. Anyone on the team can open, progress, or pick up any enquiry.</div>
        </div>
        <div className="specrow">
          <span><b>SigmaMRP</b>manual logging</span>
          <span><b>Saved</b>real database</span>
          <span><b>Audited</b>who · what · when</span>
        </div>
      </div>
      <div className="login__panel">
        <h2>Sign in</h2>
        <p className="sub">Each person has their own login so the audit trail stays accurate.</p>
        <div className="loginform">
          <Field label="Username"><input value={username} autoFocus onChange={e=>setU(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")submit(username,password);}} placeholder="Username"/></Field>
          <Field label="Password"><input type="password" value={password} onChange={e=>setP(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")submit(username,password);}} placeholder="••••••"/></Field>
          {err && <div className="loginerr">{err}</div>}
          <button className="btn btn--primary wide" disabled={busy} onClick={()=>submit(username,password)}>{busy?"Signing in…":"Sign in"}</button>
        </div>
        {DEMO && <div className="demopick">
          <div className="demopick__lbl">Demo — tap a person to sign in</div>
          {USERS.map(u=><button key={u.id} className="demopick__u" disabled={busy} onClick={()=>submit(firstname(u.name),"demo")}>
            <span className="av-sm" style={{background:u.c}}>{initials(u.name)}</span>
            <span style={{textAlign:"left"}}><b>{u.name}</b><br/><small>{u.role}</small></span>
          </button>)}
          <p className="demopick__note">This is a self-contained demo with example data. Nothing is saved — refresh the page to reset everything.</p>
        </div>}
      </div>
    </div>
  );
}

/* ============================ DASHBOARD ============================ */
/* ---- Outstanding: everything behind or needing action, in one place ---- */
function Outstanding({enq,user,onOpen,nudge}){
  const openE = e => !e.outcome && !["Lost","No Quote","Cancelled","Released to Production"].includes(e.status);
  const ageDays = d => daysBetween(d, new Date().toISOString());
  const lastActivity = e => (e.audit&&e.audit.length? e.audit[e.audit.length-1].when : e.receivedAt);

  const flagged   = enq.filter(e=>e.flag && openE(e));
  const overdueQ  = enq.filter(e=>openE(e) && e.status!=="Quote Sent" && isOverdue(e.quoteDueDate));
  const dueToday  = enq.filter(e=>openE(e) && e.status!=="Quote Sent" && isToday(e.quoteDueDate));
  const chaseDue  = enq.filter(e=>e.status==="Quote Sent" && (isOverdue(e.nextChaseDate)||isToday(e.nextChaseDate)));
  const lateTasks = enq.flatMap(e=>(e.tasks||[]).filter(t=>t.status!=="Completed"&&t.status!=="Cancelled"&&isOverdue(t.due)).map(t=>({t,e})));
  const inABucket = new Set([...flagged,...overdueQ,...dueToday,...chaseDue].map(e=>e.id));
  const quiet     = enq.filter(e=>openE(e) && !inABucket.has(e.id) && ageDays(lastActivity(e))>=7);
  const total = flagged.length+overdueQ.length+dueToday.length+chaseDue.length+lateTasks.length;

  const Row = ({e,why,whyColor}) => <tr onClick={()=>onOpen(e.id)} className="row-behind">
    <td><div className="idcell">{e.flag&&<span style={{color:"var(--red)"}}>⚑ </span>}{e.id.replace("ENQ-2026-","#")}<small>SIG {e.sigma}</small></div></td>
    <td><div className="cust">{e.customer}</div><div className="sub-c">{(e.summary||"").slice(0,40)}</div></td>
    <td><Pill s={e.status}/></td>
    <td><Owner id={e.status==="Quote Sent"?(e.assignedChaseUser||e.responsible):e.responsible}/></td>
    <td style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:600,color:whyColor||"var(--red)"}}>{why}</td>
    <td onClick={ev=>ev.stopPropagation()} style={{textAlign:"right"}}><button className={"nudgebtn"+(e.flag?" on":"")} onClick={()=>nudge(e)}>{I.flag} Nudge</button></td>
  </tr>;
  const Sect = ({title,sub,count,children}) => <div className="panel" style={{marginBottom:18}}>
    <div className="panel__h"><h3>{title}</h3><span className="count">{count}</span><div className="spacer"></div><span style={{color:"var(--t3)",fontSize:12}}>{sub}</span></div>
    {count>0
      ? <div className="table-wrap" style={{border:"none",boxShadow:"none",borderRadius:0}}><table>
          <thead><tr><th>Enquiry</th><th>Customer</th><th>Status</th><th>Who</th><th>Why it's here</th><th></th></tr></thead>
          <tbody>{children}</tbody></table></div>
      : <div className="empty" style={{padding:"18px 24px"}}>Nothing here — all clear.</div>}
  </div>;

  return <>
    <div className="pagehead">
      <div><div className="eyebrow">Everything behind or needing action</div><h1>Outstanding</h1></div>
      <div className="spacer"></div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:"var(--mono)",fontSize:26,fontWeight:600,color:total?"var(--red)":"var(--green)"}}>{total}</div>
        <div style={{color:"var(--t3)",fontSize:12}}>{total?"items needing action":"all caught up"}</div>
      </div>
    </div>

    <Sect title="Flagged for attention" sub="someone has asked for these to be moved" count={flagged.length}>
      {flagged.map(e=><Row key={e.id} e={e} why={"by "+uName(e.flag.by)+" · "+fmtDate(e.flag.when)}/>)}
    </Sect>

    <Sect title="Overdue to quote" sub="past their quote-due date and nothing sent" count={overdueQ.length}>
      {[...overdueQ].sort((a,b)=>new Date(a.quoteDueDate)-new Date(b.quoteDueDate)).map(e=><Row key={e.id} e={e} why={ageDays(e.quoteDueDate)+"d overdue"}/>)}
    </Sect>

    <Sect title="Quote due today" sub="needs sending before the day is out" count={dueToday.length}>
      {dueToday.map(e=><Row key={e.id} e={e} why="due today" whyColor="var(--amber)"/>)}
    </Sect>

    <Sect title="Chases due" sub="quotes out with a chase due or overdue" count={chaseDue.length}>
      {[...chaseDue].sort((a,b)=>new Date(a.nextChaseDate||0)-new Date(b.nextChaseDate||0)).map(e=><Row key={e.id} e={e} why={isToday(e.nextChaseDate)?"chase due today":ageDays(e.nextChaseDate)+"d late"} whyColor={isToday(e.nextChaseDate)?"var(--amber)":"var(--red)"}/>)}
    </Sect>

    <div className="panel" style={{marginBottom:18}}>
      <div className="panel__h"><h3>Overdue tasks</h3><span className="count">{lateTasks.length}</span><div className="spacer"></div><span style={{color:"var(--t3)",fontSize:12}}>assigned work past its due date</span></div>
      {lateTasks.length>0
        ? <div className="table-wrap" style={{border:"none",boxShadow:"none",borderRadius:0}}><table>
            <thead><tr><th>Task</th><th>Enquiry</th><th>Assigned to</th><th>Due</th><th></th></tr></thead>
            <tbody>{[...lateTasks].sort((a,b)=>new Date(a.t.due)-new Date(b.t.due)).map(({t,e})=><tr key={e.id+"-"+t.id} onClick={()=>onOpen(e.id)} className="row-behind">
              <td><b style={{fontFamily:"var(--ui)",fontSize:13}}>{t.title}</b> <Prio p={t.priority}/></td>
              <td><div className="idcell">{e.id.replace("ENQ-2026-","#")}<small>{e.customer}</small></div></td>
              <td><Owner id={t.assignee}/></td>
              <td style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:600,color:"var(--red)"}}>{ageDays(t.due)}d late</td>
              <td onClick={ev=>ev.stopPropagation()} style={{textAlign:"right"}}><button className="nudgebtn" onClick={()=>nudge(e)}>{I.flag} Nudge</button></td>
            </tr>)}</tbody></table></div>
        : <div className="empty" style={{padding:"18px 24px"}}>Nothing here — all clear.</div>}
    </div>

    <Sect title="Gone quiet" sub="open enquiries with no activity for 7+ days" count={quiet.length}>
      {[...quiet].sort((a,b)=>new Date(lastActivity(a))-new Date(lastActivity(b))).map(e=><Row key={e.id} e={e} why={ageDays(lastActivity(e))+"d since last activity"} whyColor="var(--t2)"/>)}
    </Sect>
  </>;
}

function Dashboard({enq,user,onOpen,setView,myNotif,nudge}){
  const open = enq.filter(e=>!["Lost","No Quote","Released to Production","Cancelled"].includes(e.status) && !e.outcome);
  const sentList = enq.filter(e=>e.status==="Quote Sent");
  const needChase = sentList.filter(e=>isOverdue(e.nextChaseDate)||isToday(e.nextChaseDate)||(e.chases||[]).some(c=>isOverdue(c.next)||isToday(c.next)));
  const isBehind = e => (e.status!=="Quote Sent"&&!e.outcome&&isOverdue(e.quoteDueDate)) || (e.status==="Quote Sent"&&(isOverdue(e.nextChaseDate)||isToday(e.nextChaseDate)));
  const stats = {
    newToday: enq.filter(e=>isToday(e.receivedAt)).length,
    open: open.length,
    dueToday: enq.filter(e=>e.status!=="Quote Sent" && !e.outcome && isToday(e.quoteDueDate)).length,
    overdue: enq.filter(e=>e.status!=="Quote Sent" && !e.outcome && isOverdue(e.quoteDueDate)).length,
    toQuote: open.filter(e=>e.status!=="Quote Sent").length,
    sent: sentList.length,
    chase: needChase.length,
    waitCust: enq.filter(e=>e.status==="Waiting for Customer Clarification"||e.status==="Waiting for Drawings").length,
    waitSup: enq.filter(e=>e.status==="Waiting for Supplier Price").length,
    wonPO: enq.filter(e=>e.status==="Won - Awaiting PO").length,
    flagged: enq.filter(e=>e.flag && !e.outcome).length,
  };
  const won=enq.filter(e=>e.outcome==="Won").length, lost=enq.filter(e=>e.outcome==="Lost").length;
  const winRate = (won+lost)? Math.round(won/(won+lost)*100):0;
  const recent = [...enq].flatMap(e=>e.audit.map(a=>({...a,eid:e.id,cust:e.customer}))).sort((a,b)=>new Date(b.when)-new Date(a.when)).slice(0,7);
  const mine = enq.filter(e=>e.responsible===user.id && !e.outcome);
  const ageOf = e => daysBetween(e.receivedAt, new Date().toISOString());
  const board = [...open].sort((a,b)=>(isBehind(b)-isBehind(a)) || (new Date(a.quoteDueDate)-new Date(b.quoteDueDate)));

  const C = ({k,v,sub,cls,onClick}) => <div className={"stat "+(cls||"")} onClick={onClick} style={onClick?{cursor:"pointer"}:undefined}><div className="k">{k}</div><div className="v">{v}</div>{sub&&<div className="sub">{sub}</div>}</div>;

  return <>
    <div className="pagehead">
      <div>
        <div className="eyebrow">Company-wide · {fmtDate(new Date().toISOString())}</div>
        <h1>Enquiry control room</h1>
      </div>
      <div className="spacer"></div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:"var(--mono)",fontSize:26,fontWeight:600,color:"var(--ink)"}}>{winRate}%</div>
        <div style={{color:"var(--t3)",fontSize:12}}>win rate · {won} won / {won+lost} decided</div>
      </div>
    </div>

    <div className="statgrid">
      <C k="New today" v={stats.newToday} onClick={()=>setView("enquiries")}/>
      <C k="Open enquiries" v={stats.open} onClick={()=>setView("enquiries")}/>
      <C k="Due today" v={stats.dueToday} cls={stats.dueToday?"warn":""} sub="quote due"/>
      <C k="Overdue" v={stats.overdue} cls={stats.overdue?"alert":""} sub="past quote-due date"/>
      <C k="Still to quote" v={stats.toQuote} sub="open, not yet sent"/>
      <C k="Quotes sent" v={stats.sent} sub="awaiting response" onClick={()=>setView("chasing")}/>
      <C k="Need chasing" v={stats.chase} cls={stats.chase?"alert":""} sub="chase due/overdue" onClick={()=>setView("chasing")}/>
      <C k="Flagged" v={stats.flagged} cls={stats.flagged?"alert":""} sub="needs attention" onClick={()=>setView("enquiries")}/>
      <C k="Waiting on customer" v={stats.waitCust} cls={stats.waitCust?"warn":""}/>
      <C k="Waiting on supplier" v={stats.waitSup} cls={stats.waitSup?"warn":""}/>
      <C k="Won — awaiting PO" v={stats.wonPO} cls="good"/>
    </div>

    <div className="cols">
      <div className="panel">
        <div className="panel__h"><h3>Live enquiry board</h3><span className="count">{open.length} active</span><div className="spacer"></div><button className="btn btn--g btn--sm" onClick={()=>setView("enquiries")}>Open all</button></div>
        <div className="table-wrap" style={{border:"none",boxShadow:"none",borderRadius:0}}>
          <table>
            <thead><tr><th>Enquiry</th><th>Customer</th><th>Status</th><th>Owner</th><th>Quote due</th><th>Age</th><th></th></tr></thead>
            <tbody>{board.slice(0,8).map(e=>
              <tr key={e.id} onClick={()=>onOpen(e.id)} className={isBehind(e)?"row-behind":""}>
                <td><div className="idcell">{e.flag&&<span title="Flagged for attention" style={{color:"var(--red)"}}>⚑ </span>}{e.id.replace("ENQ-2026-","#")}<small>SIG {e.sigma}</small></div></td>
                <td><div className="cust">{e.customer}</div><div className="sub-c">{e.summary.slice(0,34)}…</div></td>
                <td><Pill s={e.status}/></td>
                <td><Owner id={e.responsible}/></td>
                <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(e.quoteDueDate)&&!e.outcome?"var(--red)":"var(--t2)"}}>{fmtDate(e.quoteDueDate)}</td>
                <td className="mono" style={{fontSize:12,color:"var(--t2)"}}>{ageOf(e)}d</td>
                <td onClick={ev=>ev.stopPropagation()} style={{textAlign:"right"}}>
                  <button className={"nudgebtn"+(e.flag?" on":"")} title={e.flag?"Already flagged — nudge again":"Nudge the owner to "+(e.status==="Quote Sent"?"chase this":"progress this")} onClick={()=>nudge(e)}>{I.flag} Nudge</button>
                </td>
              </tr>)}
              {board.length===0 && <tr><td colSpan="7"><div className="empty">No open enquiries.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        <div className="panel">
          <div className="panel__h"><h3>My responsibilities</h3><span className="count">{mine.length}</span></div>
          <div style={{padding:"6px 8px"}}>
            {mine.length===0 && <div className="empty" style={{padding:24}}>Nothing assigned to you right now.</div>}
            {mine.map(e=><button key={e.id} className="navitem" style={{color:"var(--t1)"}} onClick={()=>onOpen(e.id)}>
              <span style={{flex:1,textAlign:"left"}}><b style={{fontFamily:"var(--ui)",fontSize:13}}>{e.customer}</b><br/><span style={{color:"var(--t3)",fontSize:12}}>{e.status}</span></span>
              {isOverdue(e.quoteDueDate)&&!e.outcome && <span className="prio prio--High">Overdue</span>}
            </button>)}
          </div>
        </div>
        <div className="panel">
          <div className="panel__h"><h3>Recent activity</h3></div>
          <div className="audit" style={{margin:"14px 18px 14px 28px"}}>
            {recent.map(a=><div className="row" key={a.id} onClick={()=>onOpen(a.eid)} style={{cursor:"pointer"}}>
              <span className="who">{uName(a.who)}</span> {a.action} <span style={{color:"var(--t3)"}}>· {a.cust}</span>
              <div className="when">{fmtDT(a.when)}</div>
            </div>)}
          </div>
        </div>
      </div>
    </div>
  </>;
}

/* ============================ ENQUIRIES LIST ============================ */
function Enquiries({enq,user,onOpen,search,setSearch,nudge}){
  const VIEWS = [["all","All enquiries"],["flag","Flagged"],["mine","My assigned"],["resp","I'm responsible"],["chase","My chases"]];
  const [v,setV]=useState("all");
  const [status,setStatus]=useState("All");
  const [sf,setSf]=useState(search||"");
  useEffect(()=>{ setSf(search); },[search]);

  let rows = enq;
  if(v==="flag") rows = rows.filter(e=>e.flag && !e.outcome);
  if(v==="mine") rows = rows.filter(e=>e.assignedEstimator===user.id);
  if(v==="resp") rows = rows.filter(e=>e.responsible===user.id);
  if(v==="chase") rows = rows.filter(e=>e.assignedChaseUser===user.id && e.status==="Quote Sent");
  if(status!=="All") rows = rows.filter(e=>e.status===status);
  const q=(sf||"").toLowerCase();
  if(q) rows = rows.filter(e=> [e.id,e.sigma,e.customer,e.contact,e.summary,e.rfqRef,...(e.lines||[]).flatMap(l=>[l.part,l.draw])].join(" ").toLowerCase().includes(q));

  return <>
    <div className="pagehead"><div><div className="eyebrow">Shared · everyone sees everything</div><h1>All enquiries</h1></div></div>
    <div className="hint">{I.users}<div><b>This is a shared board.</b> The views below are filters, not access limits. You can open and progress any enquiry, including ones assigned to a colleague.</div></div>
    <div className="ftbar">
      <div className="seg">{VIEWS.map(([k,l])=><button key={k} className={v===k?"active":""} onClick={()=>setV(k)}>{l}</button>)}</div>
      <select className="pill-sel" value={status} onChange={e=>setStatus(e.target.value)}>
        <option>All</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
      <div className="search" style={{maxWidth:280}}>
        <span className="sico">{I.search}</span>
        <input placeholder="Filter these results…" value={sf} onChange={e=>{setSf(e.target.value);setSearch&&setSearch(e.target.value);}}/>
      </div>
      <div style={{marginLeft:"auto",color:"var(--t3)",fontSize:12,fontFamily:"var(--mono)"}}>{rows.length} of {enq.length}</div>
    </div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Enquiry</th><th>Customer</th><th>Summary</th><th>Status</th><th>Estimator</th><th>Responsible</th><th>Quote due</th><th>Priority</th><th></th></tr></thead>
        <tbody>
          {rows.map(e=><tr key={e.id} onClick={()=>onOpen(e.id)} className={e.flag&&!e.outcome?"row-behind":""}>
            <td><div className="idcell">{e.flag&&!e.outcome&&<span title="Flagged for attention" style={{color:"var(--red)"}}>⚑ </span>}{e.id.replace("ENQ-2026-","#")}<small>SIG {e.sigma}</small></div></td>
            <td><div className="cust">{e.customer}</div><div className="sub-c">{e.contact}</div></td>
            <td style={{maxWidth:240,color:"var(--t2)"}}>{e.summary}</td>
            <td><Pill s={e.status}/></td>
            <td><Owner id={e.assignedEstimator}/></td>
            <td><Owner id={e.responsible}/></td>
            <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(e.quoteDueDate)&&!e.outcome?"var(--red)":"var(--t2)"}}>{fmtDate(e.quoteDueDate)}</td>
            <td><Prio p={e.priority}/></td>
            <td onClick={ev=>ev.stopPropagation()} style={{textAlign:"right"}}>{!e.outcome && <button className={"nudgebtn"+(e.flag?" on":"")} title="Nudge the owner" onClick={()=>nudge(e)}>{I.flag} Nudge</button>}</td>
          </tr>)}
          {rows.length===0 && <tr><td colSpan="9"><div className="empty"><div className="big">⌕</div>No enquiries match this filter.</div></td></tr>}
        </tbody>
      </table>
    </div>
  </>;
}

/* ============================ TASKS ============================ */
function Tasks({enq,user,onOpen,update}){
  const [scope,setScope]=useState("mine");
  const all = enq.flatMap(e=>(e.tasks||[]).map(t=>({...t,eid:e.id,cust:e.customer})));
  let rows = all.filter(t=>t.status!=="Completed"&&t.status!=="Cancelled");
  if(scope==="mine") rows = rows.filter(t=>t.assignee===user.id);
  rows.sort((a,b)=>new Date(a.due)-new Date(b.due));
  const complete = (eid,tid)=> update(eid, e=>({...e,tasks:e.tasks.map(t=>t.id===tid?{...t,status:"Completed",completedBy:user.id,completedAt:new Date().toISOString()}:t)}), "completed a task");

  return <>
    <div className="pagehead"><div><div className="eyebrow">Personal task view · filtered, not restricted</div><h1>Tasks</h1></div></div>
    <div className="ftbar"><div className="seg">
      <button className={scope==="mine"?"active":""} onClick={()=>setScope("mine")}>My tasks</button>
      <button className={scope==="all"?"active":""} onClick={()=>setScope("all")}>All open tasks</button>
    </div><div style={{marginLeft:"auto",color:"var(--t3)",fontSize:12,fontFamily:"var(--mono)"}}>{rows.length} open</div></div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Task</th><th>Enquiry</th><th>Assigned to</th><th>Due</th><th>Priority</th><th>Status</th><th></th></tr></thead>
        <tbody>
          {rows.map(t=><tr key={t.id} onClick={()=>onOpen(t.eid)}>
            <td><b style={{fontFamily:"var(--ui)"}}>{t.title}</b>{t.notes&&<div className="sub-c">{t.notes}</div>}</td>
            <td><div className="idcell">{t.eid.replace("ENQ-2026-","#")}<small>{t.cust}</small></div></td>
            <td><Owner id={t.assignee}/></td>
            <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(t.due)?"var(--red)":isToday(t.due)?"var(--amber)":"var(--t2)"}}>{isToday(t.due)?"Today":fmtDate(t.due)}</td>
            <td><Prio p={t.priority}/></td>
            <td><span className={"pill pill--"+(t.status==="Open"?"grey":t.status.startsWith("Waiting")?"amber":"blue")}>{t.status}</span></td>
            <td onClick={e=>e.stopPropagation()}><button className="btn btn--green btn--sm" onClick={()=>complete(t.eid,t.id)}>Complete</button></td>
          </tr>)}
          {rows.length===0 && <tr><td colSpan="7"><div className="empty"><div className="big">✓</div>No open tasks here. Empty queue, good work.</div></td></tr>}
        </tbody>
      </table>
    </div>
  </>;
}

/* ============================ CHASING ============================ */
function Chasing({enq,user,onOpen,nudge}){
  const sent = enq.filter(e=>e.status==="Quote Sent");
  const ageOf = e => daysBetween(e.quoteSentDate, new Date().toISOString());
  const band = e => { const a=ageOf(e); if(a<3) return "Awaiting first chase"; if(a<7) return "First chase"; if(a<14) return "Second chase"; if(a<30) return "Final chase"; return "Review / dormant"; };
  const sorted = [...sent].sort((a,b)=>ageOf(b)-ageOf(a));
  const cards = [
    ["First chase due", sent.filter(e=>ageOf(e)>=3&&ageOf(e)<7).length],
    ["Second chase due", sent.filter(e=>ageOf(e)>=7&&ageOf(e)<14).length],
    ["Final chase due", sent.filter(e=>ageOf(e)>=14&&ageOf(e)<30).length],
    ["No chase logged", sent.filter(e=>!e.chases||e.chases.length===0).length],
  ];
  return <>
    <div className="pagehead"><div><div className="eyebrow">Office chasing dashboard · shared</div><h1>Quote chasing</h1></div>
      <div className="spacer"></div>
      <div style={{textAlign:"right"}}><div style={{fontFamily:"var(--mono)",fontSize:24,fontWeight:600}}>{sent.length}</div><div style={{color:"var(--t3)",fontSize:12}}>quotes out awaiting a response</div></div>
    </div>
    <div className="statgrid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
      {cards.map(([k,v])=><div className="stat" key={k}><div className="k">{k}</div><div className="v" style={{color:k==="No chase logged"&&v?"var(--red)":undefined}}>{v}</div></div>)}
    </div>
    <div className="table-wrap">
      <table>
        <thead><tr><th>Quote</th><th>Customer</th><th>Chase stage</th><th>Chaser</th><th>Last result</th><th>Next chase</th><th>Age</th><th></th></tr></thead>
        <tbody>{sorted.map(e=>{ const last=e.chases&&e.chases[e.chases.length-1];
          return <tr key={e.id} onClick={()=>onOpen(e.id)} className={isOverdue(e.nextChaseDate)?"row-behind":""}>
            <td><div className="idcell">{e.flag&&<span title="Flagged for attention" style={{color:"var(--red)"}}>⚑ </span>}{e.id.replace("ENQ-2026-","#")}<small>SIG {e.sigma}</small></div></td>
            <td><div className="cust">{e.customer}</div><div className="sub-c">{e.contact}</div></td>
            <td><span className={"pill pill--"+(band(e).includes("Final")||band(e).includes("Review")?"red":band(e).includes("Second")?"amber":"blue")}>{band(e)}</span></td>
            <td><Owner id={e.assignedChaseUser}/></td>
            <td style={{color:"var(--t2)"}}>{last?last.result:"—"}</td>
            <td style={{fontFamily:"var(--mono)",fontSize:12,color:isOverdue(last&&last.next)?"var(--red)":"var(--t2)"}}>{last&&last.next?fmtDate(last.next):"—"}</td>
            <td className="mono">{ageOf(e)}d</td>
            <td onClick={ev=>ev.stopPropagation()} style={{textAlign:"right"}}><button className={"nudgebtn"+(e.flag?" on":"")} title="Nudge the chaser" onClick={()=>nudge(e)}>{I.flag} Nudge</button></td>
          </tr>;})}
          {sorted.length===0 && <tr><td colSpan="8"><div className="empty">No quotes are currently out for chasing.</div></td></tr>}
        </tbody>
      </table>
    </div>
  </>;
}

/* ============================ REPORTS ============================ */
/* ---- SVG charts (no libraries) ---- */
function TrendChart({labels,values,color}){
  const W=560,H=190,P={t:16,r:14,b:30,l:30};
  const max=Math.max(...values,1);
  const iw=W-P.l-P.r, ih=H-P.t-P.b;
  const x=i=>P.l+(values.length===1?iw/2:i*(iw/(values.length-1)));
  const y=v=>P.t+ih-(v/max)*ih;
  const pts=values.map((v,i)=>[x(i),y(v)]);
  const path=pts.map((p,i)=>{
    if(i===0) return "M"+p[0]+","+p[1];
    const prev=pts[i-1], cx=(prev[0]+p[0])/2;
    return "C"+cx+","+prev[1]+" "+cx+","+p[1]+" "+p[0]+","+p[1];
  }).join(" ");
  const area=path+" L"+pts[pts.length-1][0]+","+(P.t+ih)+" L"+pts[0][0]+","+(P.t+ih)+" Z";
  const gid="tg"+Math.round(Math.random()*1e6);
  const gridY=[0,.25,.5,.75,1].map(f=>P.t+ih-f*ih);
  return <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={color} stopOpacity=".28"/><stop offset="100%" stopColor={color} stopOpacity=".02"/>
    </linearGradient></defs>
    {gridY.map((gy,i)=><line key={i} x1={P.l} x2={W-P.r} y1={gy} y2={gy} stroke="var(--hair-2)" strokeWidth="1"/>)}
    <path d={area} fill={"url(#"+gid+")"}/>
    <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>
    {pts.map((p,i)=><g key={i}>
      <circle cx={p[0]} cy={p[1]} r="4" fill="#fff" stroke={color} strokeWidth="2.5"/>
      <text x={p[0]} y={p[1]-9} textAnchor="middle" fontSize="11" fontFamily="var(--mono)" fontWeight="600" fill="var(--t1)">{values[i]}</text>
      <text x={p[0]} y={H-9} textAnchor="middle" fontSize="10.5" fontFamily="var(--ui)" fill="var(--t3)">{labels[i]}</text>
    </g>)}
    <text x={P.l-8} y={P.t+4} textAnchor="end" fontSize="10" fontFamily="var(--mono)" fill="var(--t3)">{max}</text>
    <text x={P.l-8} y={P.t+ih+4} textAnchor="end" fontSize="10" fontFamily="var(--mono)" fill="var(--t3)">0</text>
  </svg>;
}
function Donut({slices,centreTop,centreSub}){
  const R=64, r=41, C=2*Math.PI*R;
  const total=slices.reduce((s,x)=>s+x.value,0)||1;
  let acc=0;
  return <div style={{display:"flex",alignItems:"center",gap:22,flexWrap:"wrap"}}>
    <svg viewBox="0 0 160 160" style={{width:150,height:150,flex:"none"}}>
      <circle cx="80" cy="80" r={R} fill="none" stroke="var(--hair-2)" strokeWidth={R-r}/>
      {slices.filter(s=>s.value>0).map((s,i)=>{
        const frac=s.value/total, dash=frac*C, off=C*(1-acc)+C*0.25; acc+=frac;
        return <circle key={i} cx="80" cy="80" r={R} fill="none" stroke={s.color} strokeWidth={R-r}
          strokeDasharray={dash+" "+(C-dash)} strokeDashoffset={off} strokeLinecap="butt"/>;
      })}
      <text x="80" y="76" textAnchor="middle" fontSize="26" fontWeight="700" fontFamily="var(--mono)" fill="var(--t1)">{centreTop}</text>
      <text x="80" y="96" textAnchor="middle" fontSize="10.5" fontFamily="var(--ui)" fill="var(--t3)">{centreSub}</text>
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {slices.map(s=><div key={s.label} style={{display:"flex",alignItems:"center",gap:9,fontSize:13}}>
        <span style={{width:11,height:11,borderRadius:3,background:s.color,flex:"none"}}></span>
        <span style={{color:"var(--t2)"}}>{s.label}</span>
        <b style={{fontFamily:"var(--mono)",marginLeft:"auto",paddingLeft:14}}>{s.value}</b>
        <span style={{color:"var(--t3)",fontFamily:"var(--mono)",fontSize:11,width:38,textAlign:"right"}}>{total?Math.round(s.value/total*100):0}%</span>
      </div>)}
    </div>
  </div>;
}
function Reports({enq}){
  const today=new Date();
  const isoDay=d=>d.toISOString().slice(0,10);
  const [from,setFrom]=useState(""); const [to,setTo]=useState("");
  const [est,setEst]=useState("All"); const [cust,setCust]=useState("All");
  const [status,setStatus]=useState("All"); const [source,setSource]=useState("All");
  const [outcome,setOutcome]=useState("All"); const [preset,setPreset]=useState("all");

  const customers=[...new Set(enq.map(e=>e.customer))].sort();
  const estIds=[...new Set(enq.map(e=>e.assignedEstimator))];
  const estList=USERS.filter(u=>estIds.includes(u.id));

  const setRange=(p)=>{ setPreset(p);
    if(p==="all"){setFrom("");setTo("");}
    else if(p==="month"){const d=new Date(today.getFullYear(),today.getMonth(),1);setFrom(isoDay(d));setTo(isoDay(today));}
    else if(p==="3m"){const d=new Date(today.getFullYear(),today.getMonth()-2,1);setFrom(isoDay(d));setTo(isoDay(today));}
    else if(p==="year"){setFrom(today.getFullYear()+"-01-01");setTo(isoDay(today));}
  };
  const inRange=e=>{ const d=new Date(e.receivedAt);
    if(from && d<new Date(from)) return false;
    if(to){ const t=new Date(to); t.setHours(23,59,59); if(d>t) return false; }
    return true; };
  const F=enq.filter(e=>inRange(e)
    && (est==="All"||e.assignedEstimator===est)
    && (cust==="All"||e.customer===cust)
    && (status==="All"||e.status===status)
    && (source==="All"||e.source===source)
    && (outcome==="All"||(outcome==="Open"? !e.outcome : e.outcome===outcome)));
  const reset=()=>{setFrom("");setTo("");setEst("All");setCust("All");setStatus("All");setSource("All");setOutcome("All");setPreset("all");};
  const active = from||to||est!=="All"||cust!=="All"||status!=="All"||source!=="All"||outcome!=="All";

  const won=F.filter(e=>e.outcome==="Won"), lost=F.filter(e=>e.outcome==="Lost"), noq=F.filter(e=>e.outcome==="No Quote");
  const decided=won.length+lost.length;
  const winRate=decided?Math.round(won.length/decided*100):0;
  const sent=F.filter(e=>e.quoteSentDate);
  const respDays=sent.map(e=>daysBetween(e.receivedAt,e.quoteSentDate)).filter(n=>n>=0);
  const avgResp=respDays.length?Math.round(respDays.reduce((a,b)=>a+b,0)/respDays.length):null;
  const overdueNow=F.filter(e=>e.status!=="Quote Sent"&&!e.outcome&&isOverdue(e.quoteDueDate)).length;

  const monthKey=iso=>{const d=new Date(iso);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};
  const monthLabel=k=>{const p=k.split("-");return new Date(p[0],p[1]-1,1).toLocaleDateString("en-GB",{month:"short",year:"2-digit"});};
  const byMonth={}; F.forEach(e=>{const k=monthKey(e.receivedAt);byMonth[k]=(byMonth[k]||0)+1;});
  const months=Object.keys(byMonth).sort();
  const byStatus={}; F.forEach(e=>byStatus[e.status]=(byStatus[e.status]||0)+1);
  const bySource={}; F.forEach(e=>bySource[e.source]=(bySource[e.source]||0)+1);
  const reasons={}; [...lost,...noq].forEach(e=>{if(e.lostReason)reasons[e.lostReason]=(reasons[e.lostReason]||0)+1;});
  const reasonRows=Object.entries(reasons).sort((a,b)=>b[1]-a[1]);
  const bands=[["Same day",0],["1–2 days",0],["3–5 days",0],["6+ days",0]];
  respDays.forEach(d=>{ if(d<=0)bands[0][1]++; else if(d<=2)bands[1][1]++; else if(d<=5)bands[2][1]++; else bands[3][1]++; });
  const funnel=[["Enquiries received",F.length,"var(--ink)"],["Reviewed / progressed",F.filter(e=>!["New Enquiry","Needs Review"].includes(e.status)).length],["Quotes sent",sent.length],["Won",won.length,"var(--green)"]];
  const estRows=estList.map(u=>{const es=F.filter(e=>e.assignedEstimator===u.id);const w=es.filter(e=>e.outcome==="Won").length;const l=es.filter(e=>e.outcome==="Lost").length;return {u,total:es.length,open:es.filter(e=>!e.outcome).length,sent:es.filter(e=>e.quoteSentDate).length,won:w,winRate:(w+l)?Math.round(w/(w+l)*100):0};}).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
  const custRows=customers.map(c=>{const es=F.filter(e=>e.customer===c);if(!es.length)return null;const w=es.filter(e=>e.outcome==="Won").length;const l=es.filter(e=>e.outcome==="Lost").length;return {c,total:es.length,sent:es.filter(e=>e.quoteSentDate).length,won:w,winRate:(w+l)?Math.round(w/(w+l)*100):0};}).filter(Boolean).sort((a,b)=>b.total-a.total);
  const chaseStats=[["Quotes out", sent.filter(e=>e.status==="Quote Sent").length],["Chase tasks overdue", F.filter(e=>e.status==="Quote Sent"&&isOverdue(e.nextChaseDate)).length],["No chase logged", F.filter(e=>e.status==="Quote Sent"&&(!e.chases||e.chases.length===0)).length],["Chases logged", F.reduce((s,e)=>s+(e.chases||[]).length,0)]];

  const maxStatus=Math.max(...Object.values(byStatus),1);
  const maxSource=Math.max(...Object.values(bySource),1);
  const maxMonth=Math.max(...Object.values(byMonth),1);
  const maxFunnel=funnel[0][1]||1;
  const maxReason=Math.max(...reasonRows.map(r=>r[1]),1);
  const maxBand=Math.max(...bands.map(b=>b[1]),1);

  const exportCSV=()=>{
    const head=["Enquiry ID","SigmaMRP","Customer","Contact","Source","Status","Estimator","Responsible","Received","Quote due","Quote sent","Days to quote","Outcome","Reason"];
    const rows=F.map(e=>[e.id,e.sigma,e.customer,e.contact,e.source,e.status,uName(e.assignedEstimator),uName(e.responsible),fmtDate(e.receivedAt),fmtDate(e.quoteDueDate),e.quoteSentDate?fmtDate(e.quoteSentDate):"",e.quoteSentDate?daysBetween(e.receivedAt,e.quoteSentDate):"",e.outcome||"",e.lostReason||""]);
    const csv=[head,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a"); a.href=url; a.download="prestige-enquiries.csv"; a.click(); pushToast("Exported "+F.length+" enquiries to CSV");
  };
  const Bar=({label,val,max,color})=><div className="barrow"><div className="lbl">{label}</div><div className="bartrack"><div className="barfill" style={{width:Math.max(val/max*100,val?5:0)+"%",background:color||"var(--steel)"}}>{val||""}</div></div><div className="barval">{val}</div></div>;
  const presets=[["all","All time"],["month","This month"],["3m","Last 3 months"],["year","This year"]];

  return <>
    <div className="pagehead"><div><div className="eyebrow">Management reporting</div><h1>Reports &amp; graphs</h1></div><div className="spacer"></div><button className="btn btn--g noprint" onClick={()=>window.print()}>{I.doc} Save as PDF</button><button className="btn btn--g noprint" onClick={exportCSV}>{I.doc} Export to CSV</button></div>

    <div className="panel noprint" style={{padding:"14px 16px",marginBottom:18}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {presets.map(([k,l])=><button key={k} className={"seg-btn"+(preset===k?" on":"")} onClick={()=>setRange(k)}>{l}</button>)}
      </div>
      <div className="rfilters">
        <label className="rf"><span>From</span><input type="date" value={from} onChange={e=>{setFrom(e.target.value);setPreset("");}}/></label>
        <label className="rf"><span>To</span><input type="date" value={to} onChange={e=>{setTo(e.target.value);setPreset("");}}/></label>
        <label className="rf"><span>Estimator</span><select value={est} onChange={e=>setEst(e.target.value)}><option value="All">All</option>{estList.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></label>
        <label className="rf"><span>Customer</span><select value={cust} onChange={e=>setCust(e.target.value)}><option value="All">All</option>{customers.map(c=><option key={c}>{c}</option>)}</select></label>
        <label className="rf"><span>Status</span><select value={status} onChange={e=>setStatus(e.target.value)}><option value="All">All</option>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></label>
        <label className="rf"><span>Source</span><select value={source} onChange={e=>setSource(e.target.value)}><option value="All">All</option>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></label>
        <label className="rf"><span>Outcome</span><select value={outcome} onChange={e=>setOutcome(e.target.value)}><option value="All">All</option><option value="Open">Open (no outcome)</option><option>Won</option><option>Lost</option><option>No Quote</option><option>Cancelled</option><option>Dormant</option></select></label>
        {active && <button className="btn btn--g sm" style={{alignSelf:"flex-end"}} onClick={reset}>Clear filters</button>}
      </div>
      <div style={{marginTop:10,color:"var(--t3)",fontSize:12,fontFamily:"var(--mono)"}}>Showing {F.length} of {enq.length} enquiries{active?" (filtered)":""}</div>
    </div>

    <div className="statgrid" style={{gridTemplateColumns:"repeat(5,1fr)"}}>
      <div className="stat"><div className="k">Enquiries</div><div className="v">{F.length}</div></div>
      <div className="stat"><div className="k">Quotes sent</div><div className="v">{sent.length}</div></div>
      <div className="stat good"><div className="k">Win rate</div><div className="v">{winRate}%</div><div className="sub">{won.length} / {decided} decided</div></div>
      <div className="stat"><div className="k">Avg days to quote</div><div className="v">{avgResp==null?"—":avgResp}</div></div>
      <div className={"stat "+(overdueNow?"alert":"")}><div className="k">Overdue now</div><div className="v">{overdueNow}</div><div className="sub">past quote-due</div></div>
    </div>

    <div className="cols" style={{gridTemplateColumns:"1fr 1fr"}}>
      <div className="panel"><div className="panel__h"><h3>Enquiries received by month</h3></div><div style={{padding:18}}>
        {months.length? <TrendChart labels={months.map(monthLabel)} values={months.map(m=>byMonth[m])} color="var(--orange)"/> : <div className="empty">No enquiries in range.</div>}
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Conversion funnel</h3></div><div style={{padding:18}}>
        <div className="funnel">{funnel.map(([l,v,c])=><div className="fr" key={l}><div className="flab">{l}</div><div className="ftrack"><div className="ffill" style={{width:Math.max(v/maxFunnel*100,8)+"%",background:c||undefined}}>{v}</div></div></div>)}</div>
        <div style={{marginTop:10,color:"var(--t3)",fontSize:12}}>Conversion received → won: <b style={{color:"var(--t1)"}}>{F.length?Math.round(won.length/F.length*100):0}%</b></div>
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Win / loss</h3></div><div style={{padding:18}}>
        {decided+noq.length>0
          ? <Donut centreTop={winRate+"%"} centreSub="win rate" slices={[
              {label:"Won",value:won.length,color:"var(--green)"},
              {label:"Lost",value:lost.length,color:"var(--red)"},
              {label:"No quote",value:noq.length,color:"var(--amber)"},
            ]}/>
          : <div className="empty">No decided enquiries in range.</div>}
        <div style={{marginTop:12,color:"var(--t3)",fontSize:12}}>Win rate is won ÷ (won + lost); no-quotes are excluded.</div>
      </div></div>

      <div className="panel"><div className="panel__h"><h3>Quote response time</h3></div><div style={{padding:18}}>
        {sent.length? bands.map(([l,v])=><Bar key={l} label={l} val={v} max={maxBand} color={l==="6+ days"?"var(--red)":l==="3–5 days"?"var(--amber)":"var(--green)"}/>) : <div className="empty">No quotes sent in range.</div>}

            <td><span className={"pill pill--"+(r.winRate>=50?"green":r.winRate>=30?"amber":"grey")}>{r.winRate}%</span></td></tr>)}

/* ============================ USERS (ADMIN) ============================ */
function Users({user, reload}){
  const [list,setList]=useState([]);
  const [roles,setRoles]=useState(["Admin","Estimator","Sales/Admin","Management"]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [add,setAdd]=useState({name:"",username:"",role:"Estimator",password:""});
  const [edit,setEdit]=useState(null);
  const refresh = async ()=>{ const d=await api.listUsers(); setList(d.users||[]); if(d.roles&&d.roles.length) setRoles(d.roles); setLoading(false); if(reload) reload(); };
  useEffect(()=>{ refresh(); },[]);

  const create = async ()=>{
    if(!add.name||!add.username||!add.password) return;
    const r=await api.createUser(add);
    if(!r.ok){ pushToast(r.error||"Could not add user"); return; }
    pushToast(add.name+" added"); setAdd({name:"",username:"",role:"Estimator",password:""}); setShowAdd(false); refresh();
  };
  const saveEdit = async ()=>{
    const body={name:edit.name,role:edit.role,username:edit.username,active:edit.active};
    if(edit.password) body.password=edit.password;
    const r=await api.updateUser(edit.id,body);
    if(!r.ok){ pushToast(r.error||"Could not save"); return; }
    pushToast("Saved"); setEdit(null); refresh();
  };
  const toggleActive = async (u)=>{
    const r=await api.updateUser(u.id,{active:!u.active});
    if(!r.ok){ pushToast(r.error||"Could not change"); return; }
    refresh();
  };

  return <>
    <div className="pagehead"><div><div className="eyebrow">Admin</div><h1>Users &amp; accounts</h1></div><div className="spacer"></div><button className="btn btn--p" onClick={()=>setShowAdd(s=>!s)}>{I.plus} Add person</button></div>

    {showAdd && <div className="panel" style={{padding:16,marginBottom:18}}>
      <SecBar>New account</SecBar>
      <div className="fieldgrid">
        <Field label="Full name" req><input value={add.name} onChange={e=>setAdd(a=>({...a,name:e.target.value}))} placeholder="e.g. Tom Webb"/></Field>
        <Field label="Username" req><input value={add.username} onChange={e=>setAdd(a=>({...a,username:e.target.value.toLowerCase()}))} placeholder="e.g. tom"/></Field>
        <Field label="Role" req><select value={add.role} onChange={e=>setAdd(a=>({...a,role:e.target.value}))}>{roles.map(r=><option key={r}>{r}</option>)}</select></Field>
        <Field label="Temporary password" req><input value={add.password} onChange={e=>setAdd(a=>({...a,password:e.target.value}))} placeholder="give it to them to sign in"/></Field>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}}><button className="btn btn--g" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn btn--p" disabled={!add.name||!add.username||!add.password} onClick={create}>Add person</button></div>
    </div>}

    <div className="table-wrap"><table style={{minWidth:680}}>
      <thead><tr><th>Name</th><th>Role</th><th>Username</th><th>Status</th><th></th></tr></thead>
      <tbody>{list.map(u=><tr key={u.id} style={{cursor:"default"}}>
        <td><span className="owner"><span className="av-sm" style={{background:u.c}}>{initials(u.name)}</span>{u.name}{u.id===user.id&&<small style={{color:"var(--t3)"}}> (you)</small>}</span></td>
        <td><span className="pill pill--grey">{u.role}</span></td>
        <td className="mono">{u.username}</td>
        <td>{u.active? <span className="sp sp--ok">Active</span> : <span className="sp sp--off">Inactive</span>}</td>
        <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
          <button className="btn btn--g sm" onClick={()=>setEdit({id:u.id,name:u.name,username:u.username,role:u.role,active:u.active,password:""})}>Edit</button>
          {u.id!==user.id && <button className="btn btn--g sm" style={{marginLeft:6}} onClick={()=>toggleActive(u)}>{u.active?"Deactivate":"Activate"}</button>}
        </td>
      </tr>)}
      {loading && <tr><td colSpan="5"><div className="empty">Loading…</div></td></tr>}
      {!loading && list.length===0 && <tr><td colSpan="5"><div className="empty">No users yet.</div></td></tr>}
      </tbody></table></div>

    {edit && <div className="scrim center-scrim" onClick={()=>setEdit(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="dh"><div className="dh__top"><div><div className="dh__id">Edit account</div><h2>{edit.name||"User"}</h2></div><button className="x" onClick={()=>setEdit(null)}>✕</button></div></div>
        <div className="dbody">
          <div className="fieldgrid">
            <Field label="Full name"><input value={edit.name} onChange={e=>setEdit(x=>({...x,name:e.target.value}))}/></Field>
            <Field label="Username"><input value={edit.username} onChange={e=>setEdit(x=>({...x,username:e.target.value.toLowerCase()}))}/></Field>
            <Field label="Role"><select value={edit.role} onChange={e=>setEdit(x=>({...x,role:e.target.value}))}>{roles.map(r=><option key={r}>{r}</option>)}</select></Field>
            <Field label="Reset password"><input value={edit.password} onChange={e=>setEdit(x=>({...x,password:e.target.value}))} placeholder="leave blank to keep current"/></Field>
          </div>
          <label className="ovr" style={{marginTop:12}}><input type="checkbox" checked={edit.active} onChange={e=>setEdit(x=>({...x,active:e.target.checked}))}/> Account active (can sign in)</label>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}><button className="btn btn--g" onClick={()=>setEdit(null)}>Cancel</button><button className="btn btn--p" onClick={saveEdit}>Save changes</button></div>
        </div>
      </div>
    </div>}

    <div className="hint" style={{marginTop:16}}>{I.shield}<div>Everyone can see and progress every enquiry — roles add powers: <b>Admin</b> manages users and can override duplicate SigmaMRP numbers. Deactivating someone keeps their history and audit trail but blocks sign-in.</div></div>
  </>;
}

/* ============================ NEW ENQUIRY ============================ */
function NewEnquiry({enq,user,onClose,onCreate}){
  const [f,setF]=useState({sigma:"",customer:"",contact:"",email:"",phone:"",source:"Customer email",rfqRef:"",summary:"",quoteDueDate:"",assignedEstimator:user.id,priority:"Medium",status:"New Enquiry"});
  const [busy,setBusy]=useState(false);
  const [override,setOverride]=useState(false);
  const [overrideReason,setOverrideReason]=useState("");
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  /* Saved customers: directory built from every enquiry already logged, keyed by
     customer name, keeping the most recent contact/email/phone for each. Typing in
     the Customer box offers these as a dropdown; picking one fills the details. */
  const known = useMemo(()=>{
    const m={};
    [...enq].sort((a,b)=>new Date(a.receivedAt||0)-new Date(b.receivedAt||0)).forEach(e=>{
      if(!e.customer) return;
      m[e.customer.trim()]={contact:e.contact||"",email:e.email||"",phone:e.phone||"",count:(m[e.customer.trim()]?.count||0)+1};
    });
    return m;
  },[enq]);
  const knownNames = Object.keys(known).sort((a,b)=>a.localeCompare(b));
  const pickCustomer=(v)=>{
    const hit = known[v.trim()] || known[knownNames.find(n=>n.toLowerCase()===v.trim().toLowerCase())||""];
    setF(p=>{
      const filledFromSaved = kf => p["_auto_"+kf]!==undefined && p[kf]===p["_auto_"+kf];
      const next={...p,customer:v};
      if(hit){
        ["contact","email","phone"].forEach(kf=>{
          if(!p[kf] || filledFromSaved(kf)){ next[kf]=hit[kf]; next["_auto_"+kf]=hit[kf]; }
        });
      }
      return next;
    });
  };
  const isAdmin = user.role==="Admin";
  const dup = f.sigma && enq.find(e=>String(e.sigma)===f.sigma.trim() && !["Lost","No Quote","Dormant"].includes(e.status));
  const sigmaBad = f.sigma && !/^\d{3,8}$/.test(f.sigma.trim());
  const dupOk = !dup || (isAdmin && override && overrideReason.trim());
  const can = f.sigma && f.customer && f.contact && f.summary && f.quoteDueDate && !sigmaBad && dupOk && !busy;
  const submit=async()=>{
    setBusy(true);
    const data=mkEnquiry({sigma:f.sigma.trim(),customer:f.customer.trim(),contact:f.contact.trim(),email:f.email.trim(),phone:f.phone.trim(),
      source:f.source,rfqRef:f.rfqRef.trim(),summary:f.summary.trim(),receivedAt:new Date().toISOString(),receivedBy:user.id,createdBy:user.id,
      assignedEstimator:f.assignedEstimator,responsible:f.assignedEstimator,status:f.status,priority:f.priority,
      quoteDueDate:f.quoteDueDate?new Date(f.quoteDueDate).toISOString():null});
    delete data.id;
    data.audit=[aud(user.id,"created the enquiry"), aud(user.id,"entered SigmaMRP number "+f.sigma.trim())];
    if(dup && override) data.audit.push(aud(user.id,"admin override of duplicate SigmaMRP — "+overrideReason.trim()));
    const r=await api.create(data, !!(dup&&override));
    if(r && r.duplicate){ pushToast("SigmaMRP "+f.sigma.trim()+" already active on "+(r.on||[]).join(", ")); setBusy(false); return; }
    onCreate(r.enquiry);
  };
  return <div className="scrim center-scrim" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="dh"><div className="dh__top"><div><div className="dh__id">{newIdPreview(enq)}</div><h2>Log new enquiry</h2></div><button className="x" onClick={onClose}>✕</button></div>
        <div className="meta"><span>Prestige Enquiry ID is generated automatically on save. The SigmaMRP number is entered here, by hand, at the very start.</span></div>
      </div>
      <div className="dbody">
        <div className="fieldgrid">
          <Field label="SigmaMRP job/quote number" req>
            <input placeholder="e.g. 54231" value={f.sigma} onChange={e=>set("sigma",e.target.value)} className="mono"/>
            {sigmaBad && <div className="warnbox">{I.flag} Use the numeric SigmaMRP number (3–8 digits).</div>}
            {dup && <div className="warnbox">{I.flag} <span><b>Possible duplicate.</b> SigmaMRP {f.sigma.trim()} is already active on {dup.id} ({dup.customer}). {isAdmin? "As an admin you can override with a reason below." : "Pick a different number, or ask an admin to override."}</span></div>}
            {dup && isAdmin && <div style={{marginTop:8}}>
              <label className="ovr"><input type="checkbox" checked={override} onChange={e=>setOverride(e.target.checked)}/> Override duplicate (admin)</label>
              {override && <input style={{marginTop:6}} placeholder="Reason for override (recorded in audit trail)" value={overrideReason} onChange={e=>setOverrideReason(e.target.value)}/>}
            </div>}
          </Field>
          <Field label="Priority"><select value={f.priority} onChange={e=>set("priority",e.target.value)}><option>High</option><option>Medium</option><option>Low</option></select></Field>
          <Field label="Customer name" req>
            <input list="pf-customers" value={f.customer} onChange={e=>pickCustomer(e.target.value)} placeholder={knownNames.length?"Start typing — saved customers appear":"Company"} autoComplete="off"/>
            <datalist id="pf-customers">{knownNames.map(n=><option key={n} value={n}>{known[n].contact?known[n].contact+(known[n].email?" · "+known[n].email:""):undefined}</option>)}</datalist>
            {known[f.customer.trim()] && <div className="autofill-note">✓ Saved customer — contact details filled in for you (you can still edit them)</div>}
          </Field>
          <Field label="Contact" req><input value={f.contact} onChange={e=>set("contact",e.target.value)} placeholder="Name"/></Field>
          <Field label="Email"><input value={f.email} onChange={e=>set("email",e.target.value)} placeholder="name@customer.com"/></Field>
          <Field label="Phone"><input value={f.phone} onChange={e=>set("phone",e.target.value)}/></Field>
          <Field label="Source" req><select value={f.source} onChange={e=>set("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></Field>
          <Field label="Customer RFQ reference"><input value={f.rfqRef} onChange={e=>set("rfqRef",e.target.value)} placeholder="optional"/></Field>
          <div className="full"><Field label="Enquiry summary" req><textarea rows="2" value={f.summary} onChange={e=>set("summary",e.target.value)} placeholder="What is being enquired — parts, process, quantity"/></Field></div>
          <Field label="Quote due date" req><input type="date" value={f.quoteDueDate} onChange={e=>set("quoteDueDate",e.target.value)}/></Field>
          <Field label="Assigned estimator" req><select value={f.assignedEstimator} onChange={e=>set("assignedEstimator",e.target.value)}>{actUsers().map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
        </div>
        <div className="hint" style={{marginTop:18}}>{I.users}<div>Assigning an estimator sets <b>responsibility and notifications</b> — it does not lock the enquiry. Any colleague can still open and progress it.</div></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:6}}>
          <button className="btn btn--g" onClick={onClose}>Cancel</button>
          <button className="btn btn--p" disabled={!can} style={{opacity:can?1:.45}} onClick={can?submit:undefined}>{busy?"Saving…":"Create enquiry"}</button>
        </div>
      </div>
    </div>
  </div>;
}
function newIdPreview(enq){
  const seqOf=id=>parseInt(String(id||"").split("-").pop(),10)||0;
  const n=((enq||[]).reduce((m,e)=>Math.max(m,seqOf(e.id)),131))+1;
  return "ENQ-2026-"+String(n).padStart(6,"0");
}

/* ============================ DRAWER (ENQUIRY DETAIL) ============================ */
function Drawer({e,user,onClose,update,notifyUser,nudge,clearFlag}){
  const TABS=[["summary","Summary"],["lines","Line items",e.lines.length],["docs","Documents",e.documents.length],["tasks","Tasks",e.tasks.length],["notes","Notes",e.notes.length],["chase","Chasing"],["outcome","Outcome"],["handover","Handover"],["audit","Audit",e.audit.length]];

  const isOwner = e.responsible===user.id;

  const pickUp = ()=> update(e.id, x=>{ x.responsible=user.id; x.notes=[...x.notes,{id:++NID,when:new Date().toISOString(),by:user.id,type:"Internal",txt:user.name+" picked up this enquiry."}]; return x; }, "picked up the enquiry (now responsible)");

  return <div className="scrim" onClick={onClose}>
    <div className="drawer" onClick={ev=>ev.stopPropagation()}>
      <div className="dh">
        <div className="dh__top">
          <div>
            <div className="dh__id">{e.id} &nbsp;·&nbsp; SigmaMRP {e.sigma}</div>
            <h2>{e.customer}</h2>
          </div>
          <Pill s={e.status}/>
          {!e.outcome && <button className={"nudgebtn"+(e.flag?" on":"")} title={"Nudge "+uName(e.status==="Quote Sent"?(e.assignedChaseUser||e.responsible):e.responsible)+" to "+(e.status==="Quote Sent"?"chase this":"progress this")} onClick={()=>nudge(e)}>{I.flag} Nudge</button>}
          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="meta">
          <span>Estimator <b>{uName(e.assignedEstimator)}</b></span>
          <span>Responsible <b>{uName(e.responsible)}</b></span>
          <span>Received <b>{fmtDate(e.receivedAt)}</b> by {uName(e.receivedBy)}</span>
          <span>Quote due <b style={{color:isOverdue(e.quoteDueDate)&&!e.outcome?"var(--red)":undefined}}>{fmtDate(e.quoteDueDate)}</b></span>
          {e.rfqRef && <span>RFQ <b>{e.rfqRef}</b></span>}

      <div className="dbody">
        {e.flag && <div className="flagbar">
          <span style={{color:"var(--red)",flex:"none"}}>{I.flag}</span>
          <div className="t"><b>Flagged for attention by {uName(e.flag.by)}.</b><small>{e.flag.note?"“"+e.flag.note+"” · ":""}{fmtDT(e.flag.when)} — {uName(e.status==="Quote Sent"?(e.assignedChaseUser||e.responsible):e.responsible)} has a high-priority task to {e.status==="Quote Sent"?"chase":"progress"} this.</small></div>
          <button className="btn btn--g" onClick={()=>{clearFlag(e);pushToast("Flag cleared");}}>Mark handled</button>
        </div>}
        {!isOwner && !e.outcome && <div className="pickup">
          <span style={{color:"var(--orange)"}}>{I.hand}</span>
          <div className="t"><b>{uName(e.responsible)} is responsible for this enquiry.</b><small>You can still open, edit and progress it. Take over the next action if you're picking it up.</small></div>
          <button className="btn btn--p" onClick={()=>{pickUp();pushToast("You picked up this enquiry");}}>I'm picking this up</button>
        </div>}
        {tab==="summary" && <TabSummary e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="lines" && <TabLines e={e} user={user} update={update}/>}
        {tab==="docs" && <TabDocs e={e} user={user} update={update}/>}
        {tab==="tasks" && <TabTasks e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="notes" && <TabNotes e={e} user={user} update={update}/>}
        {tab==="chase" && <TabChase e={e} user={user} update={update} notifyUser={notifyUser}/>}
        {tab==="outcome" && <TabOutcome e={e} user={user} update={update}/>}
        {tab==="handover" && <TabHandover e={e} user={user} update={update}/>}
        {tab==="audit" && <TabAudit e={e}/>}

function TabLines({e,user,update}){
  const blank={part:"",draw:"",rev:"",qty:1,material:"",finish:"",route:"",status:"To review"};
  const [editing,setEditing]=useState(null);   // null | "new" | <line id>
  const [f,setF]=useState(blank);
  const [del,setDel]=useState(null);            // id pending delete confirm
  const set=(k,v)=>setF(p=>({...p,[k]:k==="qty"?Number(v):v}));
  const startAdd=()=>{ setF(blank); setEditing("new"); setDel(null); };
  const startEdit=(l)=>{ setF({...blank,...l}); setEditing(l.id); setDel(null); };

      pushToast("Task assigned to "+uName(f.assignee));
    } else {
      const prev=e.tasks.find(t=>t.id===editing);

      </div>
      <div style={{display:"flex",gap:16,color:"var(--t3)",fontSize:12,alignItems:"center"}}>
        <span>For <b style={{color:"var(--t1)"}}>{uName(t.assignee)}</b></span>
        <span>Due <b style={{color:isOverdue(t.due)?"var(--red)":"var(--t1)",fontFamily:"var(--mono)"}}>{fmtDate(t.due)}</b></span>

        <Field label="Due date" req><input type="date" value={f.due} onChange={ev=>set("due",ev.target.value)}/></Field>

        <Field label="Notes"><input value={f.notes} onChange={ev=>set("notes",ev.target.value)}/></Field>
